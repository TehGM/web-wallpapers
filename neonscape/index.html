<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a061a">
<title>Neonscape — Synthwave Scene Builder</title>
<!--
  ═══════════════════════════════════════════════════════════════════════
  NEONSCAPE — synthwave / retrowave landscape builder & animated wallpaper
  ═══════════════════════════════════════════════════════════════════════
  Only dependency: three.min.js (v0.160.0, MIT), shipped alongside this file
  — see three.LICENSE. No network access is required at runtime. No three.js
  addons are used; post-processing is implemented in this file, so these
  three files are the whole wallpaper.

  That is the UMD build, loaded by a plain <script src> rather than as an ES
  module, and the choice is deliberate: a browser fetches ES modules with CORS
  semantics, and a file:// page has an opaque origin, so `import` of a sibling
  file is refused outright ("CORS request not http"). Double-clicking
  index.html — the way anyone who unzips this will open it — therefore cannot
  work with an importmap, no matter where the file sits. A classic script is
  not subject to that, so it loads from file://, http:// and inside Wallpaper
  Engine alike. The code below stays type="module"; only an IMPORTED file is
  blocked, an inline module script is fine.

  To update three.js, replace three.min.js and three.LICENSE from
  https://cdn.jsdelivr.net/npm/three@<version>/build/ . Note that three
  deprecated the UMD build in r150 and it is gone in releases after 0.160.0,
  so a version bump means revisiting the above — likely by concatenating
  three.module.js into the module script below, since the file:// constraint
  is not negotiable. The build prints one deprecation warning on load; that
  is expected and harmless.

  WALLPAPER MODE
  --------------
  "Save link" copies a ?config=...&ui=0 URL — it always starts with the panel
  hidden and the animation playing, which is what a wallpaper host wants. The
  faint ⚙ in the top-right corner brings the panel back, so nothing is lost.
  Drop &ui=0 by hand for a link that opens in the editor.
  Hotkeys: H hide/show UI · R randomize · F fullscreen · Space play/pause ·
  S save/copy link.
-->
<style>
/* ── design tokens ─────────────────────────────────────────────────── */
:root{
  --bg:      rgba(10,6,26,.92);   /* panel glass            */
  --bg2:     rgba(16,9,38,.85);   /* section bodies         */
  --ink:     #cfc8e8;             /* body text              */
  --dim:     #7d74a6;             /* secondary text         */
  --mag:     #ff2d95;             /* magenta accent         */
  --cyn:     #00e5ff;             /* cyan accent            */
  --line:    rgba(255,45,149,.28);
  --line2:   rgba(0,229,255,.16);
  --font:    "Segoe UI", system-ui, -apple-system, sans-serif;
  --mono:    ui-monospace, "Cascadia Mono", Consolas, monospace;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ width:100%; height:100%; overflow:hidden; background:#05020e; }
body{ font-family:var(--font); color:var(--ink); font-size:13px; }
canvas#view{ position:fixed; inset:0; width:100%; height:100%; display:block; }

/* ── control panel ─────────────────────────────────────────────────── */
#panel{
  position:fixed; top:12px; right:12px; bottom:12px; width:322px;
  display:flex; flex-direction:column;
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:0 0 32px rgba(255,45,149,.10), 0 8px 40px rgba(0,0,0,.55);
  z-index:10; overflow:hidden;
  transition:transform .28s ease, opacity .28s ease;
}
#panel.hidden{ transform:translateX(360px); opacity:0; pointer-events:none; }
@media (prefers-reduced-motion:reduce){ #panel{ transition:none; } }
@media (max-width:760px){ #panel{ width:min(322px, calc(100vw - 24px)); } }

#panel header{ padding:14px 16px 10px; flex:none; }
.wordmark{
  font-size:22px; font-weight:900; font-style:italic; letter-spacing:.04em;
  background:linear-gradient(180deg,#e9f6ff 0%,#9fd8ff 38%,#20144d 50%,#ff2d95 55%,#ffd319 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  user-select:none;
}
.tagline{
  font-family:var(--mono); font-size:9.5px; letter-spacing:.34em;
  text-transform:uppercase; color:var(--dim); margin-top:2px;
}
.sunstripe{ height:4px; margin-top:10px; border-radius:2px;
  background:linear-gradient(90deg,#ffd319 0%,#ff901f 25%,#ff2d95 55%,#8c1eff 85%,#00e5ff 100%);
  opacity:.85; }

/* toolbar buttons */
.toolbar{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; padding:0 16px 10px; flex:none; }
.toolbar .wide{ grid-column:span 3; }
/* randomize split-button: main button + glued mood-arrow dropdown */
.split{ grid-column:span 2; display:flex; min-width:0; }
.split button{ flex:1; min-width:0; border-radius:7px 0 0 7px; border-right:none;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.moodwrap{ position:relative; flex:none; width:26px; display:flex;
  align-items:center; justify-content:center; color:var(--dim); font-size:10px;
  background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.12);
  border-radius:0 7px 7px 0; cursor:pointer; }
.moodwrap:hover{ border-color:var(--mag); color:#fff; }
button, .presets{
  appearance:none; font:inherit; font-size:11.5px; cursor:pointer;
  color:var(--ink); background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.12); border-radius:7px;
  padding:6px 4px; letter-spacing:.02em;
  transition:border-color .15s, box-shadow .15s, color .15s;
}
button:hover{ border-color:var(--mag); color:#fff; box-shadow:0 0 10px rgba(255,45,149,.35); }
button:focus-visible, .nsel:focus-visible, input:focus-visible{
  outline:2px solid var(--cyn); outline-offset:1px; }
button.primary{ border-color:var(--line); color:#ffd8ec; }
.presets{ width:100%; background:rgba(255,255,255,.045); color:var(--ink);
  text-align:center; }
.presets:hover{ border-color:var(--mag); color:#fff;
  box-shadow:0 0 10px rgba(255,45,149,.35); }

/* Dropdowns are built from plain divs — see makeSelect(). A real <select>
   must never exist in this page; see the note there. */
.nopts{
  position:fixed; z-index:30; padding:3px; border-radius:6px;
  background:#140a30; border:1px solid rgba(255,255,255,.14);
  box-shadow:0 8px 26px rgba(0,0,0,.6);
  color:var(--ink); font:inherit; font-size:11.5px;
  max-height:44vh; overflow-y:auto;
}
.nopt{ padding:4px 8px; border-radius:4px; cursor:pointer; white-space:nowrap; }
.nopt:hover{ background:rgba(255,255,255,.10); }
.nopt.sel{ background:rgba(255,45,149,.25); }

/* sections */
#secTools{ display:flex; gap:4px; justify-content:flex-end; padding:0 16px 4px; flex:none; }
#secTools button{ font-size:9px; padding:2px 7px; letter-spacing:.08em;
  color:var(--dim); border-radius:5px; }
#sections{ flex:1; overflow-y:auto; overscroll-behavior:contain; padding:2px 10px 10px; }
#sections::-webkit-scrollbar{ width:8px; }
#sections::-webkit-scrollbar-thumb{ background:rgba(255,45,149,.25); border-radius:4px; }
#sections::-webkit-scrollbar-track{ background:transparent; }
details.sec{ margin:6px 0; border:1px solid var(--line2); border-radius:9px;
  background:var(--bg2); overflow:hidden; }
details.sec summary{
  list-style:none; cursor:pointer; padding:8px 12px;
  font-family:var(--mono); font-size:10px; letter-spacing:.28em;
  text-transform:uppercase; color:var(--cyn);
  display:flex; align-items:center; gap:8px; user-select:none;
}
details.sec summary::-webkit-details-marker{ display:none; }
details.sec summary::before{ content:"▸"; font-size:9px; color:var(--dim);
  transition:transform .15s; }
details.sec[open] summary::before{ transform:rotate(90deg); }
details.sec .body{ padding:2px 12px 10px; }
/* nested sub-sections (Extras elements) */
details.sec.sub{ margin:5px 0; border-color:rgba(255,255,255,.08); }
details.sec.sub summary{ font-size:9px; letter-spacing:.2em; color:var(--ink);
  padding:6px 10px; }
details.sec.sub .body{ padding:2px 10px 8px; }

/* control rows */
.row{ display:grid; grid-template-columns:104px 1fr 40px; gap:8px;
  align-items:center; min-height:26px; }
.row label{ font-size:11.5px; color:var(--ink); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; }
.row .val{ font-family:var(--mono); font-size:10px; color:var(--dim);
  text-align:right; background:none; border:none; padding:0;
  width:100%; min-width:0; }
.row input.val:focus{ color:var(--cyn); background:rgba(0,0,0,.45);
  outline:1px solid var(--line2); border-radius:3px; }
.row.dis{ opacity:.45; }
.row.wide2{ grid-template-columns:104px 1fr; }
input[type=range]{ width:100%; accent-color:var(--mag); height:20px;
  background:transparent; cursor:pointer; }
input[type=color]{ width:100%; height:20px; border:1px solid rgba(255,255,255,.15);
  border-radius:5px; background:none; padding:0 2px; cursor:pointer; }
input[type=checkbox]{ accent-color:var(--mag); width:15px; height:15px;
  cursor:pointer; justify-self:start; }
input[type=text]{ width:100%; font:inherit; font-size:12px; color:var(--ink);
  background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.14);
  border-radius:5px; padding:4px 7px; }
.row .nsel{ width:100%; font:inherit; font-size:11.5px; color:var(--ink);
  background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.14);
  border-radius:5px; padding:3px 16px 3px 4px; cursor:pointer;
  position:relative; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; }
/* stands in for the native dropdown arrow the <select> used to draw */
.row .nsel::after{ content:""; position:absolute; right:5px; top:50%;
  margin-top:-2px; border:3.5px solid transparent;
  border-top-color:var(--dim); }
.subhead{ font-family:var(--mono); font-size:9px; letter-spacing:.22em;
  text-transform:uppercase; color:var(--dim); margin:8px 0 3px; }
/* audio playback row: icon · seek slider · time, on ONE line (class-based
   flex so show/hide toggling of inline display can't break the layout) */
.playerrow{ display:flex; gap:6px; align-items:center; margin:4px 0; }
.playerrow button{ flex:none; width:30px; padding:4px 0; }
.playerrow input[type=range]{ flex:1 1 auto; width:auto; min-width:0; }
.playerrow span{ font-family:var(--mono); font-size:9px; color:var(--dim);
  flex:none; white-space:nowrap; }

/* gradient-direction dial */
canvas.dir{ width:78px; height:78px; cursor:grab; justify-self:start;
  border-radius:50%; touch-action:none; }
canvas.dir:active{ cursor:grabbing; }
.note{ font-size:10.5px; color:var(--dim); line-height:1.45; margin:4px 0; }

/* footer */
#panel footer{
  flex:none; display:flex; justify-content:space-between; align-items:center;
  padding:8px 16px; border-top:1px solid var(--line2);
  font-family:var(--mono); font-size:9.5px; color:var(--dim); letter-spacing:.06em;
}
#panel footer .fps{ color:var(--cyn); }
/* click-to-edit seed in the footer */
#seedIn{ background:none; border:none; padding:0; width:74px;
  font:inherit; color:var(--dim); letter-spacing:.06em; }
#seedIn:focus{ color:var(--cyn); background:rgba(0,0,0,.45);
  outline:1px solid var(--line2); border-radius:3px; }

/* hidden-UI restore button (faint but always visible when UI is hidden) */
#reveal{
  position:fixed; top:14px; right:14px; z-index:9;
  width:34px; height:34px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,.30); background:rgba(10,6,26,.35);
  border:1px solid rgba(255,45,149,.22);
  cursor:pointer; transition:all .25s; font-size:15px;
}
#reveal:hover{ color:#ff9dce; background:rgba(10,6,26,.85);
  border-color:var(--line); }
#reveal.gone{ display:none; }

/* toast */
#toast{
  position:fixed; left:50%; bottom:34px; transform:translateX(-50%) translateY(10px);
  background:rgba(12,7,30,.94); border:1px solid var(--line);
  color:#ffd8ec; padding:8px 18px; border-radius:8px; font-size:12px;
  opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
  z-index:20; letter-spacing:.03em;
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="view"></canvas>

<div id="panel" role="region" aria-label="Scene controls">
  <header>
    <div class="wordmark">NEONSCAPE</div>
    <div class="tagline">retrowave scene builder</div>
    <div class="sunstripe"></div>
  </header>
  <div class="toolbar">
    <div class="presets wide" id="presetSel" aria-label="Load preset">📼 Load preset ▾</div>

      <button id="btnRnd" class="primary" title="R — randomize with the selected mood">⚂ Randomize · any</button>

  </div>

  <footer>
    <span class="fps" id="fpsRO">— fps</span>
    <span title="Scene seed — click to type a seed and regenerate">seed
      <input id="seedIn" value="—" inputmode="numeric" spellcheck="false"
             aria-label="Scene seed"></span>
    <span title="H hide · R randomize · F fullscreen · Space pause · S save">H·R·F·⎵·S</span>
  </footer>
</div>

<div id="reveal" class="gone" title="Show controls (H)">⚙</div>
<div id="toast" role="status"></div>
<input type="file" id="fileJson"  accept=".json,application/json" hidden>
<input type="file" id="fileAudio" accept="audio/*" hidden>

<script src="./three.min.js"></script>

<script type="module">
/* UMD build — THREE arrives as a global from the script above. See the
   header for why this is not an ES-module import. */
const THREE = window.THREE;

/* ════════════════════════════════════════════════════════════════════
   1. UTILITIES — seeded RNG, noise, helpers
   ════════════════════════════════════════════════════════════════════ */

/** Deterministic 32-bit RNG (mulberry32). */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp  = (a, b, t) => a + (b - a) * t;

/** rng helpers bound to a generator fn */
const R = {
  range: (rng, a, b) => a + rng() * (b - a),
  int:   (rng, a, b) => Math.floor(a + rng() * (b - a + 1)),
  pick:  (rng, arr)  => arr[Math.floor(rng() * arr.length)],
  chance:(rng, p)    => rng() < p,
  /** weighted pick: [[value, weight], ...] */
  weighted(rng, pairs){
    let sum = 0; for (const p of pairs) sum += p[1];
    let x = rng() * sum;
    for (const p of pairs){ x -= p[1]; if (x <= 0) return p[0]; }
    return pairs[pairs.length - 1][0];
  }
};

/* CPU-side 1D/2D value noise (mountain ridges, cloud texture) */
function makeNoise(seed){
  const rng = mulberry32(seed);
  const perm = new Uint8Array(512);
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  for (let i = 255; i > 0; i--){ const j = Math.floor(rng() * (i + 1)); [p[i], p[j]] = [p[j], p[i]]; }
  for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
  const fade = t => t * t * (3 - 2 * t);
  function n2(x, y){
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const h = (X, Y) => perm[(perm[X & 255] + (Y & 255)) & 255] / 255;
    const u = fade(xf), v = fade(yf);
    return lerp(lerp(h(xi, yi), h(xi + 1, yi), u),
                lerp(h(xi, yi + 1), h(xi + 1, yi + 1), u), v);
  }
  function fbm2(x, y, oct = 4){
    let a = 0, amp = 0.5, f = 1;
    for (let i = 0; i < oct; i++){ a += amp * n2(x * f, y * f); amp *= 0.5; f *= 2; }
    return a;
  }
  return { n2, fbm2, n1: x => n2(x, 3.7), fbm1: (x, o) => fbm2(x, 9.1, o) };
}

/** hex string -> THREE.Color (sRGB -> working space handled by three) */
const col = hex => new THREE.Color(hex);
/** relative luminance of a hex color, 0..1 (for star-density rules) */
function hexLum(hex){
  const c = new THREE.Color(hex);
  return 0.2126 * c.r + 0.7152 * c.g + 0.0722 * c.b;
}
/** hsl -> hex string (h 0..360, s/l 0..1) */
function hsl(h, s, l){
  return '#' + new THREE.Color().setHSL(((h % 360) + 360) % 360 / 360, s, l,
    THREE.SRGBColorSpace).getHexString();
}

const deepClone = o => structuredClone(o);
function deepMerge(dst, src){
  for (const k in src){
    if (src[k] && typeof src[k] === 'object' && !Array.isArray(src[k])){
      if (!dst[k] || typeof dst[k] !== 'object') dst[k] = {};
      deepMerge(dst[k], src[k]);
    } else dst[k] = src[k];
  }
  return dst;
}
/** get/set "a.b.c" paths on the state object */
const getPath = (o, p) => p.split('.').reduce((x, k) => x[k], o);
function setPath(o, p, v){
  const ks = p.split('.'); const last = ks.pop();
  ks.reduce((x, k) => x[k], o)[last] = v;
}

/* ════════════════════════════════════════════════════════════════════
   2. STATE — defaults, curated palettes, presets
   ════════════════════════════════════════════════════════════════════ */

const DEFAULTS = {
  seed: 80841,
  sky:   { top:'#070118', mid:'#2b0a56', bot:'#ff2d95', midPos:0.42, drift:0,

           wireDetail:1, wireWidth:1 },
  grid:  { on:true, color:'#00e5ff', glow:1.15, spacing:4.5, speed:1.0,
           amp:0, rough:1.0, terrNear:30,
           reflect:0.55, reflectScene:0.45, reflectBeams:0.5, reflectHue:0,

           gradScale:1.0, gradDir:0, gradOff:0, flowSpd:0.3 },
  road:  { on:false, width:7.5, x:0, curve:0, speed:0,

           edge:'solid',    edgeColor:'#f2f6ff',
           lanes:2, markW:0.14, dashLen:16, dashDuty:0.42, glow:1.0 },
  mtn:   { mode:'mountains',        // off · mountains · city · sea

           density:1.0, lit:0.45, spread:1.0,           // city
           waveAmp:0.5, waveSpd:0.5, glint:1.0, glintBeam:1.0,     // sea
           span:0.5, waterY:0.55 },
  stars: { on:true, density:0.65, size:1.0, twinkle:0.8, drift:0.15,
           color:'#9fd8ff', shooting:true },
  clouds:{ on:false, color:'#ff5ec4', opacity:0.35, speed:0.3, haze:0.5,
           size:1.0, near:0 },
  fx:    { palms:false, palmCount:4, palmColor:'#0b0318', palmSway:0.3,
           palmSeed:1234, palmHalo:0, palmGlowColor:'#ff2d95',
           hero:'none', heroColor:'#00e5ff', heroSpin:0.4, heroSize:1.0,
           heroX:0, heroY:7.5, heroZ:-70, heroAngle:0,

           dolly:0, dollySpd:0.5, orbit:0, orbitSpd:0.5 },
  post:  { bloomStr:0.95, bloomThr:0.6,
           vig:0.45, scan:0.35, grain:0.18, chroma:0.15,
           vhs:0, vhsCount:1 },
  audio: { on:false, src:'auto', smooth:0.05,
           mGrid:{band:'bass',sens:0.8,boost:1},
           mSun:{band:'bass',sens:0.35,boost:1},
           mBloom:{band:'bass',sens:0.5,boost:1},
           mStars:{band:'mid',sens:0.6},
           mScan:{band:'treble',sens:0.4},
           mTerrain:{band:'bass',sens:0.6,boost:1},
           mHero:{band:'bass',sens:0.5},  mHeroGlow:{band:'bass',sens:0.5},
           mText:{band:'mid',sens:0.4},   mTextGlow:{band:'mid',sens:0.5},
           mPalms:{band:'bass',sens:0.5,boost:1},
           mPalmHalo:{band:'bass',sens:0.5,boost:1},
           mSunGlow:{band:'off',sens:0.5}, mSunGlowInt:{band:'off',sens:0.5},

/* live state (mutated in place so bound UI + appliers stay simple) */
let state = deepClone(DEFAULTS);

/* Loading a preset or randomizing replaces the scene but keeps the machine
   prefs — these keys, everything under "Animation · Perf". Deliberately NOT
   anim.hue / anim.hueShift: those sit under General because they are palette
   properties of the SCENE, and carrying them over tints every later preset
   with the last one's hue. hueShift is the worse of the two — the hue-cycle
   rewrites it every frame, so preserving it pastes whatever phase the cycle
   happened to be at onto the next scene. A preset that wants either still
   sets it in its own patch, which runs afterwards.                       */
const PERF_KEYS = ['play', 'speed', 'fpsCap', 'adaptive', 'dprCap'];
function keepPerfPrefs(dst, src){
  for (const k of PERF_KEYS) dst.anim[k] = src.anim[k];
  return dst;
}

/* ════════════════════════════════════════════════════════════════════
   3. SERIALIZATION — deflate-compressed URL configs + localStorage
   ════════════════════════════════════════════════════════════════════ */

function b64url(bytes){
  let s = '';
  for (let i = 0; i < bytes.length; i += 0x8000)
    s += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function unb64url(str){
  const s = atob(str.replace(/-/g, '+').replace(/_/g, '/'));
  const out = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
  return out;
}
/** state -> compact string. 'z…' = deflated, 'j…' = plain (fallback). */
async function encodeConfig(obj){
  const json = JSON.stringify(obj);
  try {
    const stream = new Blob([json]).stream().pipeThrough(new CompressionStream('deflate'));
    const buf = await new Response(stream).arrayBuffer();
    return 'z' + b64url(new Uint8Array(buf));
  } catch {
    return 'j' + b64url(new TextEncoder().encode(json));
  }
}
async function decodeConfig(str){
  const mode = str[0], data = unb64url(str.slice(1));
  if (mode === 'z'){
    const stream = new Blob([data]).stream().pipeThrough(new DecompressionStream('deflate'));
    return JSON.parse(await new Response(stream).text());
  }
  return JSON.parse(new TextDecoder().decode(data));
}
/** URL params from the query string (?config=…&ui=0) */
function parseParams(){
  const out = {};
  for (const part of location.search.replace(/^\?/, '').split('&')){
    const i = part.indexOf('=');
    if (i > 0) out[part.slice(0, i)] = part.slice(i + 1);
  }
  return out;
}

const LS_KEY = 'neonscape.state.v1';
let saveTimer = 0;
function autosave(){
  clearTimeout(saveTimer);
  /* The address bar may claim ?preset=x, and that is only true while the
     scene still IS x. Boot deliberately ignores localStorage when preset= is
     present, so leaving a stale claim there would silently throw away the
     user's edits on the next refresh — drop it the moment anything changes.
     The first autosave after a preset load is the load itself, not an edit,
     which is what the guard swallows.                                     */
  if (presetUrlId){
    if (presetGuard) presetGuard = false;
    else clearPresetUrl();
  }
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch {}
  }, 500);
}

/* ── preset links ──────────────────────────────────────────────────────
   ?preset=<id> is a short, readable alternative to a full ?config= blob.
   An id is a public contract the moment a link is shared, so it stays put
   even if the display name changes. ?config= wins when both are present:
   it pins an exact scene, while a preset is only a name whose definition
   may be retuned in a later release.                                    */
let presetUrlId = null;    // id the address bar currently claims
let presetGuard  = false;  // swallows the autosave the load itself fires

/** Address bar → ?preset=<id>, keeping ui= so wallpaper mode survives. */
function setPresetUrl(id){
  const h = parseParams();
  let qs = '?preset=' + encodeURIComponent(id);
  if (h.ui !== undefined) qs += '&ui=' + h.ui;
  history.replaceState(null, '', location.pathname + qs);
  presetUrlId = id;
}
/** Withdraw the claim — the scene is no longer that preset. */
function clearPresetUrl(){
  presetUrlId = null;
  const h = parseParams();
  if (h.preset === undefined) return;
  history.replaceState(null, '', location.pathname +
    (h.ui !== undefined ? '?ui=' + h.ui : ''));
}
/** The scene a preset describes, built without touching the live state. */
function presetState(p){
  const base = keepPerfPrefs(deepClone(DEFAULTS), state);
  p.patch(base);
  return base;
}
/** Load a preset and let the address bar advertise it. */
function applyPreset(p){
  presetGuard = true;
  loadState(presetState(p));
  setPresetUrl(p.id);
  toast(p.name);
}

     grid plane y=0 spanning z +40 … -460 · mountains z -360…-430
     sun z -455 · clouds z -400 · stars dome r 700 · sky dome r 900
   All post-processing renders through a custom HDR pipeline (section 10),
   so three.min.js is the only dependency.                                */

const canvas   = document.getElementById('view');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false, alpha:false,
  powerPreference:'high-performance' });
renderer.autoClear = true;
renderer.toneMapping = THREE.NoToneMapping;          // tonemap in final pass
renderer.outputColorSpace = THREE.LinearSRGBColorSpace; // sRGB in final pass

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x2b0a56, 60, 460);        // recolored by applySky

const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1600);
const CAM_BASE = new THREE.Vector3(0, 3.2, 18);
const CAM_LOOK = new THREE.Vector3(0, 6, -400);
camera.position.copy(CAM_BASE);
camera.lookAt(CAM_LOOK);

/* shared GLSL chunks -------------------------------------------------- */
const GLSL_HASH = /* glsl */`
float hash21(vec2 p){
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}`;
/* value noise, periodic along y (=world z) so scroll offsets can wrap */
const GLSL_PNOISE = /* glsl */`
float pnoise(vec2 p, float per){
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash21(vec2(i.x,       mod(i.y,       per)));
  float b = hash21(vec2(i.x + 1.0, mod(i.y,       per)));
  float c = hash21(vec2(i.x,       mod(i.y + 1.0, per)));
  float d = hash21(vec2(i.x + 1.0, mod(i.y + 1.0, per)));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}
float pfbm(vec2 p, float per){
  float v = 0.0;
  v += 0.55 * pnoise(p, per);
  v += 0.30 * pnoise(p * 2.0, per * 2.0);
  v += 0.15 * pnoise(p * 4.0, per * 4.0);
  return v;
}`;
/* Reflection smear, shared by the floor shader and the wire moon's
   mirrored geometry so all three celestial types stretch identically.
   REFL_SAT is the ray elevation (rise/run) at which the smear reaches
   full strength; below it it tapers to nothing at the horizon.        */
const REFL_STRETCH = '0.6', REFL_SAT = 0.06;

/* ── planet ring ──────────────────────────────────────────────────────
   Sampled in PLANET-RADIUS units (1.0 = the globe's edge) so the
   celestial quad and the floor's mirrored copy share one definition and
   can never drift apart. Tilted off horizontal and only moderately
   squashed, so the band structure actually reads.
   Returns  .x ring brightness · .y 1 on the NEAR arc (crosses in front
   of the globe) · .z stripe tone, for colour variation across bands.  */
const RING_TILT = 0.21, RING_SQUASH = 2.85;
const GLSL_RING = /* glsl */`
  vec3 ringSample(vec2 q, float widthK, float aa){
    const float ca = ${Math.cos(RING_TILT).toFixed(6)};
    const float sa = ${Math.sin(RING_TILT).toFixed(6)};
    vec2 rr = vec2(q.x * ca + q.y * sa, -q.x * sa + q.y * ca);
    float front = step(rr.y, 0.0);        // lower half of the tilted ellipse
    rr.y *= ${RING_SQUASH.toFixed(2)};
    float inner = 1.28, outer = 1.28 + 0.70 * widthK;
    float span = max(outer - inner, 1e-4);
    float u = (length(rr) - inner) / span;
    if (u < -0.6 || u > 1.6) return vec3(0.0);
    /* concentric bands plus a Cassini-style division. Every falloff is
       written with multiplication — pow() on a signed base is undefined
       in GLSL and renders as black blocks on some drivers.            */
    float s = 0.62 + 0.28 * sin(u * 33.0 + 1.3) + 0.13 * sin(u * 71.0 + 0.4);
    float g1 = (u - 0.61) / 0.055;  s *= 1.0 - 0.88 * exp(-g1 * g1);
    float g2 = (u - 0.14) / 0.05;   s *= 1.0 - 0.55 * exp(-g2 * g2);
    float e = clamp(aa / span, 0.012, 0.4);
    s *= smoothstep(-e, e * 2.0, u) * (1.0 - smoothstep(1.0 - e * 2.0, 1.0, u));
    return vec3(max(s, 0.0), front, 0.5 + 0.5 * sin(u * 17.0));
  }`;

const GLSL_FOG = /* glsl */`
uniform vec3  uFogColor;
uniform float uFogNear, uFogFar;
vec3 applyFog(vec3 c, float dist){
  float f = smoothstep(uFogNear, uFogFar, dist);
  return mix(c, uFogColor, f);
}`;

/* ════════════════════════════════════════════════════════════════════
   5. SKY DOME — 3-stop gradient + horizon haze + slow hue drift
   ════════════════════════════════════════════════════════════════════ */

const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide, depthWrite: false, fog: false,
  uniforms: {
    uTop:   { value: col('#070118') },
    uMid:   { value: col('#2b0a56') },
    uBot:   { value: col('#ff2d95') },
    uMidPos:{ value: 0.42 },
    uHaze:  { value: 0.5 },
    uHazeC: { value: col('#2b0a56') },
    uHue:   { value: 0 },              // sky-local slow hue drift
  },
  vertexShader: /* glsl */`
    varying vec3 vDir;
    void main(){
      vDir = normalize(position);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: /* glsl */`
    varying vec3 vDir;
    uniform vec3 uTop, uMid, uBot, uHazeC;
    uniform float uMidPos, uHaze, uHue;
    vec3 hueRotate(vec3 c, float a){
      const vec3 W = vec3(0.299, 0.587, 0.114);
      float ca = cos(a), sa = sin(a);
      return vec3(dot(c, W)) + ca * (c - vec3(dot(c, W)))
           + sa * cross(vec3(0.57735), c - vec3(dot(c, W)));
    }
    void main(){
      float h = clamp(vDir.y * 1.6 + 0.02, 0.0, 1.0);   // 0 horizon → 1 up
      vec3 c = h < uMidPos
        ? mix(uBot, uMid, smoothstep(0.0, uMidPos, h))
        : mix(uMid, uTop, smoothstep(uMidPos, 1.0, h));
      // horizon haze band
      c += uHazeC * uHaze * 0.6 * exp(-abs(vDir.y) * 9.0);
      if (uHue != 0.0) c = hueRotate(c, uHue);
      gl_FragColor = vec4(c, 1.0);
    }`
});
const skyMesh = new THREE.Mesh(new THREE.SphereGeometry(900, 32, 18), skyMat);
skyMesh.renderOrder = -10;
skyMesh.frustumCulled = false;
scene.add(skyMesh);

/* ════════════════════════════════════════════════════════════════════
   6. CELESTIAL — banded sun / ringed planet / wireframe moon
   ════════════════════════════════════════════════════════════════════
   One quad shader draws sun & planet (mode uniform). Wire mode swaps in
   a line-sphere and keeps the quad as a soft glow halo.                 */

const sunGroup = new THREE.Group();
scene.add(sunGroup);

const sunMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, fog: false,
  uniforms: {
    uMode:    { value: 0 },            // 0 sun · 1 planet · 2 glow-only (wire)
    uC1:      { value: col('#ffd319') },
    uC2:      { value: col('#ff2975') },
    uC3:      { value: col('#8c1eff') },
    uDisc:    { value: 1 / 3.2 },      // disc radius in quad units
    uBands:   { value: 9 },
    uBandW:   { value: 0.5 },
    uBandTop: { value: 0.52 },         // where bands start (0 bottom → 1 top)
    uBandShift:{ value: 0 },           // slow band scroll
    uGlow:    { value: 0.55 },
    uGlowInt: { value: 1 },            // halo intensity (size is uGlow)
    uBright:  { value: 1.25 },         // >1 feeds bloom
    uRing:    { value: 1 },
    uRingW:   { value: 1 },            // ring radial width
    uAspect:  { value: 1 },            // quad x-stretch for planet ring
  },
  vertexShader: /* glsl */`
    varying vec2 vP;
    uniform float uAspect;
    void main(){
      vP = (uv - 0.5) * 2.0 * vec2(uAspect, 1.0);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: /* glsl */`
    varying vec2 vP;
    uniform int   uMode;
    uniform vec3  uC1, uC2, uC3;
    uniform float uDisc, uBands, uBandW, uBandTop, uBandShift, uGlow, uGlowInt,
                  uBright, uRing, uRingW;
    ${GLSL_HASH}
    ${GLSL_RING}
    float vn2(vec2 p){
      vec2 i = floor(p), f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash21(i),               b = hash21(i + vec2(1.0, 0.0));
      float c = hash21(i + vec2(0.0, 1.0)), d = hash21(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }
    void main(){
      float r  = length(vP);
      /* the glow must reach exactly zero by the quad's inscribed edge,
         or the quad's own boundary shows up as a hard circle */
      const float HALO_LIM = 0.98;              // outer limit, quad units
      /* Alpha below which a fragment is dropped. The canvas is sRGB, and
         its toe expands dark values enormously — alpha 0.004 still reads
         as ~29/255 on screen, which cut the halo off with a visible ring.
         This has to sit below one code value, not below "looks small".  */
      const float A_CUT = 3e-5;
      float aa = fwidth(r) * 1.5;
      float disc = 1.0 - smoothstep(uDisc - aa, uDisc + aa, r);
      float t = clamp((vP.y / uDisc) * 0.5 + 0.5, 0.0, 1.0);  // 0 bottom → 1 top
      vec3 grad = mix(uC3, uC2, smoothstep(0.0, 0.55, t));
      grad = mix(grad, uC1, smoothstep(0.55, 1.0, t));

      float alpha = disc;
      vec3  color = grad;

      if (uMode == 0){
        /* ── banded sun: gaps widen toward the bottom ── */
        float bandTop = max(uBandTop, 0.02);
        if (t < bandTop && uBands > 0.5){
          float k = (bandTop - t) / bandTop;              // 0 top → 1 bottom
          float gap = uBandW * 0.75 * k;
          float f = fract((t + uBandShift) * uBands);
          float e = fwidth(t) * uBands * 1.5;
          alpha *= smoothstep(gap - e, gap + e, f);
        }
      } else if (uMode == 1){
        /* ── planet: fake sphere shading + smooth banded surface + ring ── */
        float q = clamp(r / uDisc, 0.0, 1.0);
        float sh = sqrt(1.0 - q * q);                     // limb darkening
        float lit = clamp(0.35 + 0.65 * sh * (0.55 + 0.45 * (vP.y / uDisc)), 0.0, 1.2);
        vec2 sp = vP / uDisc;
        vec2 np = sp / max(sh, 0.35);                     // fake spherical wrap
        float n = vn2(np * 3.0) * 0.55 + vn2(np * 6.0) * 0.3 + vn2(np * 12.0) * 0.15;
        float belt = 0.5 + 0.5 * sin(np.y * 6.5 + n * 3.2);   // gas-giant belts
        color = mix(uC3, mix(uC2, uC1, lit), lit);
        color *= 0.8 + 0.26 * n + 0.14 * belt * sh;
        if (uRing > 0.5){
          vec3 RG = ringSample(sp, uRingW, fwidth(sp.x) * 1.5);
          /* The near arc passes IN FRONT of the globe and the far arc is
             occluded by it — that split is what stops a ring reading as
             a flat sticker behind the planet. */
          float ring = RG.x * mix(1.0 - disc, 1.0, RG.y);
          vec3 rc = mix(uC1, uC2, RG.z * 0.45) * 1.15;
          color = mix(color, rc, clamp(ring, 0.0, 1.0));
          alpha = max(alpha, ring * 0.92);
        }
      } else {
        /* wire mode: ONE smooth Gaussian glow across the whole quad —
           no disc/halo split, so there is no seam at the wire surface */
        float qw = r / uDisc;
        alpha = exp(-qw * qw * 1.5) * (0.28 + uGlow * 0.5) * uGlowInt;
        // quad-edge safety: bites only at the very rim, where the
        // Gaussian is already ~1e-6, so it can never show as an edge
        alpha *= 1.0 - pow(clamp(r / HALO_LIM, 0.0, 1.0), 6.0);
        color = uC2 * 1.15;
        if (alpha < A_CUT) discard;
        gl_FragColor = vec4(color * uBright, clamp(alpha, 0.0, 1.0));
        return;
      }

      /* soft halo outside the disc (normal blending over dark sky).
         An exponential never actually reaches zero, so the quad's own
         edge used to chop it into a hard circle whenever the glow was
         large. Instead the falloff is mapped onto the room that really
         exists (disc edge → HALO_LIM) and windowed by 1-d^6, which hits
         zero WITH zero slope — the glow fades out rather than stopping. */
      float room = HALO_LIM - uDisc;
      float dn = clamp((r - uDisc) / room, 0.0, 1.0);
      float k  = room * 3.8 / max(uGlow, 0.05); // decay rate over that room
      float e1 = exp(-k);                       // pedestal at the limit
      float halo = (exp(-dn * k) - e1) / (1.0 - e1) * (1.0 - pow(dn, 6.0))
                 * uGlow * uGlowInt;
      halo *= 1.0 - disc;
      color = mix(uC2 * 1.3, color, clamp(alpha, 0.0, 1.0));
      float outA = clamp(alpha + halo, 0.0, 1.0);
      if (outA < A_CUT) discard;
      gl_FragColor = vec4(color * uBright, outA);
    }`
});
const sunQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), sunMat);
sunQuad.frustumCulled = false;
sunGroup.add(sunQuad);

/* wireframe moon (mode 'wire').
   Structure: sunGroup → wireSquash (world-z flatten, so a huge moon's
   front never physically reaches the mountain planes and pops through)
   → wireMoon (rotates + scales; holds up to 3 line copies for width). */
/* gradient wire material: same 3-stop vertical gradient as the banded
   sun, keyed on local y so the spin (rotation.y) never shifts colors */
const wireMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, fog: false,
  uniforms: {
    uC1: { value: col('#ffd319') },
    uC2: { value: col('#ff2975') },
    uC3: { value: col('#8c1eff') },
  },
  vertexShader: /* glsl */`
    varying float vY;
    void main(){
      vY = position.y;                 // unit icosahedron: -1 … +1
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: /* glsl */`
    varying float vY;
    uniform vec3 uC1, uC2, uC3;
    void main(){
      float t = clamp(vY * 0.5 + 0.5, 0.0, 1.0);
      vec3 c = mix(uC3, uC2, smoothstep(0.0, 0.55, t));
      c = mix(c, uC1, smoothstep(0.55, 1.0, t));
      /* Blended, not additive. The moon hangs over the BRIGHT part of
         the sky, where adding a colour just drives every channel to
         clipping and the gradient washes out to white — the floor
         reflection only looked richer because it sits on a dark floor.
         Blending lets each line keep its own colour, and the >1
         multiplier still runs it into bloom so it stays neon.         */
      gl_FragColor = vec4(c * 1.45, 0.88);
    }`
});
const wireSquash = new THREE.Group();
wireSquash.scale.set(1, 1, 0.06);
sunGroup.add(wireSquash);
const wireMoon = new THREE.Group();
wireSquash.add(wireMoon);

/* floor reflection of the wire moon: the SAME geometry, mirrored about
   the ground plane (scale.y = -1) and drawn as a translucent decal, so
   the reflection matches the moon's exact shape, spin and detail.
   Farthest-first transparent sorting keeps palms/heroes drawn over it. */
const wireReflMat = new THREE.ShaderMaterial({
  transparent: true, blending: THREE.AdditiveBlending,
  depthTest: false, depthWrite: false, fog: false,
  uniforms: {
    // color uniform OBJECTS shared with wireMat: applySun updates once
    uC1: wireMat.uniforms.uC1,
    uC2: wireMat.uniforms.uC2,
    uC3: wireMat.uniforms.uC3,
    uOp:    { value: 0.5 },
    uHueR:  { value: 0 },
    uTimeW: { value: 0 },
    uStretchRef: { value: 25 },        // depth at which the smear saturates
  },
  vertexShader: /* glsl */`
    varying float vY;
    varying float vWY;
    uniform float uStretchRef;
    void main(){
      vY = position.y;                 // unit icosahedron: -1 … +1
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWY = wp.y;                      // true mirror height (drives clipping)
      /* the floor shader smears its reflections progressively with depth
         below the horizon; stretch this mirrored geometry by the same
         factor so all three celestial types match */
      wp.y *= 1.0 + ${REFL_STRETCH}
            * clamp(max(-wp.y, 0.0) / uStretchRef, 0.0, 1.0);
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: /* glsl */`
    varying float vY;
    varying float vWY;
    uniform vec3 uC1, uC2, uC3;
    uniform float uOp, uHueR, uTimeW;
    vec3 hueRot(vec3 c, float a){
      const vec3 W = vec3(0.299, 0.587, 0.114);
      float ca = cos(a), sa = sin(a);
      vec3 d = c - vec3(dot(c, W));
      return vec3(dot(c, W)) + ca * d + sa * cross(vec3(0.57735), d);
    }
    void main(){
      if (vWY > 0.5) discard;          // a mirror never rises past the horizon
      float t = clamp(vY * 0.5 + 0.5, 0.0, 1.0);
      vec3 c = mix(uC3, uC2, smoothstep(0.0, 0.55, t));
      c = mix(c, uC1, smoothstep(0.55, 1.0, t));
      if (uHueR != 0.0) c = hueRot(c, uHueR);
      // gentle watery flicker down the reflection
      float w = 0.8 + 0.2 * sin(vWY * 0.3 + uTimeW * 1.7);
      gl_FragColor = vec4(c * 1.1, uOp * w);
    }`
});
const wireReflRoot = new THREE.Group();
wireReflRoot.scale.set(1, -1, 0.06);     // mirror about y=0 + same z-squash
wireReflRoot.visible = false;
scene.add(wireReflRoot);
const wireReflMoon = new THREE.Group();
wireReflRoot.add(wireReflMoon);

let wireGeo = null, _lastWireDetail = -1;
function rebuildWireMoon(){
  const detail = clamp(Math.round(state.sun.wireDetail), 0, 3);
  if (detail !== _lastWireDetail){
    _lastWireDetail = detail;
    if (wireGeo) wireGeo.dispose();
    wireGeo = new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(1, detail));
    for (const c of [...wireMoon.children]) wireMoon.remove(c);
    for (const c of [...wireReflMoon.children]) wireReflMoon.remove(c);
    // "line width": stacked copies at hair-different radii read as
    // thicker lines (LineBasicMaterial.linewidth is a no-op on ANGLE)
    for (const k of [1.0, 1.011, 0.989]){
      const seg = new THREE.LineSegments(wireGeo, wireMat);
      seg.scale.setScalar(k);
      seg.frustumCulled = false;
      wireMoon.add(seg);
      // reflection twin: same geometry, mirrored by the parent group
      const rseg = new THREE.LineSegments(wireGeo, wireReflMat);
      rseg.scale.setScalar(k);
      rseg.frustumCulled = false;
      wireReflMoon.add(rseg);
    }
  }
  const w = clamp(Math.round(state.sun.wireWidth), 1, 3);
  wireMoon.children.forEach((c, i) => { c.visible = i < w; });
  wireReflMoon.children.forEach((c, i) => { c.visible = i < w; });
}

const SUN_Z = -455;
let sunBaseScale = 52;
function layoutSun(){
  const s = state.sun;
  sunBaseScale = s.size * 3.2;                 // quad half-size incl. halo margin
  sunMat.uniforms.uAspect.value = 1.0;
  sunQuad.scale.set(sunBaseScale, sunBaseScale, 1);
  wireMoon.scale.setScalar(s.size);
  sunGroup.position.set(s.x * 3.2, s.y, SUN_Z);
  /* exact mirror about the ground plane: M·(T·Squash·R·S) factors into
     translate(x, −y, z) · diag(1,−1,0.06) · R · S — i.e. the same child
     rotation/scale under a y-flipped root at the mirrored height */
  wireReflMoon.scale.setScalar(s.size);
  wireReflRoot.position.set(s.x * 3.2, -s.y, SUN_Z);
}

/* ════════════════════════════════════════════════════════════════════
   7. NEON GRID FLOOR — scrolling shader grid + optional noise terrain
   ════════════════════════════════════════════════════════════════════
   Scroll offsets are wrapped (lines % spacing, noise % period) so float
   precision never degrades even after days of 24/7 wallpaper runtime.  */

const NOISE_PER = 128.0;                 // terrain noise period (noise units)
/* Puddle noise, in noise units per world unit — one cell is 1/scale world
   units across. Puddles pool in the wheel ruts, so the pattern is ~6x
   longer than it is wide (≈3.3 x 20 units, plus the fbm's finer octaves)
   and reads as streaks running with the traffic rather than as blobs.
   The shader and the scroll accumulator both read PUDDLE_NS, so the water
   can never drift against the surface it is sitting on.                */
const PUDDLE_NS = 0.05, PUDDLE_XS = 0.3;

/* Centre of the road at a world z, and the flat corridor it carves.
   The terrain has to know about the road (a highway does not run over
   hills), so this lives with terrH and is shared by the grid vertices,
   the grid fragment shader that paints the markings, and the sea.
   The bend is STATIC in z: were it to scroll, the flat corridor would
   scroll with it and the entire floor would appear to sway.
   With the road off JS sets uCorrIn/uCorrOut to 10/34 and the offsets
   to zero, which is exactly the fixed corridor this had before.      */
const GLSL_ROADC = /* glsl */`
  uniform float uRoadX, uRoadCv, uCorrIn, uCorrOut;
  float roadCx(float z){
    float s = clamp((-z - 10.0) / 400.0, 0.0, 1.0);
    return uRoadX + uRoadCv * s * s;
  }`;

/* Terrain height at a world xz. One function so the grid's vertices, its
   reflection normals and the sea's coastline all read the exact same
   surface. Callers declare uNScale / uNOff / uTerrNear themselves (the
   sea shares gridMat's actual uniform objects, so it can never drift).
   Requires GLSL_ROADC ahead of it for roadCx().                       */
const GLSL_TERR = /* glsl */`
  float terrH(vec2 xz, float amp){
    // flat corridor along the road; uTerrNear sets how close to the
    // camera the hills start rising
    float corridor = smoothstep(uCorrIn, uCorrOut, abs(xz.x - roadCx(xz.y)));
    float nearFade = smoothstep(uTerrNear, uTerrNear + 90.0, -xz.y);
    vec2 nc = vec2(xz.x * uNScale, xz.y * uNScale + uNOff);
    return pfbm(nc, ${NOISE_PER.toFixed(1)}) * amp * corridor * nearFade;
  }`;

/* ── horizon silhouette bank ──────────────────────────────────────────
   Any far layer whose shape is a height profile over world x (mountains
   today; ridges/skylines/treelines later) is baked into one texture:
   row = layer (nearest first), column = x sample, R = height / layerMax.
   The floor shader ray-traces against these rows to reflect them.     */
const HORIZ_MAX = 8, HORIZ_W = 512;
const horizData = new Uint8Array(HORIZ_W * HORIZ_MAX * 4);
const horizTex = new THREE.DataTexture(horizData, HORIZ_W, HORIZ_MAX,
  THREE.RGBAFormat, THREE.UnsignedByteType);
horizTex.minFilter = horizTex.magFilter = THREE.LinearFilter;
horizTex.wrapS = horizTex.wrapT = THREE.ClampToEdgeWrapping;
horizTex.needsUpdate = true;

const gridMat = new THREE.ShaderMaterial({
  fog: false,
  uniforms: {
    uLine:     { value: col('#00e5ff') },
    uBase:     { value: col('#00e5ff').multiplyScalar(0.045) },
    uGlow:     { value: 1.0 },
    uSpacing:  { value: 4.5 },
    uScroll:   { value: 0 },             // line offset, world units (wrapped)
    uAmp:      { value: 0 },             // terrain amplitude
    uNScale:   { value: 0.016 },         // noise frequency (roughness)
    uNOff:     { value: 0 },             // terrain scroll, noise units (wrapped)
    uPulse:    { value: 0 },             // audio-reactive line boost
    uAmpPulse: { value: 0 },             // audio-reactive terrain bump
    uTerrNear: { value: 30 },            // where hills start rising (world z)
    uLines:    { value: 1 },             // neon lines on/off (ground remains)
    uCols:     { value: Array.from({ length: 10 }, () => new THREE.Color()) },
    uNCols:    { value: 3 },             // active gradient stops (2–10)
    uGradMode: { value: 0 },             // 0 solid · 1 gradient
    uGradPh:   { value: 0 },             // gradient phase (offset + flow)
    uGradScale:{ value: 1 },             // gradient cycles per screen
    uGradDirV: { value: new THREE.Vector2(0, 1) },   // gradient direction
    uResG:     { value: new THREE.Vector2(1, 1) },   // drawing-buffer size
    uHorizC:   { value: col('#ff2d95') },// sky color right at the horizon
    uHorizAmt: { value: 1 },             // horizon wash follows fog depth
    /* road — the bed carves a flat corridor through the terrain, so
       uRoadX/uRoadCv/uCorrIn/uCorrOut are read by terrH as well and are
       shared with the sea. The rest only paints the surface.          */
    uRoadX:    { value: 0 },             // lateral offset of the centre
    uRoadCv:   { value: 0 },             // bend, world units at the horizon
    uCorrIn:   { value: 10 },            // terrain stays flat inside this
    uCorrOut:  { value: 34 },            // and is at full height past this
    uRoadW:    { value: 7.5 },           // half-width, world units
    uRoadSurf: { value: col('#0a0616') },
    uSurfAmt:  { value: 0.9 },           // how far the bed covers the grid
    uRoadGloss:{ value: 0.65 },          // wet sheen: reflection boost on the bed
    uPuddle:   { value: 0 },             // breaks that sheen into standing water
    uPuddleOff:{ value: 0 },             // puddle scroll (wrapped to NOISE_PER)
    uRoadScroll:{ value: 0 },            // dash phase (wrapped to uDashLen)
    uCtrColor: { value: col('#ffd319') },
    uCtrN:     { value: 0 },             // centre lines: 0 none · 1 single · 2 double
    uCtrDash:  { value: 0 },
    uCtrStrip: { value: 0 },             // neon inlay down the middle
    uEdgeColor:{ value: col('#f2f6ff') },
    uEdgeOn:   { value: 0 },
    uEdgeDash: { value: 0 },
    uEdgeRail: { value: 0 },             // fat neon rail instead of paint
    uLanes:    { value: 2 },
    uMarkW:    { value: 0.3 },           // marking half-width, world units
    uDashLen:  { value: 16 },            // dash period, world units
    uDashDuty: { value: 0.42 },          // painted fraction of that period
    uRoadGlow: { value: 1 },
    uRoadPulse:{ value: 0 },             // audio
    uReflect:  { value: 0 },             // sun / planet / moon reflection
    uReflScene:{ value: 0 },             // horizon layers + palms
    uReflBeam: { value: 0 },             // light beams
    uRefColor: { value: col('#ff2975') },
    uRefHue:   { value: 0 },             // reflection color hue shift (rad)
    uSunX:     { value: 0 },             // world x of the sun (reflection anchor)
    uCamH:     { value: 3.2 },           // camera height (horizon blend)
    uCamPos:   { value: new THREE.Vector3(0, 3.2, 18) },  // live camera pos
    /* horizon silhouette bank (mountains &c.) */
    uHorizTex: { value: horizTex },
    uHorizN:   { value: 0 },
    uHorizData:{ value: Array.from({ length: HORIZ_MAX },
                   () => new THREE.Vector4(0, 1, 750, 0)) },  // z, maxH, xSpan, edgeOp
    uHorizCol: { value: Array.from({ length: HORIZ_MAX }, () => new THREE.Color()) },
    uHorizEdge:{ value: col('#ff2d95') },
    uHorizSY:  { value: 1 },             // audio height scale of the range
    /* palms */
    uPalmTex:  { value: null },          // assigned once the texture exists
    uPalmN:    { value: 0 },
    uPalmData: { value: Array.from({ length: 8 },
                   () => new THREE.Vector4()) },   // x, z, height, ±halfWidth
    uPalmColor:{ value: col('#0b0318') },
    uPalmGlowC:{ value: col('#ff2d95') },
    uPalmGlowA:{ value: 0 },
    uPalmSway: { value: 0 },
    uPalmTime: { value: 0 },
    /* beams */
    uBeamN:    { value: 0 },
    uBeamData: { value: Array.from({ length: 4 },
                   () => new THREE.Vector4()) },   // x, z, halfW, height
    uBeamRot:  { value: new Float32Array(4) },
    uBeamColor:{ value: col('#7a2bff') },
    uBeamBright:{ value: 1 },
    /* mirrored-celestial reflection inputs */
    uSunY:     { value: 26 },
    uSunZ:     { value: -455 },
    uSunR:     { value: 62 },
    uSunBandShift: { value: 0 },
    uSunC1:    { value: col('#ffd319') },
    uSunC2:    { value: col('#ff2975') },
    uSunC3:    { value: col('#8c1eff') },
    uSunBands: { value: 10 },
    uSunBandW: { value: 0.55 },
    uSunBandTop:{ value: 0.52 },
    uSunMode:  { value: 0 },             // 0 sun · 1 planet · 2 wire
    uRingOn:   { value: 1 },
    uRingW:    { value: 1 },
    uSunGlow:  { value: 0.65 },          // halo size → scatter reach
    uSunGlowInt:{ value: 1 },            // halo intensity → scatter strength
    uWireDet:  { value: 1 },             // wire-moon lattice density
    uTimeG:    { value: 0 },             // wrapped time for shimmer
    uFogColor: { value: col('#2b0a56') },
    uFogNear:  { value: 60 },
    uFogFar:   { value: 460 },
  },
  vertexShader: /* glsl */`
    varying vec3  vPos;
    varying vec3  vNrm;
    varying float vDist;
    uniform float uAmp, uNScale, uNOff, uAmpPulse, uTerrNear;
    ${GLSL_HASH}
    ${GLSL_PNOISE}
    ${GLSL_ROADC}
    ${GLSL_TERR}
    void main(){
      vec3 p = position;
      vNrm = vec3(0.0, 1.0, 0.0);
      float amp = uAmp + uAmpPulse;
      if (amp > 0.001){
        p.y += terrH(p.xz, amp);
        #ifdef REFL_ANY
          /* analytic-ish normal from the same height function, so the
             reflection bends over the hills instead of ignoring them.
             Vertex-rate, and smooth (unlike faceted fragment dFdx).  */
          float e = 2.5;
          float hL = terrH(p.xz + vec2(-e, 0.0), amp);
          float hR = terrH(p.xz + vec2( e, 0.0), amp);
          float hD = terrH(p.xz + vec2(0.0, -e), amp);
          float hU = terrH(p.xz + vec2(0.0,  e), amp);
          vNrm = normalize(vec3(hL - hR, 2.0 * e, hD - hU));
        #endif
      }
      vPos = p;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      vDist = -mv.z;
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: /* glsl */`
    varying vec3  vPos;
    varying vec3  vNrm;
    varying float vDist;
    uniform vec3  uLine, uBase, uRefColor, uFogColor, uHorizC,
                  uCamPos;
    uniform vec3  uCols[10];
    uniform vec2  uGradDirV, uResG;
    #ifdef USE_ROAD
      uniform vec3  uRoadSurf, uCtrColor, uEdgeColor;
      uniform vec3  uSkyTop, uSkyMid, uSkyBot;
      uniform float uSkyMidPos;
      uniform float uRoadW, uSurfAmt, uRoadGloss, uRoadScroll,
                    uPuddle, uPuddleOff,
                    uCtrN, uCtrDash, uCtrStrip,
                    uEdgeOn, uEdgeDash, uEdgeRail,
                    uLanes, uMarkW, uDashLen, uDashDuty,
                    uRoadGlow, uRoadPulse;
    #endif
    uniform float uGlow, uSpacing, uScroll, uPulse, uLines, uReflect,
                  uReflScene, uReflBeam,
                  uHorizAmt, uRefHue,
                  uSunX, uCamH, uTimeG, uGradMode, uGradPh, uGradScale, uNCols,
                  uSunY, uSunZ, uSunR, uSunBands, uSunBandW, uSunBandTop,
                  uSunBandShift, uSunMode, uRingOn, uRingW,
                  uSunGlow, uSunGlowInt,
                  uWireDet, uFogNear, uFogFar;
    uniform vec3  uSunC1, uSunC2, uSunC3;
    #ifdef USE_REFL_SCENE
      uniform sampler2D uHorizTex;
      uniform int   uHorizN;
      uniform vec4  uHorizData[${HORIZ_MAX}];
      uniform vec3  uHorizCol[${HORIZ_MAX}];
      uniform vec3  uHorizEdge;
      uniform float uHorizSY;
      uniform sampler2D uPalmTex;
      uniform int   uPalmN;
      uniform vec4  uPalmData[8];
      uniform vec3  uPalmColor, uPalmGlowC;
      uniform float uPalmGlowA, uPalmSway, uPalmTime;
    #endif
    #ifdef USE_REFL_BEAM
      uniform int   uBeamN;
      uniform vec4  uBeamData[4];
      uniform float uBeamRot[4];
      uniform vec3  uBeamColor;
      uniform float uBeamBright;
    #endif
    vec3 hueRot(vec3 c, float a){
      const vec3 W = vec3(0.299, 0.587, 0.114);
      float ca = cos(a), sa = sin(a);
      vec3 d = c - vec3(dot(c, W));
      return vec3(dot(c, W)) + ca * d + sa * cross(vec3(0.57735), d);
    }
    ${GLSL_RING}
    ${GLSL_ROADC}
    #ifdef USE_ROAD
      ${GLSL_HASH}
      ${GLSL_PNOISE}
      /* Standing water. Puddles pool in the wheel ruts, so the noise is
         stretched hard along the road, and it scrolls WITH the surface —
         wet patches sitting still while the tarmac moves under them read
         as dirt on the lens rather than water on the ground.
         Returns 1 inside water, 0 on dry tarmac.                       */
      float puddleMask(float rx, float z){
        vec2 q = vec2(rx * ${PUDDLE_XS}, z * ${PUDDLE_NS} + uPuddleOff);
        float n = pfbm(q, ${NOISE_PER.toFixed(1)});
        /* edge softness follows the noise's on-screen size, so the far
           road settles to an even half-wet average instead of speckling */
        float w = (fwidth(q.x) + fwidth(q.y)) * 1.5;
        return smoothstep(0.5 - 0.09 - w, 0.5 + 0.09 + w, n);
      }
      /* Exact box-filter coverage of a stripe of half-width w, sampled at
         signed distance d with a filter footprint aa. Markings run from
         a few pixels wide at the camera to far under a pixel near the
         horizon, and analytic coverage is what makes that far end dim
         smoothly instead of breaking into crawling dashes.            */
      float stripeCov(float d, float w, float aa){
        aa = max(aa, 1e-4);
        return clamp((min(d + aa * 0.5, w) - max(d - aa * 0.5, -w)) / aa,
                     0.0, 1.0);
      }
      /* Dash duty at road-length coordinate z (1 unit = one dash period),
         box-filtered the same way, then collapsed to the pattern's mean
         once a whole period is thinner than a pixel — the same anti-moiré
         trick the grid lines use, or the far road would shimmer.       */
      float dashOn(float z, float duty, float aa){
        float f = fract(z);
        float e = max(aa * 0.5, 1e-4);
        float on = clamp((min(f + e, duty) - max(f - e, 0.0)) / (2.0 * e),
                         0.0, 1.0)
                 + clamp((min(f + e, duty + 1.0) - max(f - e, 1.0)) / (2.0 * e),
                         0.0, 1.0);   // second term: the next period wrapping in
        return mix(on, duty, smoothstep(0.15, 0.5, aa));
      }
      /* Soft bleed either side of a marking — only the couple of pixels
         bloom cannot resolve at distance. The wide halo is bloom's job. */
      float lineBleed(float d, float w){
        float g = max(abs(d) - w, 0.0) / max(w * 2.0, 0.32);
        return exp(-g * g * 2.5);
      }
      /* Accumulate one marking. Paint is OPAQUE: its core replaces the
         tarmac (and whatever the wet surface was mirroring there) rather
         than adding to it, and only the bleed is additive. Additive cores
         clipped every channel wherever a marking crossed the sun's
         reflection column, so neon washed out to white exactly the way
         the wire moon did over the bright sky — mixing keeps the hue.  */
      void inkAdd(vec3 col, float cov, float glow,
                  inout vec3 pc, inout float pa, inout vec3 pg){
        pc = mix(pc, col, cov / max(pa + cov, 1e-4));
        pa = min(pa + cov, 1.0);
        pg += col * glow;
      }
    #endif
    /* NOTE: pow(x, y) is undefined for x < 0 in GLSL and returns NaN on
       some GPUs (rendering as black). Every falloff here uses exp/mul
       forms with non-negative inputs instead.                          */
    void main(){
      vec2 coord = vec2(vPos.x, vPos.z + uScroll) / uSpacing;
      vec2 fw = fwidth(coord);
      // audio pulse fattens the lines as well as brightening them
      vec2 g = abs(fract(coord - 0.5) - 0.5) / (fw * (1.0 + uPulse * 0.6));
      float line = 1.0 - min(min(g.x, g.y), 1.0);
      // dim the far zone where cells shrink below a pixel (anti-moiré)
      float fade = clamp(1.5 - max(fw.x, fw.y) * 3.0, 0.0, 1.0);

      /* line color: solid, or a seamless N-stop gradient (2–10 colors).
         Computed in SCREEN space so it visibly covers the whole grid —
         a world-space gradient collapses into the horizon rows because
         perspective crams all far ground up there. uGradScale is
         "gradient cycles across the screen"; direction is a screen
         angle (matches the circular direction dial in the UI).        */
      vec3 lineCol = uLine;
      if (uGradMode > 0.5){
        vec2 sc = gl_FragCoord.xy / uResG - 0.5;
        float gc = dot(sc, uGradDirV);
        float w = fract(gc * uGradScale + uGradPh);
        float x = w * uNCols;
        float fi = floor(x);
        float f = smoothstep(0.0, 1.0, x - fi);
        float fj = mod(fi + 1.0, uNCols);
        vec3 ca = uCols[0], cb = uCols[0];
        for (int i = 0; i < 10; i++){            // uniform-safe array select
          if (float(i) == fi) ca = uCols[i];
          if (float(i) == fj) cb = uCols[i];
        }
        lineCol = mix(ca, cb, f);
      }

      /* ── ROADBED ──────────────────────────────────────────────────
         Everything about the road is measured from its own centre, so
         the bend, the lane markings and the flat terrain corridor read
         the same roadCx() and cannot disagree. Constant world width:
         perspective does the converging, which is what makes it sit on
         the ground instead of looking like a painted-on triangle.    */
      float lineMul = uLines;
      #ifdef USE_ROAD
        float rx  = vPos.x - roadCx(vPos.z);   // signed offset from centre
        float arx = abs(rx);
        float rAA = fwidth(rx) + 0.0015;       // one pixel, in road units
        float bed = stripeCov(rx, uRoadW, rAA);
        /* dashes get their OWN wrapped scroll: uScroll wraps modulo the
           grid spacing, which would teleport a dash pattern of any other
           period every time it wrapped */
        float dz  = (vPos.z + uRoadScroll) / uDashLen;
        float dAA = fwidth(dz);
        lineMul *= 1.0 - bed * uSurfAmt;   // tarmac swallows the grid
        /* Surface reflectivity. The wet sheen belongs to the WATER, not to
           the road. At puddle 0 the whole bed is one even wet film — what
           the sheen slider meant before puddles existed. As puddles rise,
           the mirror retreats into the standing water and the tarmac
           between goes MATTE: dry asphalt scatters, so it must mirror
           LESS than open ground, not merely miss out on the puddles'
           bonus. Getting that wrong is what made the whole road look
           reflective with the puddles only tinting it.                 */
        float pud = puddleMask(rx, vPos.z);
        float wetSheet = 1.0 + uRoadGloss * 1.6;               // even film
        float wetPools = mix(0.2, 1.0 + uRoadGloss * 2.6, pud);
        float wetK = mix(wetSheet, wetPools, uPuddle);
      #endif
      line *= lineMul;

      float boost = uGlow * (1.0 + uPulse) * (1.2 + 0.8 * uGlow);
      /* past line resolution (anti-moiré fade), show the pattern's MEAN
         coverage instead of fading to dark. Coverage RISES as cells
         shrink (lines dominate subpixel cells), so the grid reads as a
         bright ribbon running all the way to the horizon.             */
      float cov = min(max(fw.x, fw.y) * 1.8, 0.85);
      float lineVis = mix(cov * lineMul, line, fade);
      /* the dark ground between the lines takes the SAME color the lines
         have here — in gradient mode that means the whole floor surface
         carries the gradient, not just the lines (solid / cycle modes
         already track uBase, which JS keeps in step with uLine) */
      vec3 baseCol = uGradMode > 0.5 ? lineCol * 0.05 : uBase;
      #ifdef USE_ROAD
        /* Tarmac shading: a slight crown down the middle falling away to
           the kerbs. A flat fill reads as a hole punched in the grid;
           shading it reads as a surface with form, which is most of what
           makes the band say "road" before any marking is drawn.      */
        float cr = rx / max(uRoadW, 0.1);
        /* water darkens the tarmac it sits in — that darkening is what
           makes a puddle read as a puddle even before it mirrors anything */
        vec3 tarmac = uRoadSurf * (1.0 - 0.4 * cr * cr)
                    * (1.0 - 0.45 * pud * uPuddle);
        baseCol = mix(baseCol, tarmac, bed * uSurfAmt);
      #endif
      vec3 c = baseCol + lineCol * (lineVis * boost);
      float ff = smoothstep(uFogNear, uFogFar, vDist);
      c = mix(c, uFogColor, ff);
      /* blend the far rows into the sky's exact horizon color so the
         floor meets the sky without a visible dark seam. Perspective
         crams hundreds of world units into the last screen rows, so the
         blend is driven by SCREEN angle below the horizon (camH/dist),
         gated so raised terrain keeps its own color. */
      float hb = 0.0;                 // horizon wash, reused by the road
      {
        float angD = uCamH / max(vDist, 2.0);
        /* also cover the anti-moiré zone (fade→0): rows too far to draw
           lines would otherwise sit as a dark lineless stripe */
        hb = max(1.0 - smoothstep(0.012, 0.05, angD),
                 (1.0 - fade) * 0.92);
        hb *= (1.0 - smoothstep(2.0, 12.0, vPos.y))
            * smoothstep(45.0, 75.0, vDist)
            * uHorizAmt;              // clear air = crisp dark horizon
        c = mix(c, uHorizC, hb);
      }

      /* ── WET REFLECTIONS ───────────────────────────────────────────
         One reflected ray per floor pixel, traced against each source's
         plane. Using a real ray (rather than screen-space angles) means
         the terrain normal bends it, so hills warp the reflection, and
         camera sway/orbit move it coherently with the scene.
         Each source compiles in only when its slider is above zero.   */
      #ifdef REFL_ANY
      {
        vec3 Vw = normalize(vPos - uCamPos);
        /* blend the terrain normal part-way to flat: a fully physical
           normal scatters the image into noise over rough hills, while
           ignoring it entirely leaves the reflection sliding over the
           terrain as if the floor were still a mirror */
        vec3 Nw = normalize(mix(vec3(0.0, 1.0, 0.0), normalize(vNrm), 0.8));
        vec3 Rd = reflect(Vw, Nw);
        float rl = length(Rd.xz);
        if (Rd.y > 0.0005 && Rd.z < -0.0001 && rl > 1e-4){
          /* water wobble: a small horizontal jitter of the ray */
          float ripple = sin(vPos.z * 0.33 + uTimeG * 1.5) * 0.05
                       + sin(vPos.z * 0.11 - uTimeG * 0.6) * 0.07;
          #ifdef USE_ROAD
            /* Standing water is not a flat mirror. Rippling the ray inside
               the puddles breaks the reflection into the wobbling streaks
               that read as liquid — without it a puddle is just a glossier
               patch of paint. Dry tarmac is left alone.
               Damped by fade*fade: this sits inside non-uniform control
               flow so fwidth is not available to size the waves against
               the pixel, and undamped the z terms alias into banding.  */
            ripple += (sin(vPos.x * 1.7 + vPos.z * 0.28 + uTimeG * 2.6) * 0.5
                     + sin(vPos.x * 2.9 - vPos.z * 0.45 + uTimeG * 1.7) * 0.35)
                    * pud * uPuddle * bed * fade * fade * 1.6;
          #endif
          Rd.x += ripple * 0.012;
          /* progressive vertical smear: none at the horizon, growing as
             the reflection approaches the camera. Scaling the RAY (not
             each image) stretches every source consistently. The wire
             moon's mirrored geometry uses the same two constants — see
             REFL_STRETCH / the 0.06 saturation angle in wireReflMat.  */
          float steep = clamp((Rd.y / rl) / 0.06, 0.0, 1.0);
          Rd.y /= (1.0 + ${REFL_STRETCH} * steep);

          vec3  refl  = vec3(0.0);
          float cover = 0.0;          // opaque coverage, near → far

          #ifdef USE_REFL_SCENE
          /* — palms (nearest) — */
          for (int i = 0; i < 8; i++){
            if (i >= uPalmN) break;
            vec4 P = uPalmData[i];
            float t = (P.y - vPos.z) / Rd.z;
            if (t <= 0.0) continue;
            float hy = vPos.y + Rd.y * t;
            float vy = (hy + 1.0) / max(P.z, 1.0);      // quad spans y -1 … h-1
            if (vy < 0.0 || vy > 1.0) continue;
            float hx = vPos.x + Rd.x * t;
            /* mirror the vertex-stage wind sway so the reflection sways */
            float ph = P.x * 0.37 + P.y * 0.11;
            float off = sin(uPalmTime * 1.3 + ph) * vy * vy * uPalmSway * 2.9;
            float hw = abs(P.w);
            float ux = (hx - off - P.x) / (2.0 * hw) + 0.5;
            if (P.w < 0.0) ux = 1.0 - ux;
            if (ux < 0.0 || ux > 1.0) continue;
            float a = smoothstep(0.20, 0.36, texture2D(uPalmTex, vec2(ux, vy)).a);
            if (a < 0.01) continue;
            float fp = smoothstep(uFogNear, uFogFar,
                                  distance(vec2(P.x, P.y), uCamPos.xz));
            vec3 pc = mix(uPalmColor, uFogColor, fp) + uPalmGlowC * uPalmGlowA;
            float k = a * (1.0 - cover) * uReflScene;
            refl += pc * k; cover += a * (1.0 - cover);
          }
          #endif

          #ifdef USE_REFL_SCENE
          /* — horizon silhouettes (mountains &c.), nearest row first — */
          for (int i = 0; i < ${HORIZ_MAX}; i++){
            if (i >= uHorizN) break;
            if (cover > 0.97) break;
            vec4 L = uHorizData[i];                    // z, maxH, xSpan, edgeOp
            float t = (L.x - vPos.z) / Rd.z;
            if (t <= 0.0) continue;
            float hy = vPos.y + Rd.y * t;
            if (hy < 0.0) continue;
            float ux = (vPos.x + Rd.x * t) / L.z * 0.5 + 0.5;
            if (ux < 0.0 || ux > 1.0) continue;
            float ridge = texture2D(uHorizTex,
              vec2(ux, (float(i) + 0.5) / ${HORIZ_MAX}.0)).r * L.y * uHorizSY;
            float e = max(fwidth(hy), 0.35);
            float m = 1.0 - smoothstep(-e, e, hy - ridge);
            if (m < 0.004) continue;
            float k = m * (1.0 - cover);
            refl += uHorizCol[i] * k * uReflScene;
            /* the neon ridge line reads as the brightest part of a
               mountain reflection, so trace it too */
            float el = 1.0 - smoothstep(0.0, e * 2.5, abs(hy - ridge));
            refl += uHorizEdge * el * L.w * (1.0 - cover) * uReflScene;
            cover += m * (1.0 - cover);
          }
          #endif

          #ifdef USE_REFL_BEAM
          /* — beams: additive glow, evaluated analytically. Traced AFTER
               the horizon because the shafts stand behind it (z=-448 vs
               the nearest row at -432), so a ridge or a tower masks the
               reflected beam exactly as it masks the beam itself.     */
          for (int i = 0; i < 4; i++){
            if (i >= uBeamN) break;
            vec4 B = uBeamData[i];
            float t = (B.y - vPos.z) / Rd.z;
            if (t <= 0.0) continue;
            vec2 d = vec2(vPos.x + Rd.x * t - B.x, vPos.y + Rd.y * t);
            float cs = cos(uBeamRot[i]), sn = sin(uBeamRot[i]);
            vec2 lp = vec2(d.x * cs + d.y * sn, -d.x * sn + d.y * cs);
            float vy = lp.y / max(B.w, 1.0);
            if (vy < 0.0 || vy > 1.0) continue;
            float ux = lp.x / max(B.z, 0.001);
            float yv = 1.0 - vy;
            float a  = exp(-ux * ux * 4.5) * yv * sqrt(yv);
            float core = exp(-ux * ux * 16.0) * yv;
            refl += (uBeamColor * 1.9 + uBeamColor * core * uBeamBright * 2.4)
                  * a * (1.0 - cover) * uReflBeam;
          }
          #endif

          #ifdef USE_REFL_SUN
          /* — the celestial, farthest: a true mirrored disc — */
          {
            float t = (uSunZ - vPos.z) / Rd.z;
            if (t > 0.0){
              vec2 dS = vec2(vPos.x + Rd.x * t - uSunX,
                             vPos.y + Rd.y * t - uSunY) / max(uSunR, 1.0);
              float rr = length(dS);
              /* mirrored, so the rows nearest the horizon show the
                 celestial's LOWER limb: tG runs 0 (bottom) → 1 (top) */
              float tG = clamp(dS.y * 0.5 + 0.5, 0.0, 1.0);
              vec3 sg = mix(uSunC3, uSunC2, smoothstep(0.0, 0.55, tG));
              sg = mix(sg, uSunC1, smoothstep(0.55, 1.0, tG));
              float discM, bm = 1.0, ringA = 0.0;
              vec3 ringC = vec3(0.0);
              if (uSunMode > 1.5){
                /* wire moon: the mirrored wireframe geometry is drawn on
                   the floor, so this only adds the wet pool beneath it */
                discM = exp(-rr * rr * 1.9) * 0.22;
              } else {
                discM = 1.0 - smoothstep(0.86, 1.06, rr);
                if (uSunMode > 0.5){
                  float q = min(rr, 1.0);
                  float sh = sqrt(1.0 - q * q);
                  bm = (0.45 + 0.55 * sh)
                     * (0.85 + 0.15 * sin(dS.y * 7.0 + 1.3));
                  if (uRingOn > 0.5){
                    /* the ring reflects too — same shared sampler, same
                       near/far split, so the mirrored planet keeps its
                       ring instead of losing it */
                    vec3 RG = ringSample(dS, uRingW, fwidth(rr) * 1.5);
                    ringA = RG.x * mix(1.0 - discM, 1.0, RG.y);
                    ringC = mix(uSunC1, uSunC2, RG.z * 0.45) * 1.15;
                  }
                } else if (uSunBands > 0.5 && tG < uSunBandTop){
                  float k = (uSunBandTop - tG) / max(uSunBandTop, 0.02);
                  float gap = uSunBandW * 0.75 * k;
                  float ee = fwidth(tG) * uSunBands * 1.5 + 0.03;
                  bm = smoothstep(gap - ee, gap + ee,
                                  fract((tG + uSunBandShift) * uSunBands));
                }
              }
              vec3 rc = sg * discM * bm;
              rc = mix(rc, ringC, clamp(ringA, 0.0, 1.0));
              rc += sg * exp(-max(rr - 1.0, 0.0) * 3.5) * 0.06;  // bloom spill
              /* — halo scatter —
                 The glow's light spilling across the floor, on top of the
                 mirrored disc above. Deliberately broader and softer than
                 the halo itself: a rough floor scatters a highlight much
                 wider than it mirrors it, so this reads as a faint tint on
                 the ground rather than a second copy of the halo. Reach
                 follows the halo's SIZE, strength its INTENSITY, and both
                 vanish with either — matching how the halo itself is built
                 (profile * uGlow * uGlowInt) so the two can't disagree.  */
              float scR = 0.6 + 3.2 * uSunGlow;          // reach, disc radii
              float sd = max(rr - 0.9, 0.0) / scR;
              rc += uSunC2 * 1.3                          // the halo's colour
                  * exp(-sd * sd * 2.0)
                  * uSunGlow * uSunGlowInt * 0.17;
              refl += rc * (1.0 - cover) * uReflect;
            }
          }
          #endif

          if (uRefHue != 0.0) refl = hueRot(refl, uRefHue);
          float st = 0.85 + 0.15 * sin(vPos.x * 0.55
                   + sin(vPos.x * 0.213) * 2.7 + uTimeG * 0.4);
          float shimmer = 0.9 + 0.1 * sin(vPos.z * 0.6 + uTimeG * 2.1);
          /* wet tarmac mirrors harder than open ground — this is what
             puts the sun's column down the road in the reference shots */
          float wet = 1.0;
          #ifdef USE_ROAD
            wet = mix(1.0, wetK, bed);   // open ground · tarmac · water
          #endif
          /* mostly ambient so the mirrored image is plainly visible on
             the floor, with a small extra kick on the grid lines */
          c += refl * shimmer * st * (0.8 + 0.45 * line * fade)
             * (1.0 + uPulse * 0.7) * wet;
        }
      }
      #endif
      /* ── ROAD MARKINGS ────────────────────────────────────────────
         Painted last: paint sits on top of the tarmac and its wet sheen.
         Colours are pushed above 1 so the bloom pass gives them their
         halo, which is why these read as lit neon rather than as flat
         decals.                                                       */
      #ifdef USE_ROAD
      {
        /* ── SKY IN THE WATER ──
           The floor's ray-traced mirror covers the sun, scenery and beams
           but NOT the open sky — and over most of a road the sky is the
           only thing there is to reflect. So a puddle samples the sky
           dome's own 3-stop gradient along a reflected ray, Fresnel
           weighted, with two crossed ripples bending the water's normal:
           the same construction the sea shader uses.
           This has to be a real mirror. A flat colour wash here (the first
           attempt) just painted the puddles a colour while the dry tarmac
           kept mirroring everything, which is backwards.               */
        vec3 Vp = normalize(vPos - uCamPos);
        /* Sampled off the FLAT mirror ray, never the rippled one. The road
           is seen at a hair above grazing, so its own ray elevation is
           tiny (≈camH/dist) — a ripple bends the ray several times harder
           than that, sweeping a huge arc of the sky dome per pixel. The
           gradient then boils, and in screen space it banded into
           horizontal stripes right across the road. This is the same rule
           the sea's sun glint follows, for the same reason.            */
        float el = max(-Vp.y, 0.0);              // flat-water ray elevation
        float hh = clamp(el * 1.6 + 0.02, 0.0, 1.0);
        vec3 sky = hh < uSkyMidPos
          ? mix(uSkyBot, uSkyMid, smoothstep(0.0, uSkyMidPos, hh))
          : mix(uSkyMid, uSkyTop, smoothstep(uSkyMidPos, 1.0, hh));
        /* Ripples modulate the water's BRIGHTNESS instead, which reads as
           wobble without touching the colour.
           Their variation is kept almost entirely in X. Perspective
           crushes z — hundreds of world units into the last screen rows —
           so ANY appreciable z-frequency turns into transverse banding
           across the road however well it is anti-aliased. Waves running
           along the travel direction are also what water on a road
           actually looks like. Each wave additionally dies as its own
           wavelength nears pixel size, the guard seaMat's slopeAdd uses. */
        float pw = fwidth(vPos.x) + fwidth(vPos.z);
        float d1 = 1.92 * pw, d2 = 3.13 * pw;    // |frequency| of each wave
        float rip = sin(vPos.x * 1.9 + vPos.z * 0.25 + uTimeG * 2.4)
                      * exp(-d1 * d1)
                  + sin(vPos.x * 3.1 - vPos.z * 0.4 + uTimeG * 1.6) * 0.7
                      * exp(-d2 * d2);
        /* Grazing water mirrors hard, steep water shows the tarmac under
           it — which is why the far road goes bright and near puddles stay
           darker. The floor is well above the physical 0.04 (the sea
           shader does the same): at this camera height the near rows are
           steep enough that a physical Fresnel makes puddles vanish
           exactly where the viewer is looking. Base is clamped to [0,1]
           so pow is always defined.                                    */
        float Fp = 0.18 + 0.82 * pow(1.0 - clamp(el, 0.0, 1.0), 5.0);
        c += sky * Fp * (1.0 + rip * 0.3) * pud * uPuddle * bed * uRoadGloss
           * 0.7 * (1.0 - ff) * (1.0 - hb);

        float dash = dashOn(dz, uDashDuty, dAA);
        vec3  pc = vec3(0.0);        // paint colour, coverage-weighted
        float pa = 0.0;              // paint coverage
        vec3  pg = vec3(0.0);        // additive bleed around the paint
        /* Painted markings sit just under 1 so they read as retroreflective
           paint; the neon styles run above it and bloom in their own hue. */
        const float PAINT = 0.85, NEON = 1.7, BLEED = 0.3;

        /* centre: one line, or a pair straddling the middle */
        if (uCtrN > 0.5){
          float sep = uMarkW * 3.5;
          float o = uCtrN > 1.5 ? sep : 0.0;
          float d1 = rx - o, d2 = rx + o;
          float dsh = mix(1.0, dash, uCtrDash);
          float cov = (stripeCov(d1, uMarkW, rAA)
                     + stripeCov(d2, uMarkW, rAA) * step(0.5, uCtrN - 1.5)) * dsh;
          float bl  = (lineBleed(d1, uMarkW)
                     + lineBleed(d2, uMarkW) * step(0.5, uCtrN - 1.5)) * dsh;
          inkAdd(uCtrColor * PAINT, min(cov, 1.0), bl * BLEED, pc, pa, pg);
        }
        /* neon inlay — a light bar sunk INTO the tarmac rather than paint
           laid on top of it, so it keeps glowing where the surface is
           darkest and throws a wide spill across the lanes either side */
        if (uCtrStrip > 0.5){
          float w = uMarkW * 2.6;
          float g = max(arx - w, 0.0) / max(uRoadW * 0.3, 0.5);
          inkAdd(uCtrColor * NEON, stripeCov(rx, w, rAA),
                 exp(-g * g * 3.0) * 0.28, pc, pa, pg);
        }
        /* lane dividers, always dashed. Constant loop bounds with the
           uniform test inside — GLSL ES wants the count fixed. An even
           lane count puts a boundary exactly on the centre line; that slot
           belongs to the centre style, so it is skipped, not drawn twice. */
        if (uLanes > 1.5){
