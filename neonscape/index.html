          for (int i = 1; i < 6; i++){
            float fi = float(i);
            if (fi < uLanes){
              float o = uRoadW * (2.0 * fi / uLanes - 1.0);
              float w = uMarkW * 0.8;
              float k = dash * step(uMarkW * 4.0, abs(o));
              inkAdd(uEdgeColor * PAINT, stripeCov(rx - o, w, rAA) * k,
                     lineBleed(rx - o, w) * k * BLEED, pc, pa, pg);
            }
          }
        }
        /* edges: painted lines, or fat neon rails set just inside the kerb */
        if (uEdgeOn > 0.5){
          float ew = mix(uMarkW, uMarkW * 2.2, uEdgeRail);
          float o  = uRoadW - ew * 1.4;
          float dsh = mix(1.0, dash, uEdgeDash);
          float cov = (stripeCov(rx - o, ew, rAA)
                     + stripeCov(rx + o, ew, rAA)) * dsh;
          float bl  = (lineBleed(rx - o, ew) + lineBleed(rx + o, ew)) * dsh;
          inkAdd(uEdgeColor * mix(PAINT, NEON, uEdgeRail), min(cov, 1.0),
                 bl * mix(BLEED, 0.7, uEdgeRail), pc, pa, pg);
        }
        /* Keep the paint on the tarmac — a little wider than the bed so the
           bleed can spill over the kerb — and let it die into the fog and
           the horizon wash exactly as the floor beneath it does.
           Glow above 1 brightens the paint (into bloom); below 1 it fades
           the coverage instead, so 0 means "no markings" rather than
           "markings painted black".                                    */
        float gate = stripeCov(rx, uRoadW * 1.12, rAA);
        float vis  = gate * (1.0 - ff) * (1.0 - hb);
        float bright = uRoadGlow * (1.0 + uRoadPulse);
        c = mix(c, pc * max(bright, 1.0), pa * vis * min(bright, 1.0));
        c += pg * bright * vis;
      }
      #endif
      gl_FragColor = vec4(c, 1.0);
    }`
});
/* Puddles mirror the sky, so they read the sky dome's OWN uniform objects
   rather than copies — the water cannot drift from the sky above it, and
   the per-frame hue shift carries into the reflection for free. */
for (const [g, s] of [['uSkyTop','uTop'], ['uSkyMid','uMid'],
                      ['uSkyBot','uBot'], ['uSkyMidPos','uMidPos']])
  gridMat.uniforms[g] = skyMat.uniforms[s];
const gridGeo = new THREE.PlaneGeometry(900, 520, 150, 130);
gridGeo.rotateX(-Math.PI / 2);
gridGeo.translate(0, 0, -210);           // spans z +50 … -470
const gridMesh = new THREE.Mesh(gridGeo, gridMat);
gridMesh.frustumCulled = false;
scene.add(gridMesh);

/* ════════════════════════════════════════════════════════════════════
   8. HORIZON — mountains / cityscape / sea (one active at a time)
   ════════════════════════════════════════════════════════════════════ */

const mtnGroup = new THREE.Group();
scene.add(mtnGroup);
const cityGroup = new THREE.Group();
scene.add(cityGroup);

const MTN_W = 1500;                       // world width of the ridge span
/** ridge height at world x for one layer — the single source of truth
    shared by the drawn geometry and the baked reflection heightfield */
function ridgeAt(noise, x, H, freq, off){
  const ridge = Math.max(0, noise.fbm1(x * freq + off, 4) * 1.4 - 0.5) * H + 1.2;
  // fade ridges to the floor at screen edges so silhouettes never end abruptly
  return ridge * clamp(2.2 - Math.abs(x) / (MTN_W * 0.32), 0, 1);
}
/* ── city skyline data ────────────────────────────────────────────────
   Buildings live in fixed-width slots across the span. Each slot gets a
   height, side gaps and a window seed from a seeded rng; the SAME array
   feeds the row's shader (via a float DataTexture) and the reflection
   bank bake, so the skyline and its reflection can never disagree.    */
const CITY_ROWS_MAX = 3, CITY_SLOTS_MAX = 512, CITY_Z0 = -432;
const CITY_H_MAX = 1.9;                  // ceiling for the audio height pulse
/** Half-width the skyline must reach for `spread` of the SCREEN, so the
    max setting spans the horizon on any aspect ratio instead of running
    out of buildings on ultrawide displays. */
function cityHalfWidth(){
  const d = -CITY_Z0 + 18;                   // horizon row → camera distance
  /* This sizes real geometry, so it never trusts a float it did not compute
     itself. A non-finite aspect (see applyRendererSize) would otherwise
     build a PlaneGeometry of NaN vertices; three then reports a NaN
     bounding sphere and the driver answers INVALID_VALUE then
     INVALID_OPERATION for two frames, until any resize quietly heals it. */
  const asp = camera.aspect > 0 && Number.isFinite(camera.aspect)
    ? camera.aspect : 1;
  const halfScreen = d * Math.tan(state.cam.fov * Math.PI / 360) * asp;
  return Math.max(halfScreen * 1.06 * clamp(state.mtn.spread, 0.04, 1), 12);
}
/** spread falloff, 1 in the core → 0 at the edge. Shared by the shader
    and the reflection bake via the identical GLSL below. */
function citySpreadK(x, halfW){
  const t = clamp((Math.abs(x) / halfW - 0.55) / 0.45, 0, 1);
  return 1 - t * t * (3 - 2 * t);            // smoothstep(0.55, 1, |x|/halfW)
}
const GLSL_CITY_SPREAD = /* glsl */`
  float citySpreadK(float x, float halfW){
    return 1.0 - smoothstep(0.55, 1.0, abs(x) / halfW);
  }`;
/** Raw slot heights, independent of spread — spread is applied later as a
    multiplier so changing it (or resizing) never reshuffles the skyline. */
function citySlots(m, li){
  const rng = mulberry32((((m.seed | 0) * 7349 + li * 131071) >>> 0) || 1);
  const slotW = 15 / clamp(m.density, 0.4, 2.5);
  const spanW = Math.min(cityHalfWidth() * 2.1, CITY_SLOTS_MAX * slotW);
  const n = Math.max(Math.ceil(spanW / slotW), 8);
  const H = m.height * Math.max(0.35, 1 - li * 0.22);   // nearer rows lower
  const data = new Float32Array(n * 4);
  for (let i = 0; i < n; i++){
    let h = 0;
    const empty = rng() < (li === 0 ? 0.08 : 0.03);     // skyline gaps
    const v = rng(), tower = rng() < 0.05 + 0.02 * m.rough;
    if (!empty){
      // rough = variety: higher pushes most buildings low, towers stand out
      h = H * (0.25 + 0.75 * Math.pow(v, 0.55 * m.rough + 0.45));
      if (tower) h = H * (0.95 + 0.3 * rng());
    }
    data[i * 4]     = h;
    data[i * 4 + 1] = 0.05 + rng() * 0.13;              // gap left  (slot frac)
    data[i * 4 + 2] = 0.05 + rng() * 0.13;              // gap right
    data[i * 4 + 3] = rng();                            // window seed
  }
  return { data, n, slotW, spanW: n * slotW };
}
/** skyline height at world x — bake-side mirror of the city shader */
function cityHAt(s, x, halfW){
  const u = (x + s.spanW / 2) / s.slotW;
  const i = Math.floor(u);
  if (i < 0 || i >= s.n) return 0;
  const f = u - i, o = i * 4;
  if (f < s.data[o + 1] || f > 1 - s.data[o + 2]) return 0;
  return s.data[o] * citySpreadK(x, halfW);
}

/** bake every horizon layer into the shared silhouette texture, nearest
    row first (the reflection loop walks near → far and stops on a hit) */
function bakeHorizon(){
  const m = state.mtn;
  const u = gridMat.uniforms;
  const isM = m.mode === 'mountains', isC = m.mode === 'city';
  if (!isM && !isC){ u.uHorizN.value = 0; return; }
  const noise = isM ? makeNoise((m.seed | 0) ^ 0x5eed) : null;
  const L = Math.min(m.layers, isC ? CITY_ROWS_MAX : HORIZ_MAX);
  const halfW = isC ? cityHalfWidth() : 0;
  const prof = new Float32Array(HORIZ_W);
  for (let row = 0; row < L; row++){
    const li = L - 1 - row;                       // row 0 = nearest layer
    const z = CITY_Z0 + li * 20;
    let maxH = 1e-3, span = MTN_W / 2;
    if (isM){
      const H = m.height * Math.max(0.22, 1 - li * 0.15);
      const freq = 0.0042 * m.rough * (1 + li * 0.35);
      const off = li * 137.7;
      for (let i = 0; i < HORIZ_W; i++){
        const x = -span + (i / (HORIZ_W - 1)) * MTN_W;
        const y = ridgeAt(noise, x, H, freq, off);
        prof[i] = y;
        if (y > maxH) maxH = y;
      }
    } else {
      const slots = citySlots(m, li);
      span = slots.spanW / 2;                     // the row's own x range
      for (let i = 0; i < HORIZ_W; i++){
        const x = -span + (i / (HORIZ_W - 1)) * slots.spanW;
        const y = cityHAt(slots, x, halfW);
        prof[i] = y;
        if (y > maxH) maxH = y;
      }
    }
    // stored normalised per layer, so 8 bits still resolve <0.2 world units
    for (let i = 0; i < HORIZ_W; i++){
      const o = (row * HORIZ_W + i) * 4;
      horizData[o] = Math.round(clamp(prof[i] / maxH, 0, 1) * 255);
      horizData[o + 1] = horizData[o + 2] = 0;
      horizData[o + 3] = 255;
    }
    u.uHorizData.value[row].set(z, maxH, span,
      clamp(1 - li * 0.28, 0.25, 1) * (isC ? 0.3 : 0.5)); // edge-line opacity
  }
  u.uHorizN.value = L;
  horizTex.needsUpdate = true;
}

function rebuildMountains(){
  // dispose previous
  for (const child of [...mtnGroup.children]){
    child.geometry.dispose(); child.material.dispose();
    mtnGroup.remove(child);
  }
  const m = state.mtn;
  if (m.mode !== 'mountains') return;

  const noise = makeNoise((m.seed | 0) ^ 0x5eed);
  const W = MTN_W, N = 220;

  for (let li = 0; li < m.layers; li++){
    const z = -432 + li * 20;                       // farthest layer first
    const H = m.height * Math.max(0.22, 1 - li * 0.15);  // nearer layers lower
    const freq = 0.0042 * m.rough * (1 + li * 0.35);
    const off = li * 137.7;

    const top = new Float32Array((N + 1) * 3);
    const pos = new Float32Array((N + 1) * 2 * 3);  // top+bottom strip
    const idx = [];
    for (let i = 0; i <= N; i++){
      const x = -W / 2 + (i / N) * W;
      const y = ridgeAt(noise, x, H, freq, off);
      top.set([x, y, z], i * 3);
      pos.set([x, y, z], i * 6);
      pos.set([x, -2, z], i * 6 + 3);
      if (i < N){
        const a = i * 2;
        idx.push(a, a + 1, a + 2, a + 1, a + 3, a + 2);
      }
    }
    const fillGeo = new THREE.BufferGeometry();
    fillGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    fillGeo.setIndex(idx);
    // scene fog at this distance would erase the silhouette entirely, so
    // atmospheric depth is blended manually per layer (see recolorHorizon)
    const fill = new THREE.Mesh(fillGeo,
      new THREE.MeshBasicMaterial({ fog: false }));
    fill.frustumCulled = false;
    fill.userData = { li, kind: 'fill' };
    mtnGroup.add(fill);

    const edgeGeo = new THREE.BufferGeometry();
    edgeGeo.setAttribute('position', new THREE.BufferAttribute(top, 3));
    const edge = new THREE.Line(edgeGeo,
      new THREE.LineBasicMaterial({ transparent: true,
        opacity: clamp(1 - li * 0.28, 0.25, 1),
        blending: THREE.AdditiveBlending, depthWrite: false, fog: false }));
    edge.frustumCulled = false;
    edge.userData = { li, kind: 'edge' };
    mtnGroup.add(edge);
  }
  bakeHorizon();
  recolorHorizon();
}

/* ── cityscape rows — procedural buildings with lit windows ─────────── */
const CITY_VERT = /* glsl */`
  varying vec3 vW;
  void main(){
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vW = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }`;
const CITY_FRAG = /* glsl */`
  varying vec3 vW;
  uniform sampler2D uCityTex;
  uniform float uSlots, uSlotW, uSpanW, uHalfW, uHScale, uLit, uWinA, uEdgeGlow;
  uniform vec3 uFill, uWinC, uEdgeC;
  ${GLSL_HASH}
  ${GLSL_CITY_SPREAD}
  void main(){
    float u = (vW.x + uSpanW * 0.5) / uSlotW;
    float slot = floor(u);
    if (slot < 0.0 || slot >= uSlots) discard;
    vec4 B = texture2D(uCityTex, vec2((slot + 0.5) / uSlots, 0.5));
    // spread is a per-slot multiplier (never regenerates the skyline) and
    // uHScale is the audio height pulse — both mirrored in the bake
    float h = B.r * citySpreadK(vW.x, uHalfW) * uHScale;
    if (h < 0.6) discard;
    float f = u - slot;
    /* screen-space AA on the hard silhouette edges (roof + both sides) */
    float px = fwidth(vW.x), py = fwidth(vW.y);
    float pf = px / uSlotW;
    float alpha = smoothstep(B.g - pf, B.g + pf, f)
                * (1.0 - smoothstep(1.0 - B.b - pf, 1.0 - B.b + pf, f))
                * (1.0 - smoothstep(h - py, h + py, vW.y));
    if (alpha < 0.002) discard;
    /* windows: fixed world-size cells, LOD-faded to an average glow when
       a cell drops under ~3 px so far rows don't shimmer */
    vec2 cell = vec2(vW.x / 2.3, (vW.y + 1.0) / 3.5);
    vec2 ci = floor(cell), cf = fract(cell);
    float lit = step(hash21(ci + vec2(B.a * 917.3, B.a * 271.9)), uLit);
    float pxc = px / 2.3, pyc = py / 3.5;
    float wx = smoothstep(0.24 - pxc, 0.24 + pxc, cf.x)
             * (1.0 - smoothstep(0.76 - pxc, 0.76 + pxc, cf.x));
    float wy = smoothstep(0.30 - pyc, 0.30 + pyc, cf.y)
             * (1.0 - smoothstep(0.72 - pyc, 0.72 + pyc, cf.y));
    float lod = smoothstep(0.9, 0.4, pxc);
    /* keep windows clear of the roofline and the building edges */
    float inset = step(B.g + 0.05, f) * step(f, 0.95 - B.b)
                * (1.0 - smoothstep(h - 3.2, h - 1.4, vW.y));
    float win = mix(uLit * 0.20, wx * wy * lit, lod) * inset;
    vec3 c = uFill;
    c = mix(c, uFill * 0.45, (1.0 - lit) * wx * wy * lod * inset);  // dark glass
    c += uWinC * win * uWinA;
    /* thin neon roofline */
    c += uEdgeC * smoothstep(h - py * 2.5, h - py * 0.5, vW.y);
    gl_FragColor = vec4(c, alpha);
  }`;

function rebuildCity(){
  for (const c of [...cityGroup.children]){
    c.geometry.dispose();
    c.material.uniforms.uCityTex.value.dispose();
    c.material.dispose();
    cityGroup.remove(c);
  }
  const m = state.mtn;
  if (m.mode !== 'city') return;
  const L = Math.min(m.layers, CITY_ROWS_MAX);
  const halfW = cityHalfWidth();
  for (let li = 0; li < L; li++){
    const slots = citySlots(m, li);
    const tex = new THREE.DataTexture(slots.data, slots.n, 1,
      THREE.RGBAFormat, THREE.FloatType);
    tex.minFilter = tex.magFilter = THREE.NearestFilter;
    tex.needsUpdate = true;
    // headroom for the audio height pulse, or tall beats would clip
    const maxH = m.height * 1.35 * CITY_H_MAX + 6;
    const mat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false, fog: false,
      uniforms: {
        uCityTex: { value: tex },
        uSlots:   { value: slots.n },
        uSlotW:   { value: slots.slotW },
        uSpanW:   { value: slots.spanW },
        uHalfW:   { value: halfW },
        uHScale:  { value: 1 },
        uLit:     { value: m.lit },
        uWinA:    { value: 1 },
        uEdgeGlow:{ value: m.edgeGlow },
        uFill:    { value: col(m.fill) },
        uWinC:    { value: col(m.edge) },
        uEdgeC:   { value: col(m.edge) },
      },
      vertexShader: CITY_VERT, fragmentShader: CITY_FRAG,
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(slots.spanW, maxH), mat);
    mesh.position.set(0, maxH / 2 - 2, CITY_Z0 + li * 20);
    mesh.frustumCulled = false;
    mesh.userData = { li };
    cityGroup.add(mesh);
  }
  bakeHorizon();
  recolorHorizon();
}

/* ── sea — far water band with real specular reflections ──────────────
   A flat plane whose normals are perturbed analytically per pixel; the
   reflected view ray then samples the sky gradient (Fresnel-weighted)
   and picks up the sun as a wave-broken glint column — sea-style
   reflections, not the floor shader's mirror smear. Invisible (zero
   draw calls, zero shading) in every other horizon mode.              */
const seaMat = new THREE.ShaderMaterial({
  /* depthTest OFF: the water sits 0.12 above the grid plane, far beyond
     depth-buffer resolution at 100-450 units — testing z-fights into
     stripes. Painting over the floor is also the wanted look: palms and
     beams (nearer, sorted later) rise out of the water, terrain can't
     poke through it, and the floor's own sun reflection is replaced by
     the sea's glint.                                                   */
  transparent: true, depthWrite: false, depthTest: false, fog: false,
  uniforms: {
    uTime:   { value: 0 },
    uWaveA:  { value: 0.5 },
    uWaveSpd:{ value: 0.5 },
    uChop:   { value: 1.0 },
    uGlint:  { value: 1.0 },
    uGlintBeam:{ value: 1.0 },
    uWaterY: { value: 0.55 },           // waterline in world units
    uWater:  { value: col('#0e0426') },
    uEdgeC:  { value: col('#ff2d95') },
    uSkyTop: { value: col('#070118') },
    uSkyMid: { value: col('#2b0a56') },
    uSkyBot: { value: col('#ff2d95') },
    uMidPos: { value: 0.42 },
    uHaze:   { value: 0.5 },
    uHazeC:  { value: col('#2b0a56') },
    uHorizC: { value: col('#ff2d95') },
    uHueR:   { value: 0 },
    uSunX:   { value: 0 },
    uSunY:   { value: 26 },
    uSunZ:   { value: -455 },
    uSunR:   { value: 62 },
    uSunOn:  { value: 1 },
    uSunC1:  { value: col('#ffd319') },
    uSunC2:  { value: col('#ff2975') },
    uSunC3:  { value: col('#8c1eff') },
    uZNear:  { value: -260 },
    uZFar:   { value: -450 },
  },
  vertexShader: /* glsl */`
    varying vec3 vW;
    void main(){
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vW = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: /* glsl */`
    varying vec3 vW;
    uniform float uTime, uWaveA, uWaveSpd, uChop, uGlint, uGlintBeam, uWaterY,
                  uMidPos, uHaze, uZNear, uZFar,
                  uSunX, uSunY, uSunZ, uSunR, uSunOn, uHueR;
    uniform vec3  uWater, uEdgeC, uSkyTop, uSkyMid, uSkyBot, uHazeC, uHorizC,
                  uSunC1, uSunC2, uSunC3;
    // shared uniform OBJECTS with gridMat — terrain and beams can't drift
    uniform float uAmp, uAmpPulse, uNScale, uNOff, uTerrNear;
    uniform int   uBeamN;
    uniform vec4  uBeamData[4];
    uniform float uBeamRot[4];
    uniform vec3  uBeamColor;
    uniform float uBeamBright;
    ${GLSL_HASH}
    ${GLSL_PNOISE}
    ${GLSL_ROADC}
    ${GLSL_TERR}
    vec3 hueRot(vec3 c, float a){
      const vec3 W = vec3(0.299, 0.587, 0.114);
      float ca = cos(a), sa = sin(a);
      vec3 d = c - vec3(dot(c, W));
      return vec3(dot(c, W)) + ca * d + sa * cross(vec3(0.57735), d);
    }
    /* one directional wave's contribution to the surface slope; the
       amplitude fades out as its wavelength nears pixel size so the far
       rows flatten into a clean mirror instead of aliasing */
    vec2 slopeAdd(vec2 p, vec2 d, float k, float a, float w, float t, float pw){
      a *= exp(-pow(k * pw * 1.2, 2.0));
      return d * (a * k * cos(dot(p, d) * k + t * w));
    }
    void main(){
      vec2 p = vW.xz;
      float t = uTime * uWaveSpd;
      float pw = fwidth(p.x) + fwidth(p.y);
      float kc = uChop;
      /* Dry land: terrain rising above the waterline pushes the sea
         aside, so hills emerge from the water instead of being painted
         over by it. Same terrH the grid displaces its vertices with.
         uWaterY raises the line, drowning more of the terrain.        */
      float land = terrH(p, uAmp + uAmpPulse);
      if (land > uWaterY) discard;
      // foam ring just under the waterline, scaled so it stays in
      // proportion however high the water is raised
      float beach = smoothstep(uWaterY * 0.04, uWaterY * 0.9, land);
      /* long crests mostly along x → the glint breaks into the classic
         vertical column; a couple of skewed components keep it organic */
      vec2 sl = vec2(0.0);
      sl += slopeAdd(p, vec2( 0.100, 0.995), 0.105 * kc, 0.85, 1.05, t, pw);
      sl += slopeAdd(p, vec2(-0.160, 0.987), 0.185 * kc, 0.50, 1.35, t, pw);
      sl += slopeAdd(p, vec2( 0.310, 0.951), 0.350 * kc, 0.28, 1.90, t, pw);
      sl += slopeAdd(p, vec2(-0.419, 0.908), 0.700 * kc, 0.16, 2.60, t, pw);
      sl += slopeAdd(p, vec2( 0.548, 0.837), 1.400 * kc, 0.09, 3.40, t, pw);
      sl += slopeAdd(p, vec2( 0.750, 0.661), 2.600 * kc, 0.05, 5.00, t, pw);
      sl += slopeAdd(p, vec2(-0.702, 0.712), 2.900 * kc, 0.05, 5.60, t, pw);
      vec3 n = normalize(vec3(-sl.x * uWaveA * 2.2, 1.0, -sl.y * uWaveA * 2.2));
      vec3 V = normalize(vW - cameraPosition);
      vec3 R = reflect(V, n);
      R.y = abs(R.y);
      /* sky reflection — the sky dome's exact 3-stop gradient */
      float hh = clamp(R.y * 1.6 + 0.02, 0.0, 1.0);
      vec3 sky = hh < uMidPos
        ? mix(uSkyBot, uSkyMid, smoothstep(0.0, uMidPos, hh))
        : mix(uSkyMid, uSkyTop, smoothstep(uMidPos, 1.0, hh));
      sky += uHazeC * uHaze * 0.6 * exp(-R.y * 9.0);
      if (uHueR != 0.0) sky = hueRot(sky, uHueR);
      /* wave faces tilted toward the camera catch the bright low sky,
         away faces fall dark — the horizontal streaking that makes the
         surface read as water even at steep viewing angles */
      sky *= 1.0 + clamp(-sl.y * uWaveA * 5.0, -0.5, 1.1);
      /* Fresnel floor raised a touch over the physical 0.04: synthwave
         water is stylized-reflective, and it keeps near rows alive */
      float F = 0.08 + 0.92 * pow(1.0 - clamp(dot(-V, n), 0.0, 1.0), 5.0);
      vec3 c = mix(uWater * (0.35 + 0.3 * n.y), sky, F);
      float glintA = 0.0;                  // specular energy → drives alpha
      /* sun glint: reflected ray vs the real sun disc, plus a soft tail
         and a drifting shimmer so the column sparkles */
      if (uSunOn > 0.5){
        vec3 sp = vec3(uSunX, uSunY, uSunZ);
        vec3 S = normalize(sp - vW);
        float ang = acos(clamp(dot(R, S), -1.0, 1.0));
        float sunA = uSunR / max(length(sp - vW), 1.0);
        float core = 1.0 - smoothstep(sunA * 0.55, sunA * 1.5, ang);
        float tail = exp(-ang / (sunA * 2.2)) * 0.35;
        float shimmer = 0.75 + 0.5 *
          pnoise(p * vec2(0.9, 0.35) + vec2(t * 1.7, t * 0.6), 64.0);
        /* Colour the glint with the part of the disc this patch of water
           actually mirrors, so a gradient sun lays its own colours down
           the column instead of one averaged tint. Sampled off the FLAT
           mirror ray, not the wave-perturbed one: near the horizon a
           grazing ray swings wildly over the disc and the gradient would
           boil. The waves already break up the intensity above.        */
        vec3 Rf = vec3(V.x, -V.y, V.z);        // ideal (glassy) mirror
        vec3 sg = mix(uSunC2, uSunC1, 0.35);
        if (abs(Rf.z) > 1e-4){
          float ti = (uSunZ - vW.z) / Rf.z;
          if (ti > 0.0){
            float dy = (vW.y + Rf.y * ti - uSunY) / max(uSunR, 1.0);
            float tG = clamp(dy * 0.5 + 0.5, 0.0, 1.0);
            sg = mix(uSunC3, uSunC2, smoothstep(0.0, 0.55, tG));
            sg = mix(sg, uSunC1, smoothstep(0.55, 1.0, tG));
          }
        }
        c += sg * (core * 1.6 + tail) * uGlint * shimmer;
        glintA += (core * 1.1 + tail * 0.5) * uGlint;
      }
      /* beams glint on the water the same way the sun does: reflect the
         view ray off the wave and see whether it lands inside a shaft */
      if (uGlintBeam > 0.001){
        for (int i = 0; i < 4; i++){
          if (i >= uBeamN) break;
          vec4 B = uBeamData[i];
          float tb = (B.y - vW.z) / R.z;
          if (tb <= 0.0) continue;
          vec2 dd = vec2(vW.x + R.x * tb - B.x, vW.y + R.y * tb);
          float cs = cos(uBeamRot[i]), sn = sin(uBeamRot[i]);
          vec2 lp = vec2(dd.x * cs + dd.y * sn, -dd.x * sn + dd.y * cs);
          float vy = lp.y / max(B.w, 1.0);
          if (vy < 0.0 || vy > 1.0) continue;
          float bx = lp.x / max(B.z, 0.001);
          float yv = 1.0 - vy;
          float ba = exp(-bx * bx * 4.5) * yv * sqrt(yv);
          float bc = exp(-bx * bx * 16.0) * yv;
          float bsh = 0.65 + 0.6 * pnoise(
            p * vec2(1.1, 0.4) + vec2(t * 2.1, t * 0.7), 64.0);
          c += (uBeamColor * 1.9 + uBeamColor * bc * uBeamBright * 2.4)
             * ba * uGlintBeam * bsh;
          glintA += ba * uGlintBeam * 0.8;
        }
      }
      /* settle into the grid's horizon color on the last rows (seam) */
      c = mix(c, uHorizC, smoothstep(uZFar + 55.0, uZFar + 6.0, vW.z) * 0.45);

      /* ── shoreline ──────────────────────────────────────────────────
         The waterline meanders and drifts rather than ruling a straight
         line across the floor, and sets of crests roll in and break on
         it. All amplitudes are WORLD units, so a thin (far) sea shrinks
         them into the horizon by perspective alone.                   */
      float meander = sin(p.x * 0.055 + t * 0.31) * 6.5
                    + sin(p.x * 0.021 - t * 0.19) * 10.0
                    + (pnoise(vec2(p.x * 0.011, t * 0.04), 64.0) - 0.5) * 24.0;
      float edgeZ = uZNear + meander;
      float d = edgeZ - vW.z;                 // >0 still water, <0 past shore
      // breakers: crest lines marching toward the beach, tightening as
      // they arrive, plus a bright lip exactly on the waterline
      float roll = fract(d * 0.055 - t * 0.5);
      float crest = smoothstep(0.62, 0.97, roll) * smoothstep(90.0, 12.0, d);
      float lip = exp(-abs(d) * 0.22);
      float surf = crest * 0.55 + lip * 0.9;
      // the same treatment where water meets a hill it can't cover
      // ripple frequency is relative to the waterline, so raising the
      // water doesn't shred the foam into high-frequency noise
      surf += beach * (0.5 + 0.5 * sin(land / max(uWaterY, 0.05) * 5.0
                                       - t * 3.0)) * 1.15;
      c += uEdgeC * surf;
      glintA += surf * 0.5;

      /* Fresnel drives ALPHA too: far, grazing water is a near mirror,
         but shallow near water stays translucent so the neon grid — and
         the floor's own sun reflection — still read underneath. Capped
         under 1 so the two always coexist instead of one winning.     */
      float alpha = clamp(0.30 + 0.55 * F + glintA, 0.0, 0.93)
                  * smoothstep(-2.0, 3.5, d);
      gl_FragColor = vec4(c, alpha);
    }`
});
/* Share the uniform OBJECTS (not copies) that describe the terrain and
   the beams, so the water's coastline and its beam glints are always
   the exact same data the floor shader uses — nothing to keep in sync. */
for (const k of ['uAmp', 'uAmpPulse', 'uNScale', 'uNOff', 'uTerrNear',
                 'uRoadX', 'uRoadCv', 'uCorrIn', 'uCorrOut',
                 'uBeamN', 'uBeamData', 'uBeamRot', 'uBeamColor', 'uBeamBright'])
  seaMat.uniforms[k] = gridMat.uniforms[k];

const seaGeo = new THREE.PlaneGeometry(MTN_W, 1, 1, 1);
seaGeo.rotateX(-Math.PI / 2);            // XZ plane, +y normal
const seaMesh = new THREE.Mesh(seaGeo, seaMat);
seaMesh.visible = false;
seaMesh.frustumCulled = false;
scene.add(seaMesh);

/** Extent is defined in SCREEN terms (degrees below the horizon), not
    world z — perspective crams hundreds of far units into a few pixel
    rows, so a world-z band would be invisible. Derived from the camera
    height, so applyCam refreshes it too.                              */
function syncSeaExtent(spanMul = 1){
  if (state.mtn.mode !== 'sea') return;
  const su = seaMat.uniforms;
  const camZ = 18, h = Math.max(state.cam.height, 0.6);
  /* Angle is capped at ~10.5°, about a third of the visible floor: past
     that the water swallows the grid instead of sitting on the horizon
     the way the mountains and skyline do. 0.5 ≈ 3.6°, a far strip.   */
  const sp = clamp(state.mtn.span * spanMul, 0.05, 1);
  const ang = 0.004 + 0.18 * Math.pow(sp, 1.6);
  const zF = -450;
  const zN = clamp(camZ - h / Math.tan(ang), zF + 25, camZ - 12);
  su.uZFar.value = zF;
  su.uZNear.value = zN;
  seaMesh.scale.z = zN - zF;
  seaMesh.position.set(0, 0.12, (zN + zF) / 2);
}

/** fill = silhouette color pushed toward the fog/sky color with distance;
    edge = neon accent line, brighter than 1.0 so bloom picks it up.
    Covers whichever horizon type is active (also syncs sea sky colors). */
function recolorHorizon(){
  const m = state.mtn;
  // silhouette haze scales with the fog-depth setting (and deepens
  // further past 1.0 — the "mountains dissolving into sky" look).
  // Floored at 0.35: with no haze at all the fills collapse into a
  // solid black band that reads as a hole above the grid.
  const fogK = clamp(state.sky.fog, 0.35, 1.5);
  if (m.mode === 'mountains'){
    const L = Math.min(m.layers, HORIZ_MAX);
    for (const child of mtnGroup.children){
      const { li, kind } = child.userData;
      if (kind === 'fill'){
        child.material.color.set(m.fill)
          .lerp(scene.fog.color, clamp((0.55 - li * 0.17) * fogK, 0.05, 0.95));
        // the reflection samples the same per-layer color (row = near→far)
        const row = L - 1 - li;
        if (row >= 0 && row < HORIZ_MAX)
          gridMat.uniforms.uHorizCol.value[row].copy(child.material.color);
      } else {
        child.material.color.set(m.edge).multiplyScalar(0.4 + m.edgeGlow * 1.1);
      }
    }
    gridMat.uniforms.uHorizEdge.value.set(m.edge)
      .multiplyScalar(0.4 + m.edgeGlow * 1.1);
  } else if (m.mode === 'city'){
    const L = Math.min(m.layers, CITY_ROWS_MAX);
    for (const mesh of cityGroup.children){
      const li = mesh.userData.li, u = mesh.material.uniforms;
      // li 0 = farthest. depth 0 → far, 1 → nearest row
      const depth = L > 1 ? li / (L - 1) : 0;
      /* Atmospheric perspective, exaggerated so the rows read apart: far
         rows wash toward the sky AND stay pale, near rows drop into a
         darker, more saturated silhouette with brighter windows.       */
      u.uFill.value.set(m.fill)
        .lerp(scene.fog.color, clamp((0.5 - li * 0.16) * fogK, 0.05, 0.9))
        .multiplyScalar(1 - depth * 0.42);
      u.uWinC.value.set(m.edge).multiplyScalar(
        (0.5 + m.edgeGlow) * (0.5 + depth * 0.5));
      u.uEdgeC.value.set(m.edge).multiplyScalar(
        m.edgeGlow * 0.35 * (0.55 + depth * 0.45));
      u.uLit.value = m.lit;
      const row = L - 1 - li;
      if (row >= 0 && row < HORIZ_MAX)
        gridMat.uniforms.uHorizCol.value[row].copy(u.uFill.value);
    }
    gridMat.uniforms.uHorizEdge.value.set(m.edge)
      .multiplyScalar(0.3 + m.edgeGlow * 0.5);
  } else if (m.mode === 'sea'){
    const k = state.sky, su = seaMat.uniforms;
    su.uWater.value.set(m.fill);
    su.uEdgeC.value.set(m.edge).multiplyScalar(0.4 + m.edgeGlow * 1.1);
    su.uSkyTop.value.set(k.top);
    su.uSkyMid.value.set(k.mid);
    su.uSkyBot.value.set(k.bot);
    su.uMidPos.value = k.midPos;
    su.uHazeC.value.set(k.bot);
    su.uHaze.value = state.clouds.haze;
    su.uHorizC.value.copy(gridMat.uniforms.uHorizC.value);
  }
}

/* ════════════════════════════════════════════════════════════════════
   9. STARS — instanced point dome + shooting-star pool
   ════════════════════════════════════════════════════════════════════ */

const STAR_MAX = 1400;
const starGeo = new THREE.BufferGeometry();
{
  const pos   = new Float32Array(STAR_MAX * 3);
  const aSize = new Float32Array(STAR_MAX);
  const aPhase= new Float32Array(STAR_MAX);
  const aSpd  = new Float32Array(STAR_MAX);
  const aTint = new Float32Array(STAR_MAX);
  const rng = mulberry32(991124);            // fixed layout, density via drawRange
  let i = 0;
  while (i < STAR_MAX){
    const u = rng() * 2 - 1, v = rng() * 2 - 1, w = rng() * 2 - 1;
    const l = Math.hypot(u, v, w);
    if (l < 0.2 || l > 1) continue;
    const y = v / l;
    if (y < 0.02) continue;                  // above horizon only
    pos.set([u / l * 700, y * 700, w / l * 700], i * 3);
    aSize[i]  = 0.9 + rng() * 1.9;
    aPhase[i] = rng() * Math.PI * 2;
    aSpd[i]   = 0.4 + rng() * 1.4;
    aTint[i]  = rng();
    i++;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  starGeo.setAttribute('aSize',  new THREE.BufferAttribute(aSize, 1));
  starGeo.setAttribute('aPhase', new THREE.BufferAttribute(aPhase, 1));
  starGeo.setAttribute('aSpd',   new THREE.BufferAttribute(aSpd, 1));
  starGeo.setAttribute('aTint',  new THREE.BufferAttribute(aTint, 1));
}
const starMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, fog: false,
  uniforms: {
    uTime:  { value: 0 },
    uTwk:   { value: 0.8 },
    uColor: { value: col('#9fd8ff') },
    uBright:{ value: 1 },                    // audio-reactive
    uSize:  { value: 1 },
    uPx:    { value: 1 },
  },
  vertexShader: /* glsl */`
    attribute float aSize;
    attribute float aPhase;
    attribute float aSpd;
    attribute float aTint;
    varying float vTw;
    varying float vTint;
    uniform float uTime, uTwk, uSize, uPx;
    void main(){
      float tw = uTwk > 0.001
        ? 0.55 + 0.45 * sin(uTime * (0.6 + uTwk * 2.4) * aSpd + aPhase)
        : 1.0;
      vTw = tw; vTint = aTint;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = aSize * uSize * uPx * (0.75 + 0.5 * tw);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: /* glsl */`
    varying float vTw;
    varying float vTint;
    uniform vec3 uColor;
    uniform float uBright;
    void main(){
      float d = length(gl_PointCoord - 0.5);
      float a = smoothstep(0.5, 0.12, d) * vTw * uBright;
      vec3 c = mix(vec3(1.0), uColor, vTint);
      gl_FragColor = vec4(c * a, a);
    }`
});
const starPoints = new THREE.Points(starGeo, starMat);
starPoints.frustumCulled = false;
starPoints.renderOrder = -1;      // behind the sun disc (transparent sorting)
scene.add(starPoints);

/* shooting stars: tiny pool of streak sprites steered from JS */
/* Normal blending + clamped falloffs: additive mesh quads and unclamped
   pow() bases rendered as black boxes on some GPUs (NaN / driver blend
   quirks). Alpha-blended bright color over the dark sky looks the same. */
const shootMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, fog: false,
  uniforms: { uOpacity: { value: 0 }, uColor: { value: col('#cfe8ff') } },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main(){ vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: /* glsl */`
    varying vec2 vUv;
    uniform float uOpacity; uniform vec3 uColor;
    void main(){
      float tx = clamp(vUv.x, 0.0, 1.0);
      float tail = tx * tx * tx;                          // bright head at x=1
      float cy = max(1.0 - abs(vUv.y - 0.5) * 2.0, 0.0);
      float a = tail * cy * cy * uOpacity;
      gl_FragColor = vec4(uColor * 1.6, min(a, 1.0));
    }`
});
const SHOOT_N = 3;
const shooters = [];
for (let i = 0; i < SHOOT_N; i++){
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), shootMat.clone());
  mesh.scale.set(34, 1.1, 1);
  mesh.visible = false;
  mesh.frustumCulled = false;
  scene.add(mesh);
  shooters.push({ mesh, active: false, t: 0, dur: 1,
    from: new THREE.Vector3(), dir: new THREE.Vector3(), nextAt: 5 + i * 9 });
}
const _v3 = new THREE.Vector3();                           // scratch, no per-frame allocs
function updateShooters(T, dt){
  const on = state.stars.on && state.stars.shooting;
  for (const s of shooters){
    if (!s.active){
      if (on && T >= s.nextAt){
        s.active = true; s.t = 0; s.dur = 0.8 + Math.random() * 0.7;
        s.from.set((Math.random() * 2 - 1) * 420, 150 + Math.random() * 160,
                   -380 - Math.random() * 160);
        const ang = Math.PI * (1.15 + Math.random() * 0.5);  // down-left/right
        s.dir.set(Math.cos(ang), Math.sin(ang) * 0.55, 0).multiplyScalar(120 + Math.random() * 90);
        s.mesh.visible = true;
        s.mesh.rotation.z = Math.atan2(s.dir.y, s.dir.x);
      }
      continue;
    }
    s.t += dt;
    const p = s.t / s.dur;
    if (p >= 1 || !on){
      s.active = false; s.mesh.visible = false;
      s.nextAt = T + 7 + Math.random() * 22;
      continue;
    }
    _v3.copy(s.dir).multiplyScalar(p);
    s.mesh.position.copy(s.from).add(_v3);
    s.mesh.material.uniforms.uOpacity.value = Math.sin(p * Math.PI) * 0.9;
  }
}

/* ════════════════════════════════════════════════════════════════════
   10. CLOUDS — drifting bands from a generated noise texture
   ════════════════════════════════════════════════════════════════════ */

function makeCloudTexture(){
  const w = 256, h = 128;
  const cnv = document.createElement('canvas');
  cnv.width = w; cnv.height = h;
  const ctx = cnv.getContext('2d');
  const img = ctx.createImageData(w, h);
  const noise = makeNoise(4242);
  for (let y = 0; y < h; y++){

      img.data[o] = img.data[o + 1] = img.data[o + 2] = 255;
      img.data[o + 3] = a * 255;

  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

/* — palm silhouettes (procedural canvas drawing, tinted by material) — */
function makePalmTexture(){
  const cnv = document.createElement('canvas');
  cnv.width = 256; cnv.height = 512;
  const ctx = cnv.getContext('2d');
  ctx.fillStyle = ctx.strokeStyle = '#fff';
  ctx.lineCap = 'round';
  // trunk: tapered strokes along a lazy curve
  const trunk = t => ({ x: 128 + Math.sin(t * 1.8) * 26 * t, y: 500 - t * 320 });
  for (let i = 0; i < 24; i++){
    const t0 = i / 24, t1 = (i + 1) / 24;
    const a = trunk(t0), b = trunk(t1);
    ctx.lineWidth = 22 - t0 * 12;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  // fronds: feathered spines fanning from the crown
  const top = trunk(1);
  for (let f = 0; f < 9; f++){
    const ang = -Math.PI * (0.08 + 0.84 * f / 8);
    const len = 105 + (f % 3) * 18;
    const droop = 0.9 + (f % 2) * 0.5;
    let px = top.x, py = top.y, dx = Math.cos(ang), dy = Math.sin(ang);
    for (let s = 0; s < 14; s++){
      const t = s / 13;
      const nx = top.x + dx * len * t;
      const ny = top.y + dy * len * t + droop * 55 * t * t;   // gravity droop
      ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(nx, ny); ctx.stroke();
      // leaflets, shrinking toward the tip
      const ll = 26 * (1 - t) + 4;
      const pang = Math.atan2(ny - py, nx - px) + Math.PI / 2;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(nx, ny);
      ctx.lineTo(nx + Math.cos(pang + 0.5) * ll, ny + Math.sin(pang + 0.5) * ll);
      ctx.moveTo(nx, ny);
      ctx.lineTo(nx - Math.cos(pang - 0.5) * ll, ny - Math.sin(pang - 0.5) * ll);
      ctx.stroke();
      px = nx; py = ny;
    }
  }
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  // blurred copy: the halo the palms light up. Tight blur drawn twice
  // keeps the aura dense near the silhouette with a short falloff.
  const gcnv = document.createElement('canvas');
  gcnv.width = 256; gcnv.height = 512;
  const gctx = gcnv.getContext('2d');
  gctx.filter = 'blur(5px)';
  gctx.drawImage(cnv, 0, 0);
  gctx.drawImage(cnv, 0, 0);
  const glowTex = new THREE.CanvasTexture(gcnv);
  glowTex.colorSpace = THREE.SRGBColorSpace;
  return { tex, glowTex };
}
const { tex: palmTex, glowTex: palmGlowTex } = makePalmTexture();

/* Palm shader: silhouette tint + manual fog + wind sway bent in the
   vertex stage (bend grows toward the crown, phase from world position
   so every tree moves differently). Zero CPU work per frame.           */
const palmMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, fog: false,
  uniforms: {
    uMap:     { value: palmTex },
    uColor:   { value: col('#0b0318') },
    uGlowC:   { value: col('#ff2d95') },  // audio-reactive glow tint
    uGlowA:   { value: 0 },               // audio-reactive glow amount
    uSway:    { value: 0.3 },
    uTime:    { value: 0 },
    uFogColor:{ value: col('#2b0a56') },
    uFogNear: { value: 60 },
    uFogFar:  { value: 460 },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    varying float vDist;
    uniform float uSway, uTime;
    void main(){
      vUv = uv;
      vec3 p = position;
      float ph = modelMatrix[3][0] * 0.37 + modelMatrix[3][2] * 0.11;
      float bend = uv.y * uv.y * uSway;      // crown moves, trunk base stays
      p.x += (sin(uTime * 1.3 + ph) + 0.35 * sin(uTime * 2.7 + ph * 1.7))
           * bend * 2.4;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      vDist = -mv.z;
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: /* glsl */`
    varying vec2 vUv;
    varying float vDist;
    uniform sampler2D uMap;
    uniform vec3 uColor, uFogColor, uGlowC;
    uniform float uFogNear, uFogFar, uGlowA;
    void main(){
      vec4 t = texture2D(uMap, vUv);
      if (t.a < 0.28) discard;
      float ff = smoothstep(uFogNear, uFogFar, vDist);
      vec3 c = mix(uColor, uFogColor, ff);
      // audio glow: silhouettes light up in the chosen neon tint
      c += uGlowC * uGlowA * (1.0 - ff * 0.7);
      gl_FragColor = vec4(c, t.a);
    }`
});
/* soft outer glow behind each palm, driven entirely by the audio band.
   Same sway vertex stage so the halo follows the tree; NormalBlending
   (additive mesh quads misrender on some GPUs — see note above).      */
const palmGlowMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, fog: false,
  uniforms: {
    uMap:   { value: palmGlowTex },
    uGlowC: { value: col('#ff2d95') },
    uGlowA: { value: 0 },
    uSway:  { value: 0.3 },
    uTime:  { value: 0 },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    uniform float uSway, uTime;
    void main(){
      vUv = uv;
      vec3 p = position;
      float ph = modelMatrix[3][0] * 0.37 + modelMatrix[3][2] * 0.11;
      float bend = uv.y * uv.y * uSway;
      p.x += (sin(uTime * 1.3 + ph) + 0.35 * sin(uTime * 2.7 + ph * 1.7))
           * bend * 2.4;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }`,
  fragmentShader: /* glsl */`
    varying vec2 vUv;
    uniform sampler2D uMap;
    uniform vec3 uGlowC;
    uniform float uGlowA;
    void main(){
      float t = texture2D(uMap, vUv).a;
      // threshold ramp: the faint wide skirt is cut away, leaving a
      // dense aura hugging the silhouette with a short falloff.
      // Color kept near 1.0 — HDR here would hand the halo to bloom,
      // which smears it right back into a huge soft blob.
      float a = smoothstep(0.16, 0.5, t) * uGlowA;
      if (a < 0.01) discard;
      gl_FragColor = vec4(uGlowC * 0.78, min(a * 1.35, 1.0));
    }`
});
const palmGlowGroup = new THREE.Group();

function rebuildPalms(){
  for (const c of [...palmGroup.children]){ c.geometry.dispose(); palmGroup.remove(c); }
  for (const c of [...palmGlowGroup.children]) palmGlowGroup.remove(c);
  gridMat.uniforms.uPalmN.value = 0;
  if (!state.fx.palms) return;
  const rng = mulberry32((state.fx.palmSeed | 0) ^ 0xbeef);
  const n = state.fx.palmCount;
  const pu = gridMat.uniforms.uPalmData.value;
  for (let i = 0; i < n; i++){
    const side = i % 2 === 0 ? -1 : 1;
    // nearest pair frames the view like a poster; the rest recede
    const z = -28 - (i / Math.max(1, n - 1)) * 175 - rng() * 22;
    const x = side * (20 + rng() * 28 + (-z) * 0.1);
    const h = (i < 2 ? 38 : 30) + rng() * 18;             // nearest pair is tallest
    const geo = new THREE.PlaneGeometry(h * 0.62, h);
    const mesh = new THREE.Mesh(geo, palmMat);
    mesh.position.set(x, h / 2 - 1, z);
    mesh.rotation.z = side * (0.03 + rng() * 0.07);       // lean into the frame
    if (rng() > 0.5) mesh.scale.x *= -1;                  // mirror variety
    palmGroup.add(mesh);
    // matching halo quad, slightly larger, just behind the silhouette
    const glow = new THREE.Mesh(geo, palmGlowMat);
    glow.position.set(x, h / 2 - 1, z - 0.8);
    glow.rotation.z = mesh.rotation.z;
    glow.scale.copy(mesh.scale).multiplyScalar(1.04);
    palmGlowGroup.add(glow);
    // feed the floor shader: x, z, height, ±halfWidth (sign = mirrored)
    if (i < 8) pu[i].set(x, z, h, (h * 0.31) * (mesh.scale.x < 0 ? -1 : 1));
  }
  gridMat.uniforms.uPalmN.value = Math.min(n, 8);
}

function makeCarLines(){
  // side profile of a low wedge coupé, extruded across its width
  const S = 3.0, W = 2.6 * S;
  const prof = [[-2.3,0.30],[-2.3,0.72],[-1.05,0.82],[-0.30,1.52],
                [ 1.05,1.56],[ 1.95,0.95],[ 2.40,0.85],[ 2.40,0.30]]
               .map(([z, y]) => [z * S, y * S]);
  const verts = [], quads = [];
  const n = prof.length;
  for (const x of [-W / 2, W / 2])
    for (const [z, y] of prof) verts.push(x, y, z);
  // side faces (fan) + skin quads between the two sides
  const idx = [];
  for (let s = 0; s < 2; s++){
    const o = s * n;
    for (let i = 1; i < n - 1; i++) idx.push(o, o + i, o + i + 1);
  }
  for (let i = 0; i < n; i++){
    const j = (i + 1) % n;
    idx.push(i, n + i, n + j,  i, n + j, j);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  const group = new THREE.Group();
  group.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo, 8), heroMat));
  geo.dispose();
  // wheels
  const wheelGeo = new THREE.EdgesGeometry(
    new THREE.CylinderGeometry(0.34 * S, 0.34 * S, 0.2, 9), 8);
  for (const [wx, wz] of [[-W/2, -1.45*S], [-W/2, 1.6*S], [W/2, -1.45*S], [W/2, 1.6*S]]){
    const wheel = new THREE.LineSegments(wheelGeo, heroMat);

  }
  return group;
}

/* — light beams —
   Normal blending with clamped falloffs (see note on shootMat above):
   a bright alpha-blended shaft over the dark sky reads as light on
   every GPU, with no undefined pow() and no exotic blend state.        */
const beamProtoMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, fog: false,
  uniforms: { uColor: { value: col('#7a2bff') },
              uTime: { value: 0 }, uPhase: { value: 0 },
              uBright: { value: 1 } },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main(){ vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: /* glsl */`
    varying vec2 vUv;
    uniform vec3 uColor;
    uniform float uTime, uPhase, uBright;
    void main(){
      float x = vUv.x * 2.0 - 1.0;
      float yv = max(1.0 - vUv.y, 0.0);
      float breathe = 0.85 + 0.25 * sin(uTime * 0.8 + uPhase);
      float a = exp(-x * x * 4.5) * yv * sqrt(yv) * breathe;   // pow-free
      /* brightness = flashiness: an HDR hot core down the shaft's center
         feeds bloom (and whitens past 1.0) while the beam's base color
         and footprint stay untouched */
      float core = exp(-x * x * 16.0) * yv * breathe;
      vec3 col = uColor * 1.9
               + uColor * core * uBright * 2.4
               + vec3(1.0) * core * max(uBright - 1.0, 0.0) * 0.8;
      gl_FragColor = vec4(col, min(a * 1.4, 1.0));
    }`
});
const beamGroup = new THREE.Group();

   shafts rise from behind the ridges/skyline. x and the geometry scale
   up by the same factor as the extra depth, keeping the on-screen
   spread and size identical to the old z=-352 placement.              */

  mesh.position.set(side * (55 + (i % 2) * 105) * BEAM_K, 0, BEAM_Z);

  boltGeo.attributes.position.needsUpdate = true;
  boltLine.visible = true;
  boltT = 0.22;
  flash = 0.85;
  // Flash frequency scales the interval (hard floor keeps it non-strobing)
  nextStrike = T + Math.max(
    (6 + Math.random() * 16) / clamp(state.fx.stormFreq, 0.2, 10), 0.8);
}

/* ════════════════════════════════════════════════════════════════════
   12. POST-PROCESSING — custom HDR pipeline (no three/addons needed)
   ════════════════════════════════════════════════════════════════════
   scene → HDR target → threshold → 3-level blur chain → single final
   composite pass (bloom + hue-cycle + tonemap + sRGB + vignette +
   scanlines + grain + chromatic aberration + VHS wobble).             */

class FSQuad {
  constructor(material){
    this.mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
    this.mesh.frustumCulled = false;
    this.scene = new THREE.Scene();
    this.scene.add(this.mesh);
    this.cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  }
  render(mat){
    this.mesh.material = mat;
    renderer.render(this.scene, this.cam);
  }
}
const FS_VERT = /* glsl */`
  varying vec2 vUv;
  void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`;

const brightMat = new THREE.ShaderMaterial({
  uniforms: { tSrc: { value: null }, uThresh: { value: 0.6 }, uKnee: { value: 0.35 } },
  vertexShader: FS_VERT,
  fragmentShader: /* glsl */`
    varying vec2 vUv;
    uniform sampler2D tSrc;
    uniform float uThresh, uKnee;
    void main(){
      vec3 c = texture2D(tSrc, vUv).rgb;
      float lum = dot(c, vec3(0.2126, 0.7152, 0.0722));
      float soft = clamp(lum - uThresh + uKnee, 0.0, 2.0 * uKnee);
      soft = soft * soft / (4.0 * uKnee + 1e-4);
      float w = max(soft, lum - uThresh) / max(lum, 1e-4);
      gl_FragColor = vec4(c * w, 1.0);
    }`
});
const blurMat = new THREE.ShaderMaterial({
  uniforms: { tSrc: { value: null }, uTexel: { value: new THREE.Vector2() },
              uDir: { value: new THREE.Vector2(1, 0) } },
  vertexShader: FS_VERT,
  fragmentShader: /* glsl */`
    varying vec2 vUv;
    uniform sampler2D tSrc;
    uniform vec2 uTexel, uDir;
    void main(){
      vec2 d = uTexel * uDir;
      vec3 c = texture2D(tSrc, vUv).rgb * 0.227027;
      c += (texture2D(tSrc, vUv + d * 1.3846).rgb
          + texture2D(tSrc, vUv - d * 1.3846).rgb) * 0.3162162;
      c += (texture2D(tSrc, vUv + d * 3.2308).rgb
          + texture2D(tSrc, vUv - d * 3.2308).rgb) * 0.0702703;
      gl_FragColor = vec4(c, 1.0);
    }`
});
const finalMat = new THREE.ShaderMaterial({
  uniforms: {
    tScene: { value: null },
    tB0: { value: null }, tB1: { value: null }, tB2: { value: null },
    uBloomStr: { value: 0.85 },
    uRes:    { value: new THREE.Vector2(1, 1) },
    uTime:   { value: 0 },
    uVig:    { value: 0.45 },
    uScan:   { value: 0.25 },
    uGrain:  { value: 0.18 },
    uChroma: { value: 0.15 },
    uVhs:    { value: 0 },
    uVhsCnt: { value: 1 },      // concurrent tracking bands (1–4)
    uHue:    { value: 0 },
    uJit:    { value: 0 },      // audio-reactive scanline jitter
    uScanCnt:{ value: 240 },    // scanline count (set from CSS px height)
    uFlash:  { value: 0 },      // lightning flash (storm weather)
    uExposure: { value: 1.1 },
  },
  vertexShader: FS_VERT,
  fragmentShader: /* glsl */`
    varying vec2 vUv;
    uniform sampler2D tScene, tB0, tB1, tB2;
    uniform vec2  uRes;
    uniform float uBloomStr, uTime, uVig, uScan, uGrain, uChroma, uVhs,
                  uVhsCnt, uHue, uJit, uScanCnt, uFlash, uExposure;
    ${GLSL_HASH}
    vec3 hueRotate(vec3 c, float a){
      const vec3 W = vec3(0.299, 0.587, 0.114);
      float ca = cos(a), sa = sin(a);
      vec3 d = c - vec3(dot(c, W));
      return vec3(dot(c, W)) + ca * d + sa * cross(vec3(0.57735), d);
    }
    void main(){
      vec2 uv = vUv;
      float band = 0.0;

      /* VHS wobble + up to 4 concurrent roaming tracking bands */
      if (uVhs > 0.001){
        uv.x += (sin(uv.y * 9.0 + uTime * 0.7) * 0.0016
               + sin(uv.y * 55.0 + uTime * 2.3) * 0.0005) * uVhs;
        for (int i = 0; i < 4; i++){
          if (float(i) >= uVhsCnt) break;
          float fi = float(i);
          /* per-band speed offset + slow irregular wander keeps multiple
             bands from marching in an even formation */
          float by = fract(uTime * (0.035 + fi * 0.023) + fi * 0.41
                   + sin(uTime * (0.09 + fi * 0.06) + fi * 2.3) * 0.16);
          float b1 = (1.0 - smoothstep(0.0, 0.035, abs(uv.y - by))) * uVhs;
          uv.x += b1 * 0.011
                * (hash21(vec2(floor(uTime * 24.0) + fi, uv.y * 60.0)) - 0.3);
          band += b1;
        }
      }

      /* chromatic aberration (radial) */
      vec3 c;
      if (uChroma > 0.001){
        vec2 d = (uv - 0.5) * uChroma * 0.012;
        c.r = texture2D(tScene, uv + d).r;
        c.g = texture2D(tScene, uv).g;
        c.b = texture2D(tScene, uv - d).b;
      } else {
        c = texture2D(tScene, uv).rgb;
      }

      /* bloom composite */
      if (uBloomStr > 0.001){
        vec3 bl = texture2D(tB0, uv).rgb * 0.5
                + texture2D(tB1, uv).rgb * 0.75
                + texture2D(tB2, uv).rgb * 1.0;
        c += bl * uBloomStr;
      }

      /* global palette hue-cycle, tonemap, gamma */
      if (uHue != 0.0) c = hueRotate(c, uHue);
      c = vec3(1.0) - exp(-c * uExposure);
      c = pow(max(c, 0.0), vec3(1.0 / 2.2));

      /* lightning: brief cool-white lift of the whole frame */
      if (uFlash > 0.001){
        c += uFlash * vec3(0.72, 0.78, 1.0) * 0.26;
        c *= 1.0 + uFlash * 0.35;
      }

      /* CRT scanlines (+ audio jitter) */
      if (uScan > 0.001){
        float y = uv.y + uJit * (hash21(vec2(floor(uTime * 47.0), 2.7)) - 0.5) * 0.004;
        float s = 0.5 + 0.5 * sin(y * uScanCnt * 6.28318);
        c *= 1.0 - uScan * 0.38 * s;
      }

      /* film grain */
      if (uGrain > 0.001){
        float n = hash21(uv * (uRes * 0.5) + fract(uTime * 7.13) * 91.7);
        c += (n - 0.5) * uGrain * 0.14;
      }

      /* vignette + tracking-band shimmer */
      float vd = length(uv - 0.5);
      c *= 1.0 - uVig * smoothstep(0.32, 0.78, vd);
      c += band * 0.05;

      gl_FragColor = vec4(c, 1.0);
    }`
});
const fsq = new FSQuad(finalMat);

/* render targets (rebuilt on resize / quality change) */
let sceneRT = null;
const bloomLv = [];                       // [{a, b}] at 1/2, 1/4, 1/8 res
let msaaSamples = 4;
function buildTargets(w, h){
  if (sceneRT) sceneRT.dispose();
  for (const lv of bloomLv){ lv.a.dispose(); lv.b.dispose(); }
  bloomLv.length = 0;
  sceneRT = new THREE.WebGLRenderTarget(w, h, {
    type: THREE.HalfFloatType, samples: msaaSamples, depthBuffer: true });
  let bw = w, bh = h;
  for (let i = 0; i < 3; i++){
    bw = Math.max(1, bw >> 1); bh = Math.max(1, bh >> 1);
    const opts = { type: THREE.HalfFloatType, depthBuffer: false };
    bloomLv.push({ a: new THREE.WebGLRenderTarget(bw, bh, opts),
                   b: new THREE.WebGLRenderTarget(bw, bh, opts),
                   texel: new THREE.Vector2(1 / bw, 1 / bh) });
  }
  finalMat.uniforms.uRes.value.set(w, h);
}

function renderFrame(){
  renderer.setRenderTarget(sceneRT);
  renderer.render(scene, camera);

  // bloom auto-disables at strength 0 (incl. the audio-driven extra term)
  const bloomOn = finalMat.uniforms.uBloomStr.value > 0.001;
  if (bloomOn){
    brightMat.uniforms.tSrc.value = sceneRT.texture;
    // audio also lowers the threshold so beats visibly widen the glow
    brightMat.uniforms.uThresh.value =
      clamp(state.post.bloomThr - audioBloom * 0.35, 0.05, 1);
    renderer.setRenderTarget(bloomLv[0].a);
    fsq.render(brightMat);
    let src = bloomLv[0].a.texture;
    for (const lv of bloomLv){
      blurMat.uniforms.uTexel.value.copy(lv.texel);
      blurMat.uniforms.tSrc.value = src;
      blurMat.uniforms.uDir.value.set(1, 0);
      renderer.setRenderTarget(lv.b);  fsq.render(blurMat);
      blurMat.uniforms.tSrc.value = lv.b.texture;
      blurMat.uniforms.uDir.value.set(0, 1);
      renderer.setRenderTarget(lv.a);  fsq.render(blurMat);
      src = lv.a.texture;
    }
    finalMat.uniforms.tB0.value = bloomLv[0].a.texture;
    finalMat.uniforms.tB1.value = bloomLv[1].a.texture;
    finalMat.uniforms.tB2.value = bloomLv[2].a.texture;
  }
  finalMat.uniforms.tScene.value = sceneRT.texture;
  renderer.setRenderTarget(null);
  fsq.render(finalMat);
}

/* ════════════════════════════════════════════════════════════════════
   13. AUDIO REACTIVITY — Wallpaper Engine feed / mic / audio file
   ════════════════════════════════════════════════════════════════════
   Raw band energy → attack/decay envelope → rolling-peak normalization,
   so motion follows the music instead of jittering.                    */

const isWE = typeof window.wallpaperRegisterAudioListener === 'function';

const audioEng = {
  vals: { off: 0, bass: 0, mid: 0, treble: 0 },     // normalized 0..1
  raw:  { bass: 0, mid: 0, treble: 0 },
  env:  { bass: 0, mid: 0, treble: 0 },
  peak: { bass: 0.25, mid: 0.25, treble: 0.25 },
  floor:{ bass: 0, mid: 0, treble: 0 },
  ctx: null, analyser: null, freq: null,
  micStream: null, sysStream: null, audioEl: null, fileUrl: null,
  weFresh: false,
};

/* Wallpaper Engine: 128 floats = 64 left + 64 right, low → high */
if (isWE){
  window.wallpaperRegisterAudioListener(arr => {
    if (!state.audio.on) return;
    let bass = 0, mid = 0, treb = 0;
    for (let ch = 0; ch < 2; ch++){
      const o = ch * 64;
      for (let i = 0; i < 8;  i++) bass += arr[o + i];
      for (let i = 8; i < 28; i++) mid  += arr[o + i];
      for (let i = 28; i < 64; i++) treb += arr[o + i];
    }
    audioEng.raw.bass   = clamp(bass / 16, 0, 2);
    audioEng.raw.mid    = clamp(mid  / 40, 0, 2);
    audioEng.raw.treble = clamp(treb / 72 * 2.2, 0, 2);
    audioEng.weFresh = true;
  });
}

function audioEnsureCtx(){
  if (!audioEng.ctx){
    audioEng.ctx = new (window.AudioContext || window.webkitAudioContext)();
    audioEng.analyser = audioEng.ctx.createAnalyser();
    /* 2048 → 23.4 Hz bins at 48 kHz. At 1024 the bass band got only four
       46.9 Hz bins and everything under 46.9 Hz fell in bin 0, which is
       skipped as DC — so sub-bass was invisible. Costs ~21 ms more
       window, which no one can see in a wallpaper.                     */
    audioEng.analyser.fftSize = 2048;
    audioEng.analyser.smoothingTimeConstant = 0.35;
    audioEng.freq = new Uint8Array(audioEng.analyser.frequencyBinCount);
  }
  audioEng.ctx.resume();
}
async function audioUseMic(){
  try {
    audioEnsureCtx();
    if (!audioEng.micStream)
      audioEng.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioEng.ctx.createMediaStreamSource(audioEng.micStream).connect(audioEng.analyser);
    toast('Microphone connected');
  } catch { toast('Microphone unavailable — try an audio file'); }
}
/** Computer audio in a normal browser: screen/tab share with audio.
    (Inside Wallpaper Engine the system feed arrives automatically.)  */
async function audioUseSystem(){
  try {
    audioEnsureCtx();
    const stream = await navigator.mediaDevices.getDisplayMedia(
      { video: true, audio: true,
        systemAudio: 'include', selfBrowserSurface: 'include' });
    if (!stream.getAudioTracks().length){
      for (const t of stream.getTracks()) t.stop();
      toast('That share had no audio. Chrome/Edge offer audio only for tabs '
          + '(or the entire screen on Windows) — pick one of those and tick '
          + 'its “share audio” box. Otherwise use mic or an audio file.');
      return;
    }
    for (const t of stream.getVideoTracks()) t.stop();   // audio only
    audioEng.sysStream = stream;
    audioEng.ctx.createMediaStreamSource(stream).connect(audioEng.analyser);
    toast('System audio connected');
  } catch { toast('System audio unavailable — try mic or a file'); }
}
function audioUseFile(file){
  audioEnsureCtx();
  if (audioEng.fileUrl) URL.revokeObjectURL(audioEng.fileUrl);
  audioEng.fileUrl = URL.createObjectURL(file);
  if (!audioEng.audioEl){
    audioEng.audioEl = new Audio();
    audioEng.audioEl.loop = true;
    const src = audioEng.ctx.createMediaElementSource(audioEng.audioEl);
    src.connect(audioEng.analyser);
    audioEng.analyser.connect(audioEng.ctx.destination);
  }
  audioEng.audioEl.src = audioEng.fileUrl;
  audioEng.audioEl.play();
  const bp = document.getElementById('btnAudioPause');
  if (bp) bp.textContent = '⏸';
  updateVis();                       // reveals the playback player row
  toast('Playing: ' + file.name);
}
function audioTeardown(){
  if (audioEng.micStream){
    for (const t of audioEng.micStream.getTracks()) t.stop();
    audioEng.micStream = null;
  }
  if (audioEng.sysStream){
    for (const t of audioEng.sysStream.getTracks()) t.stop();
    audioEng.sysStream = null;
  }
  if (audioEng.audioEl) audioEng.audioEl.pause();
  if (audioEng.ctx) audioEng.ctx.suspend();
  for (const k of ['bass', 'mid', 'treble'])
    audioEng.vals[k] = audioEng.env[k] = audioEng.raw[k] = audioEng.floor[k] = 0;
}

/** per-frame: fill raw bands from analyser, run envelopes (real dt) */
function audioUpdate(dt){
  const a = state.audio;
  if (!a.on) return;
  const src = a.src === 'auto' ? (isWE ? 'we' : 'mic') : a.src;
  if (src !== 'we' && audioEng.analyser && audioEng.ctx &&
      audioEng.ctx.state === 'running'){
    audioEng.analyser.getByteFrequencyData(audioEng.freq);
    const nyq = audioEng.ctx.sampleRate / 2;
    const bin = hz => clamp(Math.round(hz / nyq * audioEng.freq.length), 0,
                            audioEng.freq.length - 1);
    const avg = (a0, b0) => {
      let s = 0; const i0 = bin(a0), i1 = Math.max(bin(b0), i0 + 1);
      for (let i = i0; i < i1; i++) s += audioEng.freq[i];
      return s / (i1 - i0) / 255;
    };
    audioEng.raw.bass   = avg(35, 250)   * 1.4;
    audioEng.raw.mid    = avg(250, 2200) * 1.6;
    audioEng.raw.treble = avg(2200, 9000) * 2.0;
  } else if (src === 'we' && !audioEng.weFresh){
    // WE feed stalls when audio is silent — decay toward zero
    audioEng.raw.bass *= 0.94; audioEng.raw.mid *= 0.94; audioEng.raw.treble *= 0.94;
  }
  audioEng.weFresh = false;

  const atk = 1 - Math.exp(-dt / 0.035);
  const dec = 1 - Math.exp(-dt / lerp(0.09, 0.5, a.smooth));
  const rel = 1 - Math.exp(-dt / 9);          // floor creep, mirrors peak release
  for (const k of ['bass', 'mid', 'treble']){
    const raw = audioEng.raw[k], env = audioEng.env[k];
    audioEng.env[k] = env + (raw - env) * (raw > env ? atk : dec);
    /* Rolling peak AND floor. A peak alone equalizes each band's
       loudness but not its DYNAMICS: bass in music is near-continuous,
       so it sat at ~0.9 of its own peak and hardly moved, while
       intermittent treble swung freely — which made every bass-driven
       effect look dead next to a treble one. Mapping each band from its
       own recent floor→peak range equalizes how much the bands MOVE.
       The floor drops instantly to new minima and creeps back over 9 s,
       the mirror of the peak's release; the minimum span stops a steady
       drone from being amplified into jitter.                          */
    audioEng.peak[k] = Math.max(raw, audioEng.peak[k] * Math.exp(-dt / 9));
    const fl = audioEng.floor[k];
    const raised = raw < fl ? raw : fl + (raw - fl) * rel;
    /* The floor is never allowed to close all the way onto the peak: a
       long sustained pad has no dips to hold it down, so it would creep
       up, starve its own range and fade the effects to nothing over
       ~30 s. Capping it also bounds the expansion to ~6.7x.            */
    audioEng.floor[k] = Math.min(raised, audioEng.peak[k] * 0.85);
    const span = Math.max(audioEng.peak[k] - audioEng.floor[k], 0.12);
    audioEng.vals[k] = clamp((audioEng.env[k] - audioEng.floor[k]) / span, 0, 1);
  }
}
const bandVal = m => m.band === 'off' ? 0 : audioEng.vals[m.band] * m.sens;
/** like bandVal, but with a silence floor cut so the value pulses with
    beats instead of riding the auto-gain plateau — for halo effects   */
const bandPulse = m => m.band === 'off' ? 0
  : Math.max(audioEng.vals[m.band] - 0.22, 0) / 0.78 * m.sens;

/* ════════════════════════════════════════════════════════════════════
   14. RANDOMIZER — seeded, curated, mood-biased
   ════════════════════════════════════════════════════════════════════ */

/** Procedural palette inside HSL constraints that guarantee harmony:
    dark desaturated sky base + complementary/analogous neon accents. */
function genPalette(rng, dark){
  const h0  = R.range(rng, 0, 360);                       // sky family
  const rot = R.pick(rng, [-1, 1]) * R.range(rng, 130, 200); // accent family
  const ha  = h0 + rot;
  const skyL = dark ? [0.028, 0.085, 0.3]  : [0.045, 0.15, 0.5];
  const sunL = dark ? [0.5, 0.4, 0.3]      : [0.66, 0.52, 0.42];
  return {
    name: dark ? 'generated·dark' : 'generated',
    sky:  [hsl(h0, 0.55, skyL[0]), hsl(h0 + 14, 0.62, skyL[1]),
           hsl(ha, dark ? 0.6 : 0.85, skyL[2])],
    sun:  [hsl(ha + 28, 0.95, sunL[0]), hsl(ha, 0.92, sunL[1]),
           hsl(h0 + 40, 0.8, sunL[2])],
    grid: hsl(ha + (R.chance(rng, 0.5) ? 150 : -60),
              dark ? 0.75 : 0.95, dark ? 0.42 : 0.55),
    mtn:  [hsl(h0, 0.5, dark ? 0.05 : 0.075), hsl(ha, 0.9, dark ? 0.45 : 0.55)],
    stars: hsl(h0 + 180, 0.35, dark ? 0.75 : 0.82),
    cloud: hsl(ha, 0.7, dark ? 0.42 : 0.6),
    accent: hsl(ha + 60, 0.9, dark ? 0.5 : 0.6),
  };
}

/* per-mood weights/ranges; 'any' is neutral */
const MOODS = {
  any:    { palIdx: null, sun: [['sun',.55],['planet',.25],['wire',.2]],
            speed:[0.5,1.6], sway:[0.2,0.8],
            hero: [['none',.56],['palms',.16],['obj',.12],['text',.07],['beams',.05],['rain',.04]],
            horiz:[['mountains',.5],['city',.19],['sea',.19],['off',.12]],
            cloud:.4, rainAmt:[.4,.7], vhs:.15 },
  calm:   { palIdx: [0,3,4,7], sun: [['sun',.3],['planet',.35],['wire',.35]],
            speed:[0.25,0.7], sway:[0.1,0.45],
            hero: [['none',.7],['palms',.15],['obj',.03],['text',.06],['beams',.02],['rain',.04]],
            horiz:[['mountains',.35],['sea',.38],['city',.1],['off',.17]],
            cloud:.35, rainAmt:[.3,.5], vhs:.05 },
  drive:  { palIdx: [1,2,5,6], sun: [['sun',.75],['planet',.15],['wire',.1]],
            speed:[1.2,2.2], sway:[0.25,0.6],
            hero: [['none',.4],['palms',.12],['obj',.3],['text',.08],['beams',.06],['rain',.04]],
            horiz:[['mountains',.45],['city',.35],['sea',.08],['off',.12]],
            cloud:.25, rainAmt:[.4,.6], vhs:.2 },
  dreamy: { palIdx: [3,7,0], sun: [['sun',.25],['planet',.55],['wire',.2]],
            speed:[0.3,0.8], sway:[0.4,1.0],
            hero: [['none',.5],['palms',.12],['obj',.05],['text',.25],['beams',.04],['rain',.04]],
            horiz:[['sea',.35],['mountains',.28],['city',.15],['off',.22]],
            cloud:.55, rainAmt:[.3,.5], vhs:.1 },
  storm:  { palIdx: [4,5,2], sun: [['sun',.4],['planet',.2],['wire',.4]],
            speed:[0.8,1.8], sway:[0.3,0.8],
            hero: [['none',.3],['palms',.05],['obj',.05],['text',.05],['beams',.15],['rain',.4]],
            horiz:[['mountains',.42],['sea',.28],['city',.18],['off',.12]],
            cloud:.85, rainAmt:[.6,.95], vhs:.45 },
  noir:   { palIdx: [4], sun: [['sun',.3],['planet',.25],['wire',.45]],
            speed:[0.25,0.6], sway:[0.1,0.4],
            hero: [['none',.62],['palms',.14],['obj',.04],['text',.08],['beams',.04],['rain',.08]],
            horiz:[['city',.45],['mountains',.28],['off',.17],['sea',.1]],
            cloud:.6, rainAmt:[.3,.6], vhs:.2 },
};
const TEXT_POOL = ['OUTRUN', 'NEON', 'MIDNIGHT', 'DRIVE', 'SUNSET', 'VHS',
                   '1 9 8 6', 'CHROME', 'HORIZON'];

function generateScene(seed, mood){
  const rng = mulberry32(seed);
  const M = MOODS[mood] || MOODS.any;
  const s = deepClone(DEFAULTS);
  s.seed = seed;
  // keep the user's perf/runtime prefs (but not the palette hue — see above)
  keepPerfPrefs(s, state);
  s.audio = deepClone(state.audio);

  /* palette: curated most of the time, constrained-HSL sometimes;
     the noir mood leans on very dark generated palettes */
  const pal = mood === 'noir' && R.chance(rng, 0.55)
    ? genPalette(rng, true)
    : R.chance(rng, 0.28)
      ? genPalette(rng, mood === 'noir')
      : PALETTES[M.palIdx ? R.pick(rng, M.palIdx) : R.int(rng, 0, PALETTES.length - 1)];
  paintPalette(s, pal);

  /* celestial — always present (scene anchor) */
  s.sun.on = true;
  s.sun.mode = R.weighted(rng, M.sun);
  s.sun.size = R.range(rng, 45, 80);
  s.sun.x = R.range(rng, -28, 28);
  s.sun.y = R.range(rng, 22, 42);
  s.sun.bands = R.int(rng, 6, 14);
  s.sun.bandW = R.range(rng, 0.35, 0.65);
  s.sun.bandPos = R.range(rng, 0.42, 0.62);
  s.sun.glow = R.range(rng, 0.4, 0.75);
  s.sun.glowInt = R.range(rng, 0.7, 1.25);
  s.sun.pulse = R.range(rng, 0, mood === 'storm' ? 0.45 : 0.3);
  s.sun.pulseSpd = R.range(rng, 0.3, 0.7);
  s.sun.ring = R.chance(rng, 0.65);
  s.sun.ringWidth = R.range(rng, 0.6, 1.5);
  if (s.sun.mode === 'wire'){
    s.sun.size = R.range(rng, 30, 48);
    s.sun.wireDetail = R.int(rng, 0, 2);
    s.sun.wireWidth = R.chance(rng, 0.3) ? 2 : 1;
  }

  /* grid — always present */
  s.grid.spacing = R.range(rng, 3.5, 6);
  s.grid.glow = R.range(rng, 0.75, 1.35);
  s.grid.speed = R.range(rng, M.speed[0], M.speed[1]) * (R.chance(rng, 0.9) ? 1 : -1);
  const terrain = R.chance(rng, 0.45);
  s.grid.amp = terrain ? R.range(rng, 8, 34) : 0;
  s.grid.rough = R.range(rng, 0.6, 1.6);
  s.grid.reflect = R.chance(rng, 0.65) ? R.range(rng, 0.3, 0.75) : 0;
  s.grid.reflectScene = R.chance(rng, 0.6) ? R.range(rng, 0.25, 0.6) : 0;
  s.grid.reflectBeams = R.chance(rng, 0.7) ? R.range(rng, 0.3, 0.7) : 0;
  s.grid.reflectHue = R.chance(rng, 0.15) ? R.range(rng, 0, 360) : 0;
  if (terrain) s.grid.terrNear = R.range(rng, 15, 130);
  const gmRoll = rng();
  s.grid.colorMode = gmRoll < 0.58 ? 'solid'
    : gmRoll < 0.86 ? 'gradient'
    : gmRoll < 0.94 ? 'colors' : 'cycle';
  s.grid.gradScale = R.range(rng, 0.5, 1.6);
  s.grid.gradDir = R.chance(rng, 0.7) ? 0 : R.range(rng, 0, 360);
  s.grid.gradOff = R.range(rng, 0, 1);
  /* road — two families, because mixing them gives muddy results: a
     painted highway (tarmac + lane markings) or a lit circuit (neon
     inlay + rails). The palette's accent drives the neon one so it
     belongs to the scene rather than fighting it.                    */
  s.road.on = R.chance(rng, mood === 'drive' ? 0.7 : 0.4);
  if (s.road.on){
    const neon = R.chance(rng, mood === 'drive' ? 0.3 : 0.5);
    s.road.width = R.range(rng, 5.5, 11);
    s.road.x = R.chance(rng, 0.75) ? 0 : R.range(rng, -18, 18);
    s.road.curve = R.chance(rng, 0.6) ? 0 : R.range(rng, -110, 110);
    /* usually locked to the floor — a road sliding against its own grid
       is a deliberate effect, not something to hand out at random     */
    s.road.speed = R.chance(rng, 0.8) ? 0 : R.range(rng, -1.5, 2.5);
    s.road.gloss = R.range(rng, 0.35, 0.9);
    /* wet moods leave standing water; elsewhere it is usually an even
       sheet. Keyed off mood, not s.fx.weather — weather is not rolled
       until further down, so it would still read 'none' here.         */
    const damp = mood === 'storm' || mood === 'noir';
    s.road.puddle = R.chance(rng, damp ? 0.8 : 0.35)
      ? R.range(rng, 0.3, 0.9) : 0;
    s.road.surfAmt = R.range(rng, 0.7, 1.0);
    s.road.glow = R.range(rng, 0.8, 1.7);
    s.road.markW = R.range(rng, 0.09, 0.24);
    s.road.dashLen = R.range(rng, 10, 26);
    s.road.dashDuty = R.range(rng, 0.3, 0.6);
    if (neon){
      s.road.center = R.chance(rng, 0.6) ? 'strip' : 'dashed';
      s.road.centerColor = pal.accent;
      s.road.edge = R.chance(rng, 0.65) ? 'rails' : 'solid';
      s.road.edgeColor = pal.sun[1];
      s.road.lanes = 1;
      s.road.surface = pal.mtn[0];
    } else {
      s.road.center = R.weighted(rng, [['dashed',.4],['double',.3],
                                       ['doubleDash',.15],['solid',.15]]);
      s.road.centerColor = R.chance(rng, 0.6) ? '#ffd319' : '#fff4e2';
      s.road.edge = R.weighted(rng, [['solid',.6],['none',.25],['dashed',.15]]);
      s.road.edgeColor = '#f2f6ff';
      s.road.lanes = R.weighted(rng, [[1,.25],[2,.45],[3,.15],[4,.15]]);
      s.road.surface = '#0a0616';
    }
  }

  /* horizon */
  s.mtn.mode = R.weighted(rng, M.horiz);
  s.mtn.seed = R.int(rng, 1, 9999);
  if (s.mtn.mode === 'mountains'){
    s.mtn.layers = Math.min(R.weighted(rng, [[1,.3],[2,.45],[3,.25]]),
                            terrain ? 2 : 3);
    s.mtn.height = R.range(rng, 18, 40);
    s.mtn.rough = R.range(rng, 0.7, 1.5);
    s.mtn.edgeGlow = R.range(rng, 0.6, 1.4);
  } else if (s.mtn.mode === 'city'){
    s.mtn.layers = R.weighted(rng, [[1,.3],[2,.5],[3,.2]]);
    s.mtn.height = R.range(rng, 24, 48);
    s.mtn.rough = R.range(rng, 0.7, 1.8);
    s.mtn.density = R.range(rng, 0.8, 1.5);
    s.mtn.lit = R.range(rng, 0.25, 0.65);
    s.mtn.edgeGlow = R.range(rng, 0.7, 1.5);
    // mostly a full skyline, occasionally a distant island of towers
    s.mtn.spread = R.chance(rng, 0.75) ? R.range(rng, 0.8, 1)
                                       : R.range(rng, 0.18, 0.5);
  } else if (s.mtn.mode === 'sea'){
    s.mtn.waveAmp = R.range(rng, 0.3, 0.75);
    s.mtn.waveSpd = R.range(rng, 0.3, 0.9);
    s.mtn.rough = R.range(rng, 0.7, 1.6);
    s.mtn.glint = R.range(rng, 0.6, 1.5);
    s.mtn.glintBeam = R.range(rng, 0.6, 1.4);
    s.mtn.span = R.range(rng, 0.35, 0.85);
    s.mtn.edgeGlow = R.range(rng, 0.5, 1.2);
    // with hills about, sometimes flood them into scattered islands
    s.mtn.waterY = s.grid.amp > 6 && R.chance(rng, 0.55)
      ? R.range(rng, 3, s.grid.amp * 0.7) : 0.55;
  }

  /* stars scale with sky darkness */
  const darkness = 1 - clamp(hexLum(pal.sky[1]) * 4.5, 0, 1);
  s.stars.on = true;
  s.stars.density = clamp(0.2 + darkness * 0.75 + R.range(rng, -0.1, 0.1), 0.12, 0.95);
  s.stars.twinkle = R.range(rng, 0.4, 1.1);
  s.stars.drift = R.range(rng, 0.05, 0.3);
  s.stars.shooting = R.chance(rng, mood === 'calm' ? 0.5 : 0.3);

  /* clouds */
  s.clouds.on = R.chance(rng, M.cloud);
  s.clouds.opacity = R.range(rng, 0.25, mood === 'storm' ? 0.65 : 0.5);
  s.clouds.speed = R.range(rng, 0.15, mood === 'storm' ? 0.8 : 0.5);
  s.clouds.haze = R.range(rng, 0.3, 0.7);
  s.clouds.size = R.range(rng, 0.8, mood === 'dreamy' ? 2.2 : 1.6);
  s.clouds.near = R.chance(rng, 0.3) ? R.range(rng, 0.2, 0.6) : 0;

  /* extras — AT MOST ONE hero element on stage */
  const hero = R.weighted(rng, M.hero);
  if (hero === 'palms'){ s.fx.palms = true; s.fx.palmCount = R.int(rng, 3, 6);
    s.fx.palmSway = R.range(rng, 0.15, 0.6);
    s.fx.palmSeed = R.int(rng, 1, 9999);
    s.fx.palmHalo = R.chance(rng, 0.3) ? R.range(rng, 0.1, 0.45) : 0; }
  else if (hero === 'obj'){
    s.fx.hero = mood === 'drive' && R.chance(rng, 0.6)
      ? 'car' : R.pick(rng, ['pyramid', 'sphere', 'torus', 'car']);
    s.fx.heroSpin = R.range(rng, 0.15, 0.6);
  }
  else if (hero === 'text'){
    s.fx.text = true;
    s.fx.textStr = R.pick(rng, TEXT_POOL);
    s.fx.textStyle = R.weighted(rng, [['chrome',.5],['neon',.35],['outline',.15]]);
  }
  else if (hero === 'beams'){
    s.fx.beams = true;
    s.fx.beamLen = R.range(rng, 0.8, 1.3);
    s.fx.beamWidth = R.range(rng, 0.8, 1.4);
  }
  else if (hero === 'rain'){
    s.fx.weather = mood === 'storm' && R.chance(rng, 0.6) ? 'storm' : 'rain';
    s.fx.rainAmt = R.range(rng, M.rainAmt[0], M.rainAmt[1]);
  }
  /* weather as ambience, independent of the hero pick */
  if (mood === 'storm' && s.fx.weather === 'none' && R.chance(rng, 0.6))
    s.fx.weather = R.chance(rng, 0.5) ? 'storm' : 'rain';
  if (mood === 'noir' && s.fx.weather === 'none' && R.chance(rng, 0.3))
    s.fx.weather = 'rain';
  if (s.fx.weather === 'storm') s.fx.stormFreq = R.range(rng, 0.7, 1.5);

  /* camera */
  s.cam.fov = R.range(rng, 52, 70);
  s.cam.sway = R.range(rng, M.sway[0], M.sway[1]);
  s.cam.swaySpd = R.range(rng, 0.3, 0.7);
  s.cam.dolly = R.chance(rng, 0.2) ? R.range(rng, 0.3, 0.7) : 0;
  s.cam.orbit = R.chance(rng, 0.12) ? R.range(rng, 0.2, 0.5) : 0;

  /* post — tasteful, bounded (no strobing anywhere) */
  s.post.bloomStr = R.range(rng, 0.6, mood === 'dreamy' ? 1.15 : 1.0);
  s.post.bloomThr = R.range(rng, 0.5, 0.7);
  s.post.vig = R.range(rng, 0.3, 0.6);
  s.post.scan = R.chance(rng, 0.65) ? R.range(rng, 0.2, 0.5) : 0;
  s.post.grain = R.chance(rng, 0.6) ? R.range(rng, 0.1, 0.3) : 0;
  s.post.chroma = R.chance(rng, 0.4) ? R.range(rng, 0.1, 0.35) : 0;
  s.post.vhs = R.chance(rng, M.vhs) ? R.range(rng, 0.15, 0.4) : 0;
  s.post.vhsCount = s.post.vhs > 0 && R.chance(rng, 0.25) ? 2 : 1;

  /* noir mood: dial everything down into moody darkness */
  if (mood === 'noir'){
    s.post.bloomStr = R.range(rng, 0.45, 0.7);
    s.post.vig = R.range(rng, 0.55, 0.78);
    s.post.grain = R.range(rng, 0.25, 0.45);
    s.grid.glow = R.range(rng, 0.5, 0.9);
    s.sun.glow = R.range(rng, 0.3, 0.55);
    s.grid.reflect = R.range(rng, 0.35, 0.7);
    s.stars.density = clamp(s.stars.density + 0.15, 0.12, 0.95);
  }

  /* slow ambient drifts, occasionally */
  s.sky.drift = R.chance(rng, 0.15) ? R.range(rng, 0.2, 0.5) : 0;
  s.anim.hue = R.chance(rng, 0.08) ? R.range(rng, 0.1, 0.3) : 0;

  return s;
}

function randomizePaletteOnly(){
  const rng = mulberry32((Math.random() * 0xffffffff) >>> 0);
  const pal = R.chance(rng, 0.3) ? genPalette(rng)
    : PALETTES[R.int(rng, 0, PALETTES.length - 1)];
  paintPalette(state, pal);
  applyAll();
  refreshUI();
  autosave();
  toast('Palette: ' + pal.name);
}

/* ════════════════════════════════════════════════════════════════════
   15. APPLIERS — push state into materials / geometry (no per-frame work)
   ════════════════════════════════════════════════════════════════════ */

const _c1 = new THREE.Color(), _c2 = new THREE.Color();
let needsRender = true;

function applySky(){
  const k = state.sky;
  skyMat.uniforms.uTop.value.set(k.top);
  skyMat.uniforms.uMid.value.set(k.mid);
  skyMat.uniforms.uBot.value.set(k.bot);
  skyMat.uniforms.uMidPos.value = k.midPos;
  skyMat.uniforms.uHazeC.value.set(k.bot);
  skyMat.uniforms.uHaze.value = state.clouds.haze;
  _c1.set(k.mid); _c2.set(k.bot);
  _c1.lerp(_c2, 0.45);
  scene.fog.color.copy(_c1);
  gridMat.uniforms.uFogColor.value.copy(_c1);
  palmMat.uniforms.uFogColor.value.copy(_c1);
  // fog depth: 1 = classic look · lower pushes the fog out (clear air on
  // flat scenes) · higher pulls it in for a heavier atmosphere
  const fogFar = 60 + 400 / Math.max(k.fog, 0.06);
  scene.fog.far = fogFar;
  gridMat.uniforms.uFogFar.value = fogFar;
  palmMat.uniforms.uFogFar.value = fogFar;
  // the sky-colored horizon wash is part of the atmosphere: clear air
  // (low fog) exposes crisp dark grid rows right up to the sky line
  gridMat.uniforms.uHorizAmt.value = clamp((k.fog - 0.1) / 0.6, 0, 1);

}
/** uHorizC = the sky shader's exact color at vDir.y = 0, so the floor's
    far rows blend into the sky with no seam (fog color alone is darker) */
function syncHorizon(){
  const c = gridMat.uniforms.uHorizC.value;
  c.set(state.sky.bot).multiplyScalar(1 + 0.6 * state.clouds.haze);
}
function applySun(){
  const s = state.sun;
  sunGroup.visible = s.on;
  sunMat.uniforms.uMode.value = s.mode === 'planet' ? 1 : s.mode === 'wire' ? 2 : 0;
  sunMat.uniforms.uC1.value.set(s.c1);
  sunMat.uniforms.uC2.value.set(s.c2);
  sunMat.uniforms.uC3.value.set(s.c3);
  sunMat.uniforms.uBands.value = s.bands;
  sunMat.uniforms.uBandW.value = s.bandW;
  sunMat.uniforms.uBandTop.value = s.bandPos;
  sunMat.uniforms.uGlow.value = s.glow;
  sunMat.uniforms.uGlowInt.value = s.glowInt;
  sunMat.uniforms.uRing.value = s.ring ? 1 : 0;
  sunMat.uniforms.uRingW.value = s.ringWidth;
  wireSquash.visible = s.on && s.mode === 'wire';
  if (wireSquash.visible) rebuildWireMoon();
  wireMat.uniforms.uC1.value.set(s.c1);
  wireMat.uniforms.uC2.value.set(s.c2);
  wireMat.uniforms.uC3.value.set(s.c3);
  layoutSun();
  syncReflection();
}
const _white = new THREE.Color(1, 1, 1);
/* Shader permutation: a reflection source with its slider at zero is
   compiled OUT entirely, so its per-pixel work costs nothing at all
   (a runtime branch would still be evaluated for every floor pixel).  */
let _reflKey = '';
function syncReflDefines(){
  const g = state.grid;
  const sun   = g.reflect > 0 && state.sun.on;
  const scene = g.reflectScene > 0 && (state.mtn.mode === 'mountains'
    || state.mtn.mode === 'city' || state.fx.palms);
  const beam  = g.reflectBeams > 0 && state.fx.beams;
  const road  = state.road.on;
  const key = `${sun}|${scene}|${beam}|${road}`;
  if (key === _reflKey) return;              // avoid needless recompiles
  _reflKey = key;
  const d = {};
  if (sun)   d.USE_REFL_SUN = 1;
  if (scene) d.USE_REFL_SCENE = 1;
  if (beam)  d.USE_REFL_BEAM = 1;
  if (sun || scene || beam) d.REFL_ANY = 1;
  if (road)  d.USE_ROAD = 1;

  gridMat.needsUpdate = true;

/* Compile every reflection permutation up front, in the background.
   Toggling a slider across zero swaps the shader program at runtime
