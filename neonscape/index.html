   given permutation is needed the driver has to build it — an ~80 ms
   freeze here, and far worse on weak GPUs. Building all sixteen during
   startup makes every later toggle a cache hit, so a slider drag never
   stutters. Purely an optimisation: failure is silently ignored.     */
async function prewarmReflections(){
  if (typeof renderer.compileAsync !== 'function') return;
  const saved = gridMat.defines;
  try {
    for (let m = 0; m < 16; m++){
      const d = {};
      if (m & 1) d.USE_REFL_SUN = 1;
      if (m & 2) d.USE_REFL_SCENE = 1;
      if (m & 4) d.USE_REFL_BEAM = 1;
      if (m & 7) d.REFL_ANY = 1;
      if (m & 8) d.USE_ROAD = 1;
      gridMat.defines = d;
      gridMat.needsUpdate = true;
      await renderer.compileAsync(scene, camera);

  u.uSunZ.value = SUN_Z;
  syncReflDefines();
  u.uRefColor.value.set(su.c2).lerp(_white, 0.25);
  u.uSunX.value = su.x * 3.2;
  u.uSunY.value = su.y;

  u.uRingOn.value = su.ring ? 1 : 0;
  u.uRingW.value = su.ringWidth;

  gridMat.uniforms.uLine.value.set(g.color);

    g.colors = ['#00e5ff', '#ff2d95'];

function applyRoad(){

  u.uCorrOut.value = r.on ? r.width + 26.5 : 34;
  u.uRoadX.value   = r.on ? r.x : 0;
  u.uRoadCv.value  = r.on ? r.curve : 0;
  u.uRoadW.value   = r.width;
  u.uRoadSurf.value.set(r.surface);
  u.uSurfAmt.value = r.surfAmt;
  u.uRoadGloss.value = r.gloss;

function applyMtn(){

  rebuildCity();                    // mode isn't active, so switching modes
  seaMesh.visible = m.mode === 'sea';           // never leaks geometry
  if (m.mode === 'sea'){
    seaMat.uniforms.uWaveSpd.value = m.waveSpd;
    seaMat.uniforms.uChop.value = m.rough;
    seaMat.uniforms.uGlintBeam.value = state.fx.beams ? m.glintBeam : 0;
    seaMat.uniforms.uWaterY.value = m.waterY;
    syncSeaExtent();
    recolorHorizon();
  }
  if (m.mode !== 'mountains' && m.mode !== 'city') bakeHorizon(); // clear bank
  mtnGroup.scale.y = 1;
  // mountains and city drive uHorizSY per frame; sea/off leave it neutral
  if (m.mode !== 'mountains' && m.mode !== 'city')
    gridMat.uniforms.uHorizSY.value = 1;
  syncWireRefl();
  syncReflDefines();
}
function applyStars(){
  const s = state.stars;
  starPoints.visible = s.on;
  starGeo.setDrawRange(0, Math.floor(s.density * STAR_MAX));
  starMat.uniforms.uTwk.value = s.twinkle;
  starMat.uniforms.uColor.value.set(s.color);
  starMat.uniforms.uSize.value = s.size;
}
function applyClouds(){
  const c = state.clouds;
  cloudGroup.visible = c.on;
  for (const p of cloudPlanes){
    p.mesh.material.opacity = c.opacity * p.oMul;
    p.mesh.material.color.set(c.color);
    p.mesh.scale.setScalar(c.size);
    p.mesh.position.z = p.bz + c.near * 255;      // bring the bank closer
    p.half = 460 + p.baseW * c.size * 0.5 + 60;   // keep wrap outside view
  }
  skyMat.uniforms.uHaze.value = c.haze;
  syncHorizon();                    // haze feeds the horizon-seam blend too
}
let _lastPalms = '', _lastHero = '', _lastText = '';
const _heroBase = new THREE.Color(0x00e5ff);   // hero color pre-brightness
let _heroMul = 1, _textMul = 1;                // custom-bloom multipliers
function applyFx(){
  const f = state.fx;
  const palmKey = `${f.palms}|${f.palmCount}|${f.palmSeed}`;
  if (palmKey !== _lastPalms){ _lastPalms = palmKey; rebuildPalms(); }
  palmMat.uniforms.uColor.value.set(f.palmColor);
  palmMat.uniforms.uSway.value = f.palmSway;
  palmGlowMat.uniforms.uSway.value = f.palmSway;
  palmMat.uniforms.uGlowC.value.set(f.palmGlowColor);
  palmGlowMat.uniforms.uGlowC.value.set(f.palmGlowColor);
  palmGlowMat.uniforms.uGlowA.value = f.palmHalo * 0.85;
  palmGlowGroup.visible = f.palms && f.palmHalo > 0.02;
  // reflection inputs for palms / beams
  gridMat.uniforms.uPalmColor.value.set(f.palmColor);
  gridMat.uniforms.uPalmGlowC.value.set(f.palmGlowColor);
  gridMat.uniforms.uPalmSway.value = f.palmSway;
  gridMat.uniforms.uBeamN.value = f.beams ? beams.length : 0;
  syncReflDefines();               // palms/beams gate the scene permutation
  if (f.hero !== _lastHero){ _lastHero = f.hero; rebuildHero(); }
  // custom bloom = brightness multiplier that pushes the object past the
  // bloom threshold on its own; off = follow the global bloom settings
  _heroBase.set(f.heroColor);
  _heroMul = f.heroBloomOn ? 0.3 + f.heroBloom * 1.7 : 1;
  _textMul = f.textBloomOn ? 0.35 + f.textBloom * 1.65 : 1;
  heroMat.color.copy(_heroBase).multiplyScalar(_heroMul);
  heroGroup.scale.setScalar(f.heroSize);
  heroGroup.position.set(f.heroX, f.heroY, f.heroZ);
  textMesh.visible = f.text;
  textMesh.position.set(f.textX, f.textY, -310);
  const textKey = `${f.textStr}|${f.textStyle}|${f.textColor}`;
  if (f.text && textKey !== _lastText){ _lastText = textKey; redrawText(); }
  textMesh.scale.set(f.textSize * textAspect, f.textSize, 1);
  beamGroup.visible = f.beams;
  for (const b of beams){
    b.mesh.material.uniforms.uColor.value.set(f.beamColor);
    b.mesh.scale.set(f.beamWidth * BEAM_K, f.beamLen * BEAM_K, 1);
  }
  rainLines.visible = f.weather !== 'none';
  rainGeo.setDrawRange(0, Math.floor(f.rainAmt * RAIN_N) * 2);
  // no beams → nothing for the water to glint off
  seaMat.uniforms.uGlintBeam.value = f.beams ? state.mtn.glintBeam : 0;
}
function applyCam(){
  camera.fov = state.cam.fov;
  camera.updateProjectionMatrix();
  gridMat.uniforms.uCamH.value = state.cam.height;
  /* Depth below the horizon at which the floor shader's smear saturates:
     it does so where the reflected ray reaches REFL_SAT, i.e. at floor
     distance camH/REFL_SAT, which in a true mirror shows the celestial
     plane at (473 * REFL_SAT − camH). Feeding the same figure to the
     wire moon keeps its mirrored geometry stretching in lockstep.     */
  wireReflMat.uniforms.uStretchRef.value =
    Math.max(473 * REFL_SAT - state.cam.height, 5);
  syncSeaExtent();                  // sea extent is angular → camera-dependent
}
function applyPost(){
  const p = state.post;
  finalMat.uniforms.uVig.value = p.vig;
  finalMat.uniforms.uScan.value = p.scan;
  finalMat.uniforms.uGrain.value = p.grain;
  finalMat.uniforms.uChroma.value = p.chroma;
  finalMat.uniforms.uVhs.value = p.vhs;
  finalMat.uniforms.uVhsCnt.value = p.vhsCount;
}
function applyAudio(){
  const a = state.audio;
  // leaving the 'file' source unloads the track completely
  if (a.src !== 'file' && audioEng.audioEl && audioEng.audioEl.src){
    audioEng.audioEl.pause();
    audioEng.audioEl.removeAttribute('src');
    audioEng.audioEl.load();
    if (audioEng.fileUrl){
      URL.revokeObjectURL(audioEng.fileUrl);
      audioEng.fileUrl = null;
    }
    updateVis();                       // hides the playback player row
  }
  if (!a.on){ audioTeardown(); return; }
  const src = a.src === 'auto' ? (isWE ? 'we' : 'mic') : a.src;
  if (src === 'mic') audioUseMic();
  else if (src === 'system' && !audioEng.sysStream) audioUseSystem();
  else if (src === 'file' && !(audioEng.audioEl && audioEng.audioEl.src))
    toast('Pick a track with “Load audio file”');
  // 'we': the listener registered at boot feeds us automatically
}
function applyAnim(){ applyRendererSize(); }

const appliers = { sky: applySky, sun: applySun, grid: applyGrid,
  road: applyRoad, mtn: applyMtn,
  stars: applyStars, clouds: applyClouds, fx: applyFx, cam: applyCam,
  post: applyPost, audio: applyAudio, anim: applyAnim,
  gen: () => {} };   // hue-shift/-cycle are read live in tick()

function applyAll(){
  for (const k in appliers) if (k !== 'anim') appliers[k]();
  applyCam();
  document.getElementById('seedIn').value = state.seed;
  needsRender = true;
}

/* helper: a band-select + boost/sensitivity mapping group. Rows hide
   when the scene element is off or the band is 'off', and every row is
   DISABLED (grayed, no layout jump) while audio reactivity is off.    */
function amap(label, key, opts = {}){
  const on = opts.show || (() => true);
  const dis = s => !s.audio.on;
  const act = s => on(s) && getPath(s, `audio.${key}.band`) !== 'off';
  const rows = [
    ['sel', label + ' ←', `audio.${key}.band`, BANDS, { show: on, dis }],
  ];
  if (opts.boost)
    rows.push(['rng', '· boost', `audio.${key}.boost`, 0, 3, 0.01,
      { show: act, dis }]);
  rows.push(['rng', '· sensitivity', `audio.${key}.sens`, 0, 4, 0.01,
    { show: act, dis }]);
  if (opts.extra) rows.push(...opts.extra(act, dis));
  return rows;
}

const bindings = [];
const gcRebuilders = [];   // dynamic color-list re-renderers
const dirRedraws = [];     // gradient-direction dial redraws
const visExtra = [];       // extra {el, show} visibility hooks
const fmtVal = (v, step) => typeof v === 'number'
  ? (step >= 1 ? v.toFixed(0) : v.toFixed(2)) : '';
/** tooltip lookup: exact path, else generic band/sens/boost fallbacks */
function tip(path){
  if (!path) return '';
  if (TIPS[path]) return TIPS[path];
  if (path.endsWith('.band'))  return TIPS._band;
  if (path.endsWith('.sens'))  return TIPS._sens;
  if (path.endsWith('.boost')) return TIPS._boost;
  return '';
}

/** conditional rows: evaluate show/disable predicates against state */
function updateVis(){
  for (const b of bindings){
    if (!b.meta) continue;
    if (b.meta.show) b.rowEl.style.display = b.meta.show(state) ? '' : 'none';
    if (b.meta.dis){
      const d = b.meta.dis(state);
      b.input.disabled = d;
      if (b.valEl) b.valEl.disabled = d;
      b.rowEl.classList.toggle('dis', d);
    }
  }
  for (const g of visExtra) g.el.style.display = g.show(state) ? '' : 'none';
}

/* ── dropdown ───────────────────────────────────────────────────────────
   Stand-in for <select>, rendered as plain divs.

   Wallpaper Engine runs the page in an off-screen CEF (Chromium 146), and
   there a <select> kills the renderer with STATUS_ILLEGAL_INSTRUCTION the
   instant it generates a layout box. Verified against WE itself: options vs
   none, `appearance:none`, `size=3` and even `visibility:hidden`/`opacity:0`
   all still crash — which is why the mood arrow's old transparent overlay
   select was fatal too. Only `display:none` survives, so the element must
   never reach layout: hiding or restyling one is not a workaround.
   window.prompt/alert/confirm are fatal in the same way — use toast().

   Returns the trigger ELEMENT carrying `.value`, `.disabled` and real
   `change` events, so every caller keeps treating it like the <select> it
   replaced. `o.el` adopts existing markup; `o.silent` keeps that markup's
   own content (the mood arrow) instead of painting the selected label.
   `o.menu` makes it a menu button rather than a selection: it starts with
   no value, fires change on every pick — even the same item twice — and
   its arrow keys open the list instead of silently cycling values.
   ──────────────────────────────────────────────────────────────────────── */
function makeSelect(items, o){
  o = o || {};
  items = items.map(([v, l]) => [String(v), l]);
  const trg = o.el || document.createElement('div');
  trg.classList.add('nsel');
  trg.tabIndex = 0;
  trg.setAttribute('role', 'combobox');
  trg.setAttribute('aria-haspopup', 'listbox');
  trg.setAttribute('aria-expanded', 'false');
  let value = !o.menu && items.length ? items[0][0] : '';
  let disabled = false;
  let pop = null;

  function paint(){
    if (o.silent) return;
    const it = items.find(i => i[0] === value);
    trg.textContent = it ? it[1] : '';
  }
  Object.defineProperty(trg, 'value', {
    get(){ return value; },
    set(v){ value = String(v); paint(); }
  });
  // a div ignores the `disabled` the generic row code sets on controls
  Object.defineProperty(trg, 'disabled', {
    get(){ return disabled; },
    set(v){
      disabled = !!v;
      trg.style.pointerEvents = disabled ? 'none' : '';
      trg.tabIndex = disabled ? -1 : 0;
      if (disabled) close();
    }
  });

  function onOutside(e){
    if (e.target !== trg && pop && !pop.contains(e.target)) close();
  }
  function close(){
    if (!pop) return;
    pop.remove(); pop = null;
    trg.setAttribute('aria-expanded', 'false');
    window.removeEventListener('mousedown', onOutside, true);
    window.removeEventListener('resize', close);
    window.removeEventListener('scroll', close, true);
  }
  // #sections scrolls and clips its content, so the list is positioned
  // against the viewport on body instead of nested inside the row
  function open(){
    if (pop || disabled || !items.length){ close(); return; }
    pop = document.createElement('div');
    pop.className = 'nopts';
    pop.setAttribute('role', 'listbox');
    const r = trg.getBoundingClientRect();
    pop.style.minWidth = r.width + 'px';
    for (const [v, l] of items){
      const opt = document.createElement('div');
      opt.className = 'nopt' + (v === value ? ' sel' : '');
      opt.textContent = l;
      opt.setAttribute('role', 'option');
      opt.addEventListener('mousedown', e => { e.preventDefault(); pick(v); });
      pop.appendChild(opt);
    }
    document.body.appendChild(pop);
    // measure once populated, then drop below the trigger — or flip above it
    // when the row sits too low on screen, the way a native popup does
    const ph = pop.offsetHeight, pw = pop.offsetWidth;
    let top = r.bottom + 3;
    if (top + ph > window.innerHeight - 4){
      const above = r.top - 3 - ph;
      top = above >= 4 ? above : Math.max(4, window.innerHeight - 4 - ph);
    }
    pop.style.top = top + 'px';
    pop.style.left = Math.max(4, Math.min(r.left, window.innerWidth - 4 - pw)) + 'px';
    trg.setAttribute('aria-expanded', 'true');
    window.addEventListener('mousedown', onOutside, true);
    window.addEventListener('resize', close);
    window.addEventListener('scroll', close, true);
  }
  function commit(v){
    value = v; paint();
    trg.dispatchEvent(new Event('change', { bubbles: true }));
  }
  function pick(v){
    close();
    if (v !== value || o.menu) commit(v);
  }
  function step(d){
    if (!items.length) return;
    const i = items.findIndex(it => it[0] === value);
    const n = items[(i + d + items.length) % items.length][0];
    if (n !== value) commit(n);
  }
  trg.addEventListener('mousedown', e => { e.preventDefault(); trg.focus(); open(); });
  trg.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); open(); }
    else if (e.key === 'ArrowDown'){ e.preventDefault(); o.menu ? open() : step(1); }
    else if (e.key === 'ArrowUp'){ e.preventDefault(); o.menu ? open() : step(-1); }
    else if (e.key === 'Escape') close();
  });
  paint();
  return trg;
}

const GROUP_NOTES = {
  'Extras': 'Best kept to one hero element at a time — the randomizer enforces that.',
};
function buildUI(){
  const host = document.getElementById('sections');
  const parents = {};        // group name -> parent section body
  for (const sec of SCHEMA){
    let container = host;
    if (sec.group){          // nested sub-section (Extras / Audio groups)
      if (!parents[sec.group]){
        const pd = document.createElement('details');
        pd.className = 'sec';
        const ps = document.createElement('summary');
        ps.textContent = sec.group;
        pd.appendChild(ps);
        const pb = document.createElement('div');
        pb.className = 'body';
        if (GROUP_NOTES[sec.group]){
          const pn = document.createElement('p');
          pn.className = 'note';
          pn.textContent = GROUP_NOTES[sec.group];
          pb.appendChild(pn);
        }
        pd.appendChild(pb);
        host.appendChild(pd);
        parents[sec.group] = pb;
      }
      container = parents[sec.group];
    }
    const det = document.createElement('details');
    det.className = 'sec' + (sec.group ? ' sub' : '');
    if (sec.open) det.open = true;
    const sum = document.createElement('summary');
    sum.textContent = sec.title;
    det.appendChild(sum);
    const body = document.createElement('div');
    body.className = 'body';
    det.appendChild(body);
    // this section hosts a group: later `group:` sections nest in it
    if (sec.hostGroup) parents[sec.hostGroup] = body;
    // whole sub-sections can hide with their scene element
    if (sec.show) visExtra.push({ el: det, show: sec.show });

    for (const row of sec.rows){
      const rowLast = row[row.length - 1];
      const meta = (rowLast && typeof rowLast === 'object' &&
                    !Array.isArray(rowLast)) ? rowLast : null;
      const cells = meta ? row.slice(0, -1) : row;
      const [type, label, path, ...opts] = cells;
      if (type === 'note'){
        const p = document.createElement('p');
        p.className = 'note'; p.textContent = label;
        body.appendChild(p);

      }
      if (type === 'btn'){
        const b = document.createElement('button');
        b.textContent = label; b.style.width = '100%'; b.style.margin = '4px 0';
        if (tip(path)) b.title = tip(path);
        if (path === 'audiofile')
          b.addEventListener('click', () => document.getElementById('fileAudio').click());
        body.appendChild(b);
        if (meta && meta.show) visExtra.push({ el: b, show: meta.show });
        continue;
      }
      if (type === 'player'){
        /* audio-file playback: ⏸/▶ icon · seek slider · time readout */
        const div = document.createElement('div');
        div.className = 'playerrow';
        if (tip(path)) div.title = tip(path);
        const b = document.createElement('button');
        b.id = 'btnAudioPause';
        b.textContent = '⏸';
        b.setAttribute('aria-label', 'Pause / resume playback');
        const rng = document.createElement('input');
        rng.type = 'range'; rng.min = 0; rng.max = 1000; rng.value = 0;
        rng.setAttribute('aria-label', 'Playback position');
        const tEl = document.createElement('span');
        tEl.textContent = '0:00 / 0:00';
        const fmt = x => { x = Math.max(0, Math.floor(x || 0));
          return Math.floor(x / 60) + ':' + String(x % 60).padStart(2, '0'); };
        let seeking = false;
        const sync = () => {
          const el = audioEng.audioEl;
          if (!el || !el.src) return;
          b.textContent = el.paused ? '▶' : '⏸';
          if (!seeking && isFinite(el.duration) && el.duration > 0)
            rng.value = Math.round(el.currentTime / el.duration * 1000);
          tEl.textContent = fmt(el.currentTime) + ' / ' + fmt(el.duration);
        };
        setInterval(sync, 500);
        b.addEventListener('click', () => {
          const el = audioEng.audioEl;
          if (!el || !el.src) return;
          if (el.paused) el.play(); else el.pause();
          sync();
        });
        rng.addEventListener('pointerdown', () => { seeking = true; });
        rng.addEventListener('input', () => {
          const el = audioEng.audioEl;
          if (el && isFinite(el.duration))
            tEl.textContent = fmt(rng.value / 1000 * el.duration)
                            + ' / ' + fmt(el.duration);
        });
        rng.addEventListener('change', () => {
          seeking = false;
          const el = audioEng.audioEl;
          if (el && el.src && isFinite(el.duration))
            el.currentTime = rng.value / 1000 * el.duration;
        });
        div.append(b, rng, tEl);
        body.appendChild(div);
        if (meta && meta.show) visExtra.push({ el: div, show: meta.show });
        continue;
      }
      if (type === 'dir'){
        /* gradient-direction dial: a circle filled with the current
           gradient colors plus a draggable arrow */
        const div = document.createElement('div');
        div.className = 'row wide2';
        if (tip(path)) div.title = tip(path);
        const lab = document.createElement('label');
        lab.textContent = label;
        const cnv = document.createElement('canvas');
        cnv.width = 156; cnv.height = 156; cnv.className = 'dir';
        div.appendChild(lab); div.appendChild(cnv);
        body.appendChild(div);
        const dctx = cnv.getContext('2d');
        const draw = () => {
          const cx = 78, cy = 78, r = 72;
          dctx.clearRect(0, 0, 156, 156);
          const ang = state.grid.gradDir * Math.PI / 180;
          const dx = Math.sin(ang), dy = -Math.cos(ang);   // screen y is down
          const cols = state.grid.colors, n = cols.length;
          const grad = dctx.createLinearGradient(
            cx - dx * r, cy - dy * r, cx + dx * r, cy + dy * r);
          for (let i = 0; i <= n; i++) grad.addColorStop(i / n, cols[i % n]);
          dctx.beginPath(); dctx.arc(cx, cy, r, 0, Math.PI * 2);
          dctx.fillStyle = grad; dctx.fill();
          dctx.lineWidth = 2; dctx.strokeStyle = 'rgba(255,255,255,.25)';
          dctx.stroke();
          dctx.strokeStyle = dctx.fillStyle = '#fff';
          dctx.lineWidth = 4; dctx.lineCap = 'round';
          dctx.shadowColor = 'rgba(0,0,0,.7)'; dctx.shadowBlur = 5;
          /* the arrow points the way the gradient TRAVELS, which is from
             the last stop back toward the first — i.e. against +d */
          dctx.beginPath();
          dctx.moveTo(cx + dx * r * 0.5, cy + dy * r * 0.5);
          dctx.lineTo(cx - dx * r * 0.66, cy - dy * r * 0.66);
          dctx.stroke();
          const hx = cx - dx * r * 0.72, hy = cy - dy * r * 0.72;
          const pa = Math.atan2(-dy, -dx);
          dctx.beginPath();
          dctx.moveTo(hx + Math.cos(pa) * 12,      hy + Math.sin(pa) * 12);
          dctx.lineTo(hx + Math.cos(pa + 2.4) * 11, hy + Math.sin(pa + 2.4) * 11);
          dctx.lineTo(hx + Math.cos(pa - 2.4) * 11, hy + Math.sin(pa - 2.4) * 11);
          dctx.closePath(); dctx.fill();
          dctx.shadowBlur = 0;
        };
        const setFromEvent = ev => {
          const rect = cnv.getBoundingClientRect();
          const x = ev.clientX - rect.left - rect.width / 2;
          const y = ev.clientY - rect.top - rect.height / 2;
          if (x * x + y * y < 16) return;              // dead zone at center
          let deg = Math.atan2(x, -y) * 180 / Math.PI; // 0° = up
          deg = ((Math.round(deg) % 360) + 360) % 360;
          state.grid.gradDir = deg;
          applyGrid(); draw(); needsRender = true; autosave();
        };
        let dragging = false;
        cnv.addEventListener('pointerdown', ev => {
          dragging = true; cnv.setPointerCapture(ev.pointerId); setFromEvent(ev);
        });
        cnv.addEventListener('pointermove', ev => { if (dragging) setFromEvent(ev); });
        cnv.addEventListener('pointerup',   () => { dragging = false; });
        dirRedraws.push(draw);
        draw();
        if (meta && meta.show) visExtra.push({ el: div, show: meta.show });
        continue;
      }
      if (type === 'gridcolors'){
        /* dynamic list of gradient colors (2–10) with add/remove */
        const wrap = document.createElement('div');
        if (tip(path)) wrap.title = tip(path);
        body.appendChild(wrap);
        const rebuild = () => {
          wrap.innerHTML = '';
          state.grid.colors.forEach((hex, i) => {
            const rdiv = document.createElement('div');
            rdiv.className = 'row wide2';
            const lab = document.createElement('label');
            lab.textContent = 'Line color ' + (i + 1);
            const inner = document.createElement('div');
            inner.style.display = 'flex'; inner.style.gap = '4px';
            const inp = document.createElement('input');
            inp.type = 'color'; inp.value = hex; inp.style.flex = '1';
            inp.addEventListener('input', () => {
              state.grid.colors[i] = inp.value;
              applyGrid(); needsRender = true; autosave();
              for (const d of dirRedraws) d();   // dial shows live colors
            });
            inner.appendChild(inp);
            if (state.grid.colors.length > 2){
              const rm = document.createElement('button');
              rm.textContent = '×'; rm.title = 'Remove color';
              rm.style.flex = 'none'; rm.style.width = '26px';
              rm.style.padding = '2px';
              rm.addEventListener('click', () => {
                state.grid.colors.splice(i, 1);
                rebuild(); applyGrid(); needsRender = true; autosave();
                for (const d of dirRedraws) d();
              });
              inner.appendChild(rm);
            }
            rdiv.appendChild(lab); rdiv.appendChild(inner);
            wrap.appendChild(rdiv);
          });
          if (state.grid.colors.length < 10){
            const add = document.createElement('button');
            add.textContent = '+ Add color';
            add.style.width = '100%'; add.style.margin = '4px 0';
            add.addEventListener('click', () => {
              const list = state.grid.colors;
              list.push(list[list.length - 1]);
              rebuild(); applyGrid(); needsRender = true; autosave();
              for (const d of dirRedraws) d();
            });
            wrap.appendChild(add);
          }
        };
        rebuild();
        gcRebuilders.push(rebuild);
        if (meta && meta.show) visExtra.push({ el: wrap, show: meta.show });
        continue;
      }
      const div = document.createElement('div');
      div.className = 'row' + (type === 'rng' ? '' : ' wide2');
      if (tip(path)) div.title = tip(path);
      const lab = document.createElement('label');
      lab.textContent = label;
      div.appendChild(lab);
      let input, valEl = null;

      if (type === 'rng'){
        input = document.createElement('input');
        input.type = 'range';
        input.min = opts[0]; input.max = opts[1]; input.step = opts[2];
        // value readout doubles as a click-to-type field
        valEl = document.createElement('input');
        valEl.type = 'text';
        valEl.className = 'val';
        valEl.setAttribute('aria-label', label + ' value');
      } else if (type === 'colr'){
        input = document.createElement('input');
        input.type = 'color';
      } else if (type === 'chk'){
        input = document.createElement('input');
        input.type = 'checkbox';
      } else if (type === 'sel'){
        // a div, so the label's `for` can't bind — name it directly
        input = makeSelect(opts[0]);
        input.setAttribute('aria-label', label);
      } else if (type === 'txt'){
        input = document.createElement('input');
        input.type = 'text'; input.maxLength = 24; input.spellcheck = false;
      }
      // several rows can bind one path (per-mode variants) — ids stay unique
      lab.htmlFor = input.id = 'ctl_' + path.replace(/\./g, '_') + '_' + ctlUid++;
      div.appendChild(input);
      if (valEl) div.appendChild(valEl);
      body.appendChild(div);

      const evt = (type === 'chk' || type === 'sel') ? 'change' : 'input';
      input.addEventListener(evt, () => {
        let v;
        if (type === 'chk') v = input.checked;
        else if (type === 'rng') v = parseFloat(input.value);
        else if (type === 'sel')
          v = typeof getPath(state, path) === 'number' ? Number(input.value) : input.value;
        else v = input.value;
        setPath(state, path, v);
        if (valEl) valEl.value = fmtVal(v, parseFloat(input.step));
        syncTwins(path, v, input);
        appliers[sec.apply]();
        updateVis();
        needsRender = true;
        autosave();
      });
      if (valEl){
        const commit = () => {
          let v = parseFloat(valEl.value);
          if (isNaN(v)){
            valEl.value = fmtVal(getPath(state, path), parseFloat(input.step));
            return;
          }
          v = clamp(v, parseFloat(input.min), parseFloat(input.max));
          input.value = v;
          setPath(state, path, v);
          valEl.value = fmtVal(v, parseFloat(input.step));
          syncTwins(path, v, input);
          appliers[sec.apply]();
          updateVis();
          needsRender = true;
          autosave();
        };
        valEl.addEventListener('focus', () => valEl.select());
        valEl.addEventListener('change', commit);
        valEl.addEventListener('keydown', ev => {
          if (ev.key === 'Enter') valEl.blur();      // blur triggers commit
        });
      }
      bindings.push({ type, path, input, valEl, rowEl: div, meta });
    }
    container.appendChild(det);
  }
  // presets menu button — the label never changes, picks always fire
  makeSelect(PRESETS.map((p, i) => [i, p.name]),
             { el: document.getElementById('presetSel'),
               silent: true, menu: true });
  // mood arrow: the wrapper itself is the trigger, so it keeps drawing its
  // own ▾ glyph instead of the selected label
  makeSelect(Object.keys(MOODS).map(m => [m, m]),
             { el: document.getElementById('moodSel'), silent: true });
}
let ctlUid = 0;
/** keep every other control bound to the same path in step (the Horizon
    section shows per-mode variants of one property, only one visible) */
function syncTwins(path, v, self){
  for (const b of bindings){
    if (b.path !== path || b.input === self) continue;
    if (b.type === 'chk') b.input.checked = !!v;
    else b.input.value = v;
    if (b.valEl) b.valEl.value = fmtVal(getPath(state, path),
                                        parseFloat(b.input.step));
  }
}
function refreshUI(){
  for (const b of bindings){
    const v = getPath(state, b.path);
    if (b.type === 'chk') b.input.checked = !!v;
    else b.input.value = v;
    if (b.valEl && document.activeElement !== b.valEl)
      b.valEl.value = fmtVal(v, parseFloat(b.input.step));
  }
  for (const rebuild of gcRebuilders) rebuild();
  for (const d of dirRedraws) d();
  updateVis();
  document.getElementById('seedIn').value = state.seed;
}
/** hue-cycle moves state.anim.hueShift — mirror it onto its slider */
let _hueBind = null;
function syncHueSlider(){
  if (!_hueBind) _hueBind = bindings.find(b => b.path === 'anim.hueShift');
  if (!_hueBind) return;
  _hueBind.input.value = state.anim.hueShift;
  if (_hueBind.valEl && document.activeElement !== _hueBind.valEl)
    _hueBind.valEl.value = fmtVal(state.anim.hueShift, 1);
}

/* toast + UI visibility ------------------------------------------------ */
let toastTimer = 0;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  // reading time scales with length so long messages stay legible
  const ms = clamp(1500 + msg.length * 55, 2200, 9000);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
let panelHidden = false;
function toggleUI(show = panelHidden){
  panelHidden = !show;
  document.getElementById('panel').classList.toggle('hidden', panelHidden);
  document.getElementById('reveal').classList.toggle('gone', !panelHidden);
}

/* ════════════════════════════════════════════════════════════════════
   17. ACTIONS — randomize, save/load, import/export
   ════════════════════════════════════════════════════════════════════ */

function loadState(obj){
  state = deepMerge(deepClone(DEFAULTS), obj);
  applyAll();
  refreshUI();
  autosave();
}
function doRandomize(){
  const seed = (Math.random() * 0xffffffff) >>> 0;
  const mood = document.getElementById('moodSel').value;
  loadState(generateScene(seed, mood));
  toast(`Scene ${seed} · ${mood}`);
}
async function saveLink(){
  const enc = await encodeConfig(state);
  // query string (not #hash) so Wallpaper Engine and servers see it too
  const qs = '?config=' + enc;
  // rebuilt from pathname, so any ?preset= is replaced rather than appended —
  // an exact scene supersedes the name it may have started from
  history.replaceState(null, '', location.pathname + qs);
  presetUrlId = null;
  // The COPIED link always starts hidden — it exists to be pasted into a
  // wallpaper host, and the button lives inside the panel it would hide, so
  // asking the user to hide first was a chicken-and-egg. Nothing is lost by
  // forcing it: #reveal brings the panel back in one click. The address bar
  // deliberately does NOT get ui=0, so refreshing here still lands in the
  // editor with the panel up.
  const url = location.href + '&ui=0';
  const ok = 'Wallpaper link copied — it opens with the UI hidden (⚙ restores it)';
  try {
    await navigator.clipboard.writeText(url);
    toast(ok);
  } catch {
    // the async clipboard rejects whenever the wallpaper isn't focused, and a
    // native dialog would kill WE's CEF outright (see makeSelect) — fall back
    // to the deprecated copy, and failing that just point at the address bar
    toast(legacyCopy(url) ? ok
                          : 'Link is in the address bar — copy it and add &ui=0');
  }
}
/** clipboard fallback that never opens a dialog */
function legacyCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch { ok = false; }
  ta.remove();
  return ok;
}
function downloadJson(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'neonscape-scene.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
}

window.addEventListener('keydown', e => {
  const t = e.target;
  // .nsel is the div dropdown standing in for <select> (see makeSelect)
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' ||
            (t.classList && t.classList.contains('nsel')))) return;
  if (e.code === 'KeyH'){ toggleUI(panelHidden); }
  else if (e.code === 'KeyR'){ doRandomize(); }
  else if (e.code === 'KeyF'){ toggleFullscreen(); }
  else if (e.code === 'KeyS'){ saveLink(); }

    state.anim.play = !state.anim.play;
    refreshUI(); needsRender = true; autosave();

/* ════════════════════════════════════════════════════════════════════
   18. MAIN LOOP — single rAF, fps cap, adaptive quality, idle skip
   ════════════════════════════════════════════════════════════════════ */

const QSCALE = [1, 0.85, 0.7, 0.55];
let qStep = 0, ema = 0, winFrames = 0, goodWins = 0, winsSinceDown = 99;
let T = 0, lastNow = 0, capAcc = 0;
let scrollLine = 0, noiseOff = 0, roadScroll = 0, puddleOff = 0;
let bandShift = 0, hueSync = 0;
let gridGradPh = 0, gridHue = 0, audioBloom = 0;
let fpsAcc = 0, fpsFrames = 0;
let rafId = 0, wePaused = false;
const _v2 = new THREE.Vector2();

function applyRendererSize(){
  /* Floor at 1px: a host can lay the page out at 0x0 (offscreen, minimized,
     or before it is first shown), and w/h would then be 0/0 = NaN. That NaN
     lands in camera.aspect, poisoning the projection matrix and — because
     cityHalfWidth() scales by aspect — every city vertex with it. The render
     targets below were already floored the same way.                      */
  const w = Math.max(1, window.innerWidth), h = Math.max(1, window.innerHeight);
  const dpr = Math.min(window.devicePixelRatio || 1, state.anim.dprCap) * QSCALE[qStep];
  renderer.setPixelRatio(dpr);
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  msaaSamples = qStep >= 2 ? 0 : 4;
  renderer.getDrawingBufferSize(_v2);
  buildTargets(Math.max(1, _v2.x), Math.max(1, _v2.y));
  gridMat.uniforms.uResG.value.set(Math.max(1, _v2.x), Math.max(1, _v2.y));
  starMat.uniforms.uPx.value = dpr;
  finalMat.uniforms.uScanCnt.value = Math.max(80, Math.round(h / 3));
  // city spread is a share of SCREEN width, so a new aspect ratio means
  // a new skyline extent (cheap: ≤512 slots per row)
  if (state.mtn.mode === 'city') rebuildCity();
  syncSeaExtent();
  needsRender = true;
}
window.addEventListener('resize', applyRendererSize);

function tick(now){
  rafId = requestAnimationFrame(tick);
  let dtR = Math.min((now - lastNow) / 1000, 0.1);
  lastNow = now;

  /* optional fps cap (battery saver) */
  const cap = state.anim.fpsCap;
  if (cap > 0){
    capAcc += dtR;
    if (capAcc + 0.001 < 1 / cap) return;
    dtR = Math.min(capAcc, 0.1);
    capAcc = 0;
  }

  /* fps meter */
  fpsAcc += dtR; fpsFrames++;
  if (fpsAcc >= 0.5){
    document.getElementById('fpsRO').textContent =
      Math.round(fpsFrames / fpsAcc) + ' fps';
    fpsAcc = 0; fpsFrames = 0;
  }

  audioUpdate(dtR);

  const playing = state.anim.play;
  const dt = playing ? dtR * state.anim.speed : 0;
  T += dt;
  const tS = T % 3600;                    // wrapped copy for float32 uniforms

  /* idle skip: paused, nothing dirty, no audio driving visuals */
  if (!playing && !needsRender && !state.audio.on) return;
  needsRender = false;

  /* grid scroll (wrapped so precision holds over days) */
  const g = state.grid;
  const v = g.speed * 6;
  scrollLine = (((scrollLine - v * dt) % g.spacing) + g.spacing) % g.spacing;
  gridMat.uniforms.uScroll.value = scrollLine;
  const ns = 0.016 * g.rough;
  noiseOff = (((noiseOff - v * dt * ns) % NOISE_PER) + NOISE_PER) % NOISE_PER;
  gridMat.uniforms.uNOff.value = noiseOff;
  gridMat.uniforms.uTimeG.value = tS;
  /* road dashes travel with the floor — plus road.speed, so the surface can
     slide against the grid under it, or run on its own while the floor is
     stopped — but wrap on their OWN period:
     uScroll wraps modulo the grid spacing, which would jerk a dash
     pattern of any other length every time it came round. The puddles
     ride a third accumulator, wrapped to the noise period. Both take the
     same rv, so the water never drifts against the tarmac it sits on.  */
  if (state.road.on){
    const r = state.road, A = state.audio, ru = gridMat.uniforms;
    const dl = r.dashLen, rv = v + r.speed * 6;
    roadScroll = (((roadScroll - rv * dt) % dl) + dl) % dl;
    ru.uRoadScroll.value = roadScroll;
    puddleOff = (((puddleOff - rv * dt * PUDDLE_NS) % NOISE_PER) + NOISE_PER)
              % NOISE_PER;
    ru.uPuddleOff.value = puddleOff;
    /* audio rides ON TOP of each slider rather than replacing it, so a
       band can only ever push an effect further, never mute one the user
       set — the same contract every other modulator here follows */
    const amt = m => bandVal(m) * (m.boost ?? 1);
    ru.uRoadPulse.value = bandVal(A.mRoad) * 1.8 * (A.mRoad.boost ?? 1);
    ru.uSurfAmt.value   = clamp(r.surfAmt + amt(A.mRoadSurf), 0, 1);
    ru.uRoadGloss.value = clamp(r.gloss   + amt(A.mRoadGloss) * 1.5, 0, 3);
    ru.uPuddle.value    = clamp(r.puddle  + amt(A.mRoadPud), 0, 1);
    ru.uMarkW.value     = r.markW * (1 + amt(A.mRoadMark) * 2.5);
    ru.uDashDuty.value  = clamp(r.dashDuty + amt(A.mRoadDash) * 0.5,
                                0.02, 0.98);
  }
  /* sensitivity scales the pulse; boost ADDS raw audio glow on top of
     the configured glow so beats flash even when base glow is low */
  const gridAv = bandVal(state.audio.mGrid);
  gridMat.uniforms.uPulse.value = gridAv * 3.2;
  gridMat.uniforms.uGlow.value =
    g.glow + gridAv * (state.audio.mGrid.boost ?? 1) * 0.9;
  gridMat.uniforms.uAmpPulse.value =
    bandVal(state.audio.mTerrain) * 14 * (state.audio.mTerrain.boost ?? 1);
  if (g.colorMode === 'gradient'){
    // speed 0 = static; the offset slider still positions it
    if (g.flowSpd > 0.0001)
      gridGradPh = (gridGradPh + dt * g.flowSpd * 0.06) % 1;
    gridMat.uniforms.uGradPh.value = gridGradPh + g.gradOff;
  } else if (g.colorMode === 'cycle'){
    // slow hue rotation of the whole floor color
    gridHue = (gridHue + dt * g.flowSpd * 0.02) % 1;
    gridMat.uniforms.uLine.value.set(g.color).offsetHSL(gridHue, 0, 0);
    gridMat.uniforms.uBase.value
      .copy(gridMat.uniforms.uLine.value).multiplyScalar(0.05);
  } else if (g.colorMode === 'colors'){
    // color cycle: whole floor interpolates through the chosen colors
    gridHue = (gridHue + dt * g.flowSpd * 0.03) % 1;
    const list = g.colors;
    const x = gridHue * list.length;
    const i = Math.floor(x), fr = x - i;
    _c1.set(list[i]); _c2.set(list[(i + 1) % list.length]);
    _c1.lerp(_c2, fr * fr * (3 - 2 * fr));
    gridMat.uniforms.uLine.value.copy(_c1);
    gridMat.uniforms.uBase.value.copy(_c1).multiplyScalar(0.05);
  }

  /* sun / moon */
  const su = state.sun;
  if (su.on){
    bandShift = (bandShift + dt * 0.012 * su.pulseSpd) % 1;
    sunMat.uniforms.uBandShift.value = bandShift;
    gridMat.uniforms.uSunBandShift.value = bandShift;   // reflection matches
    const pulse = 1 + Math.sin(T * su.pulseSpd * 1.6) * su.pulse * 0.05;
    const aSun = 1 + bandVal(state.audio.mSun) * 0.35
                   * (state.audio.mSun.boost ?? 1);
    const sc = sunBaseScale * pulse * aSun;
    sunQuad.scale.set(sc, sc, 1);
    // the reflection follows the audio-scaled size, slightly damped —
    // its stretched tail amplifies growth, so 1:1 looks oversized
    gridMat.uniforms.uSunR.value = su.size * pulse * (1 + (aSun - 1) * 0.55);
    sunMat.uniforms.uBright.value =
      1.25 * (1 + Math.sin(T * su.pulseSpd * 1.6) * su.pulse * 0.2);
    // audio: halo size / intensity pulse on beats (silence-floor cut,
    // gentle coefficients — the halo falloff is very nonlinear)
    const gSize = su.glow + bandPulse(state.audio.mSunGlow) * 0.25;
    const gInt = su.glowInt + bandPulse(state.audio.mSunGlowInt) * 0.8;
    sunMat.uniforms.uGlow.value = gSize;
    sunMat.uniforms.uGlowInt.value = gInt;
    // the floor's halo scatter rides the same pulsed values
    gridMat.uniforms.uSunGlow.value = gSize;
    gridMat.uniforms.uSunGlowInt.value = gInt;
    if (su.mode === 'wire'){
      wireMoon.scale.setScalar(su.size * pulse * aSun);
      wireMoon.rotation.y = tS * 0.05;
      wireMoon.rotation.x = 0.4;
      // reflection twin: identical rotation & scale under the mirrored
      // root, so it tracks the moon's exact shape and spin
      if (wireReflRoot.visible){
        wireReflMoon.scale.copy(wireMoon.scale);
        wireReflMoon.rotation.copy(wireMoon.rotation);
        wireReflMat.uniforms.uTimeW.value = tS;
      }
    }
  }

  /* stars / sky */
  starMat.uniforms.uTime.value = tS;
  starMat.uniforms.uBright.value = 1 + bandVal(state.audio.mStars) * 2.2;
  starPoints.rotation.y = (starPoints.rotation.y + dt * state.stars.drift * 0.006)
    % (Math.PI * 2);
  updateShooters(T, dt);
  updateClouds(dt);
  updateBeams(T, tS);
  /* weather */
  const fxs = state.fx;
  if (fxs.weather !== 'none') rainMat.uniforms.uTime.value = tS;
  if (fxs.weather === 'storm'){
    if (dt > 0 && T >= nextStrike) strikeLightning(T);
    if (boltT > 0){
      boltT -= dt;
      boltLine.material.opacity = clamp(boltT / 0.22, 0, 1) * 0.9;
      if (boltT <= 0) boltLine.visible = false;
    }
    flash *= Math.exp(-dt * 6.5);
  } else if (flash > 0){
    flash = 0;
    boltLine.visible = false;
  }
  finalMat.uniforms.uFlash.value = Math.min(flash, 1);

  if (fxs.palms){
    if (fxs.palmSway > 0.001){
      palmMat.uniforms.uTime.value = tS;
      palmGlowMat.uniforms.uTime.value = tS;
      gridMat.uniforms.uPalmTime.value = tS;   // reflected palms sway too
    }
    // two separate audio effects: silhouette tint and surrounding halo;
    // the halo also has a manual base level from the Palms section
    const pTint = bandVal(state.audio.mPalms) * 1.1
                * (state.audio.mPalms.boost ?? 1);
    palmMat.uniforms.uGlowA.value = pTint;
    gridMat.uniforms.uPalmGlowA.value = pTint;
    const ph = fxs.palmHalo * 0.85
      + bandPulse(state.audio.mPalmHalo) * 0.9
        * (state.audio.mPalmHalo.boost ?? 1);
    palmGlowMat.uniforms.uGlowA.value = ph;
    palmGlowGroup.visible = ph > 0.02;
  }
  /* horizon: each type gets its own audio response from the same knob */
  const aMtn = state.audio.mMtn, aMtnB = aMtn.boost ?? 1;
  if (state.mtn.mode === 'mountains'){
    // whole range breathes upward with the beat
    const ms = 1 + bandVal(aMtn) * 0.5 * aMtnB;
    mtnGroup.scale.y = ms;
    gridMat.uniforms.uHorizSY.value = ms;      // reflection follows
  } else if (state.mtn.mode === 'city'){
    // windows flare, and the whole skyline can grow with the beat
    const wa = 1 + bandVal(aMtn) * 1.6 * aMtnB;
    const aCH = state.audio.mCityH;
    const hs = Math.min(1 + bandVal(aCH) * 0.7 * (aCH.boost ?? 1), CITY_H_MAX);
    for (const cm of cityGroup.children){
      cm.material.uniforms.uWinA.value = wa;
      cm.material.uniforms.uHScale.value = hs;
    }
    gridMat.uniforms.uHorizSY.value = hs;      // reflection follows
  } else if (state.mtn.mode === 'sea'){
    const su2 = seaMat.uniforms, mh = state.mtn;
    const av = bandVal(aMtn) * aMtnB;
    // the tide comes in with the music: extent reaches further up the
    // floor, waterline climbs higher over the terrain
    const aSpan = state.audio.mSeaSpan, aLvl = state.audio.mSeaLevel;
    syncSeaExtent(1 + bandVal(aSpan) * 1.1 * (aSpan.boost ?? 1));
    su2.uWaterY.value = mh.waterY
      + bandVal(aLvl) * 14 * (aLvl.boost ?? 1);
    /* unwrapped time: a wrap would visibly reshuffle the wave field.
       float32 phase error only reaches ~0.06 rad after a week — soft
       noise in the waves, not a glitch — so wrap once a day instead */
    su2.uTime.value = T % 86400;
    su2.uWaveA.value = mh.waveAmp * (1 + av * 0.9);
    su2.uGlint.value = mh.glint * (1 + av * 0.8);
    // glint tracks the audio-scaled sun exactly like the floor shader
    su2.uSunR.value = gridMat.uniforms.uSunR.value;
    su2.uSunX.value = gridMat.uniforms.uSunX.value;
    su2.uSunY.value = gridMat.uniforms.uSunY.value;
    su2.uSunOn.value = state.sun.on ? 1 : 0;
    su2.uSunC1.value.copy(gridMat.uniforms.uSunC1.value);
    su2.uSunC2.value.copy(gridMat.uniforms.uSunC2.value);
    su2.uSunC3.value.copy(gridMat.uniforms.uSunC3.value);
    su2.uHueR.value = skyMat.uniforms.uHue.value;   // sky drift stays mirrored
  }
  if (fxs.hero !== 'none'){
    if (fxs.heroSpin > 0.001) heroGroup.rotation.y += dt * fxs.heroSpin;
    else heroGroup.rotation.y = fxs.heroAngle * Math.PI / 180;
    heroGroup.position.y = fxs.heroY + Math.sin(T * 0.7) * 0.9;
    heroGroup.scale.setScalar(
      fxs.heroSize * (1 + bandVal(state.audio.mHero) * 0.3));
    // audio glow: brightness on top of the custom-bloom multiplier
    heroMat.color.copy(_heroBase)
      .multiplyScalar(_heroMul + bandVal(state.audio.mHeroGlow) * 1.8);
  }
  if (fxs.text){
    const tv = bandVal(state.audio.mText);
    textMesh.position.y = fxs.textY + Math.sin(T * 0.4) * 1.4;
    const tsz = fxs.textSize * (1 + tv * 0.12);
    textMesh.scale.set(tsz * textAspect, tsz, 1);
    textMesh.material.color.setScalar(
      _textMul * (1 + tv * 0.5) + bandVal(state.audio.mTextGlow) * 2.0);
  }
  skyMat.uniforms.uHue.value = state.sky.drift > 0
    ? Math.sin(T * 0.03 * state.sky.drift) * 0.4 : 0;
  /* hue-cycle advances the user-visible Hue shift value itself */
  if (state.anim.hue > 0){
    state.anim.hueShift = (state.anim.hueShift + dt * state.anim.hue * 2.9) % 360;
    if ((hueSync += dtR) > 0.25){ hueSync = 0; syncHueSlider(); }
  }
  finalMat.uniforms.uHue.value = state.anim.hueShift * Math.PI / 180;

  /* camera motion */
  const c = state.cam;
  let px = Math.sin(T * c.swaySpd * 0.5) * c.sway * 1.8;
  let py = c.height + Math.sin(T * c.swaySpd * 0.77) * c.sway * 0.55;
  let pz = 18 + Math.sin(T * c.dollySpd * 0.3) * c.dolly * 6;
  if (c.orbit > 0){
    const a = Math.sin(T * c.orbitSpd * 0.18) * c.orbit * 0.3;
    const dx = px, dz = pz + 30;          // pivot around (0, ·, -30)
    px = Math.cos(a) * dx - Math.sin(a) * dz;
    pz = Math.sin(a) * dx + Math.cos(a) * dz - 30;
  }
  camera.position.set(px, py, pz);
  camera.lookAt(CAM_LOOK);
  gridMat.uniforms.uCamPos.value.copy(camera.position);  // reflection anchor
  /* audio FOV punch (skip the matrix rebuild when inactive) */
  const fovNow = state.cam.fov + bandVal(state.audio.mFov) * 8;
  if (Math.abs(fovNow - camera.fov) > 0.01){
    camera.fov = fovNow;
    camera.updateProjectionMatrix();
  }

  /* post per-frame uniforms */
  finalMat.uniforms.uTime.value = tS;
  audioBloom = bandVal(state.audio.mBloom);
  // boost adds audio-only bloom so beats flash even when scene bloom is low
  finalMat.uniforms.uBloomStr.value =
    state.post.bloomStr * (1 + audioBloom * 2.2)
    + audioBloom * (state.audio.mBloom.boost ?? 1) * 0.9;
  finalMat.uniforms.uJit.value = bandVal(state.audio.mScan);

  renderFrame();

  /* adaptive quality — only meaningful when uncapped */
  if (state.anim.adaptive && cap === 0){
    ema = ema ? ema * 0.94 + dtR * 0.06 : dtR;
    winFrames++;
    if (winFrames >= 90){
      winFrames = 0; winsSinceDown++;
      if (ema > 0.021 && qStep < QSCALE.length - 1){
        qStep++; winsSinceDown = 0; goodWins = 0;
        applyRendererSize();
      } else if (ema < 0.0172 && qStep > 0 && winsSinceDown > 20 && ++goodWins >= 5){
        qStep--; goodWins = 0;
        applyRendererSize();
      }
    }
  }
}

/* pause when hidden / when Wallpaper Engine says so */
function syncRunning(){
  const should = !document.hidden && !wePaused;
  if (should && !rafId){
    lastNow = performance.now();
    rafId = requestAnimationFrame(tick);
  } else if (!should && rafId){
    cancelAnimationFrame(rafId);
    rafId = 0;
  }
}
document.addEventListener('visibilitychange', syncRunning);
window.wallpaperPropertyListener = {
  setPaused(p){ wePaused = p; syncRunning(); }
};
document.getElementById('presetSel').addEventListener('change', e => {
  const i = e.target.value;
  e.target.value = '';               // a menu, not a selection — re-arm it
  if (i === '') return;
  applyPreset(PRESETS[i]);
});

/* ════════════════════════════════════════════════════════════════════
   19. BOOT — URL config → localStorage → defaults
   ════════════════════════════════════════════════════════════════════ */

(async function boot(){
  buildUI();
  const h = parseParams();
  let loaded = null, badPreset = '';
  if (h.config){
    try { loaded = await decodeConfig(h.config); }
    catch { console.warn('Neonscape: bad config param, ignoring'); }
  }
  /* preset= is consulted only when config= produced nothing */
  if (!loaded && h.preset !== undefined){
    const p = PRESETS.find(x => x.id === h.preset);
    if (p){ loaded = presetState(p); presetUrlId = p.id; }
    else  { badPreset = h.preset; clearPresetUrl(); }
  }
  /* localStorage is skipped outright when a preset was asked for — an
     explicit link must not be overridden by whatever was last edited on
     this machine, and an unknown one falls back to defaults, not to it */
  if (!loaded && h.preset === undefined){
    try {
      const ls = localStorage.getItem(LS_KEY);
      if (ls) loaded = JSON.parse(ls);
    } catch {}
  }
  if (loaded) state = deepMerge(deepClone(DEFAULTS), loaded);
  if (h.ui === '0' || (isWE && h.ui === undefined)) toggleUI(false);
  applyAll();
  refreshUI();
  if (badPreset) toast(`Unknown preset “${badPreset}” — loaded defaults`);
  applyRendererSize();
  renderFrame();                    // paint immediately, then pre-warm
  // no rAF is running yet, so swapping defines here can never flicker
  await prewarmReflections();
  syncRunning();

  /* tiny debug/test hook: single-step one frame synchronously
     (used for automated smoke-tests; harmless in production)   */
  window.__neon = {
    state: () => state,
    frame(ms = performance.now()){
      lastNow = ms - 16.7;
      tick(ms);
      if (rafId && document.hidden){ cancelAnimationFrame(rafId); rafId = 0; }
    },
    randomize: doRandomize,
    loadState,
    gridMat, finalMat, audioEng,   // debug: uniform/band inspection in tests
    wireMoon, wireReflMoon, wireReflRoot, scene, camera, renderer,
    seaMat, cityGroup, mtnGroup,
  };
})();

</script>
