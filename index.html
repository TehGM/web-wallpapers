<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Black Hole</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; touch-action: none; user-select: none; }
  canvas.grabbable { cursor: grab; }
  canvas.grabbing { cursor: grabbing; }

  .bh-bar {
    position: fixed; top: 14px; right: 14px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
    opacity: 0.35; transition: opacity 0.25s;
  }
  .bh-bar:hover { opacity: 1; }
  .bh-btn {
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(12,14,22,0.65); color: #cfd4e2;
    font-size: 17px; line-height: 1; cursor: pointer;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .bh-btn:hover { background: rgba(30,34,50,0.85); }
  .bh-panel {
    position: fixed; top: 14px; right: 64px; z-index: 10; width: 262px;
    max-height: calc(100vh - 28px); overflow-y: auto; box-sizing: border-box;
    padding: 14px 16px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(12,14,22,0.8); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #cfd4e2; font: 12px/1.4 system-ui, sans-serif;
  }
  .bh-h {
    margin: 12px 0 4px; font-weight: 600; font-size: 10px;
    letter-spacing: 0.09em; text-transform: uppercase; color: #8b93a7;
  }
  .bh-h:first-child { margin-top: 0; }
  .bh-row { margin: 7px 0; }
  .bh-row > label { display: flex; justify-content: space-between; margin-bottom: 2px; }
  .bh-val { color: #8b93a7; }
  .bh-row input[type=range] { width: 100%; margin: 0; accent-color: #e08a3c; }
  .bh-row input[type=number], .bh-row .bh-sel {
    width: 100%; box-sizing: border-box; padding: 4px 6px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px; color: inherit; font: inherit;
  }
  /* Dropdown built from plain divs — see makeSelect(). A real <select>
     must never exist here; see the note there. */
  .bh-row .bh-sel {
    position: relative; padding-right: 20px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bh-row .bh-sel::after {
    content: ""; position: absolute; right: 7px; top: 50%; margin-top: -2px;
    border: 4px solid transparent; border-top-color: #8b93a7;
  }
  .bh-sel:focus-visible { outline: 1px solid rgba(255,255,255,0.35); }
  .bh-opts {
    position: fixed; z-index: 20; padding: 3px; border-radius: 6px;
    background: #14161f; border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 8px 24px rgba(0,0,0,0.55);
    color: #cfd4e2; font: 12px/1.4 system-ui, sans-serif;
    max-height: 40vh; overflow-y: auto;
  }
  .bh-opt { padding: 4px 8px; border-radius: 4px; cursor: pointer; }
  .bh-opt:hover { background: rgba(255,255,255,0.10); }
  .bh-opt.sel { background: rgba(224,138,60,0.22); }
  .bh-row input[type=color] {
    width: 100%; height: 28px; margin-top: 4px; padding: 0;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    background: none; cursor: pointer;
  }
  .bh-check { display: flex; align-items: center; gap: 8px; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";

/* ============================================================
   CONFIGURATION
   Everything visual is driven by `seed` — change it for a
   different nebula / palette / star layout. Also available at
   runtime from the console:  BlackHole.setSeed(123)
   ============================================================ */
const CONFIG = {
  seed: 1340,

  // Side control buttons (generate / settings / share / hide).
  // Press H in the page to toggle them at any time. URL key: ui=0
  showUI: true,

  // Master switch for the only control: dragging to orbit the
  // camera (wheel zooms). When false, all input is disabled and
  // the renderer switches to a heavily optimized static path:
  // the lensed background is computed once and cached, and each
  // frame only re-shades the animated parts (disk + twinkle).
  // Appearance is identical to the interactive mode.
  cameraControl: true,

  camera: {
    yaw: 0.55,        // radians around the hole
    pitch: 0.30,      // radians above the disk plane
    distance: 26.0,
    minDistance: 8.5,
    maxDistance: 44.0,
    fov: 55           // vertical field of view, degrees
  },

  blackHole: {
    diskInner: 2.6,     // event horizon radius is 1.0
    diskOuter: 6.2,
    diskSpeed: 0.55,    // rotation speed of the accretion disk
    diskBrightness: 2.6,
    doppler: 0.35,      // brightness asymmetry of the spinning disk (0 = off)
    glow: 1.0,          // photon-ring / halo glow intensity
    diskColor: null     // null = classic orange (subtle seed tint),
                        // "seed" = hue fully derived from the seed,
                        // or an explicit "#rrggbb" color
  },

  background: {
    nebulaCount: 3,       // number of distinct wispy nebulae (0..8)
    nebulaIntensity: 1.0, // brightness of those nebulae
    ambient: 0.4,         // faint background haze / band; 0 = pitch-black sky
    starDensity: 1.0,     // how many stars
    starBrightness: 1.0,
    twinkleSpeed: 1.3,
    motion: 0.3           // subtle nebula drift; 0 = fully static background,
                          // which also unlocks the fastest static-camera path
  },

  quality: {
    renderScale: 1.0,   // internal resolution as a fraction of screen size
    maxFPS: 30,         // 0 = uncapped
    marchSteps: 56      // ray-march steps for the lensing
  },

  exposure: 1.15
};

/* ============================================================
   URL <-> CONFIG
   Any value differing from the defaults above is kept in the query
   string, so the address bar is always a shareable link that
   reproduces the exact look.
   ============================================================ */
const DEFAULTS = JSON.parse(JSON.stringify(CONFIG));

const PARAMS = [
  ["seed",       ["seed"],                          "int"],
  ["ui",         ["showUI"],                        "bool"],
  ["cam",        ["cameraControl"],                 "bool"],
  ["yaw",        ["camera", "yaw"],                 "float"],
  ["pitch",      ["camera", "pitch"],               "float"],
  ["dist",       ["camera", "distance"],            "float"],
  ["minDist",    ["camera", "minDistance"],         "float"],
  ["maxDist",    ["camera", "maxDistance"],         "float"],
  ["fov",        ["camera", "fov"],                 "float"],
  ["diskIn",     ["blackHole", "diskInner"],        "float"],
  ["diskOut",    ["blackHole", "diskOuter"],        "float"],
  ["diskSpeed",  ["blackHole", "diskSpeed"],        "float"],
  ["diskBright", ["blackHole", "diskBrightness"],   "float"],
  ["doppler",    ["blackHole", "doppler"],          "float"],
  ["glow",       ["blackHole", "glow"],             "float"],
  ["diskColor",  ["blackHole", "diskColor"],        "color"],
  ["nebulae",    ["background", "nebulaCount"],     "int"],
  ["nebInt",     ["background", "nebulaIntensity"], "float"],
  ["ambient",    ["background", "ambient"],         "float"],
  ["stars",      ["background", "starDensity"],     "float"],
  ["starBright", ["background", "starBrightness"],  "float"],
  ["twinkle",    ["background", "twinkleSpeed"],    "float"],
  ["motion",     ["background", "motion"],          "float"],
  ["scale",      ["quality", "renderScale"],        "float"],
  ["fps",        ["quality", "maxFPS"],             "int"],
  ["steps",      ["quality", "marchSteps"],         "int"],
  ["exposure",   ["exposure"],                      "float"]
];

function cfgGet(o, p) { for (let i = 0; i < p.length; i++) o = o[p[i]]; return o; }
function cfgSet(o, p, v) { for (let i = 0; i < p.length - 1; i++) o = o[p[i]]; o[p[p.length - 1]] = v; }
const r3 = (x) => Math.round(x * 1000) / 1000;
function debounce(fn, ms) { let t = 0; return () => { clearTimeout(t); t = setTimeout(fn, ms); }; }

(function applyQuery() {
  const sp = new URLSearchParams(location.search);
  for (const [key, path, type] of PARAMS) {
    if (!sp.has(key)) continue;
    const raw = sp.get(key);
    let v;
    if (type === "int") { v = Math.round(parseFloat(raw)); if (!isFinite(v)) continue; }
    else if (type === "float") { v = parseFloat(raw); if (!isFinite(v)) continue; }
    else if (type === "bool") { v = raw === "1" || raw === "true"; }
    else { // color: "null", "seed" or rrggbb
      if (raw === "seed") v = "seed";
      else if (/^[0-9a-fA-F]{6}$/.test(raw)) v = "#" + raw.toLowerCase();
      else if (raw === "" || raw === "null") v = null;
      else continue;
    }
    cfgSet(CONFIG, path, v);
  }
})();

function buildQuery() {
  const sp = new URLSearchParams();
  for (const [key, path, type] of PARAMS) {
    let v = cfgGet(CONFIG, path);
    let d = cfgGet(DEFAULTS, path);
    if (type === "float") { v = r3(v); d = r3(d); }
    if (type === "int") { v = Math.round(v); d = Math.round(d); }
    if (type === "bool") { v = !!v; d = !!d; }
    if (v === d) continue;
    if (type === "bool") sp.set(key, v ? "1" : "0");
    else if (type === "color") sp.set(key, v == null ? "null" : String(v).replace("#", ""));
    else sp.set(key, String(v));
  }
  return sp.toString();
}

function updateURL() {
  const q = buildQuery();
  try { history.replaceState(null, "", location.pathname + (q ? "?" + q : "")); } catch (_) {}
}

/* ============================================================ */

(function () {
  const canvas = document.getElementById("c");
  const gl = canvas.getContext("webgl2", {
    alpha: false, depth: false, stencil: false, antialias: false,
    powerPreference: "low-power", preserveDrawingBuffer: false
  });
  if (!gl) {
    document.body.innerHTML = "<p style='color:#888;font-family:sans-serif;padding:2em'>WebGL2 is required.</p>";
    return;
  }
  const floatBufOK = !!(gl.getExtension("EXT_color_buffer_float") ||
                        gl.getExtension("EXT_color_buffer_half_float"));

  /* ---------- shaders ---------- */

  const VS = `#version 300 es
  void main() {
    vec2 p = vec2(float((gl_VertexID << 1) & 2), float(gl_VertexID & 2));
    gl_Position = vec4(p * 2.0 - 1.0, 0.0, 1.0);
  }`;

  const CHUNK = `
  precision highp float;
  #define STEPS ${Math.max(8, CONFIG.quality.marchSteps | 0)}
  #define RFAR 8.0

  uniform vec2  uRes;
  uniform float uTime;
  uniform vec3  uCamPos, uCamRight, uCamUp, uCamFwd;
  uniform float uFovS;
  uniform float uDiskIn, uDiskOut, uDiskSpeed, uDiskBright, uDoppler, uGlow;
  uniform vec3  uDiskCold, uDiskHot, uGlowCol;
  uniform vec3  uNebA, uNebC, uBandDir;
  uniform vec3  uNebOff1, uNebOff2, uNebOff3, uStarOff, uDiskOff;
  uniform float uNebInt, uStarDen, uStarBright, uTwSpd, uExposure;
  uniform float uAmbient, uDynBG;
  uniform vec3  uBGVel1, uBGVel2;
  uniform int   uNebCount;
  uniform vec4  uNebDirs[8]; // xyz = center direction, w = angular size
  uniform vec4  uNebCols[8]; // rgb = color, w = detail scale

  float hash13(vec3 p) {
    p = fract(p * 0.1031);
    p += dot(p, p.zyx + 31.32);
    return fract((p.x + p.y) * p.z);
  }
  vec3 hash33(vec3 p) {
    p = fract(p * vec3(0.1031, 0.1030, 0.0973));
    p += dot(p, p.yxz + 33.33);
    return fract((p.xxy + p.yxx) * p.zyx);
  }
  float vnoise(vec3 p) {
    vec3 i = floor(p), f = p - i;
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(mix(hash13(i),                     hash13(i + vec3(1,0,0)), f.x),
          mix(hash13(i + vec3(0,1,0)),       hash13(i + vec3(1,1,0)), f.x), f.y),
      mix(mix(hash13(i + vec3(0,0,1)),       hash13(i + vec3(1,0,1)), f.x),
          mix(hash13(i + vec3(0,1,1)),       hash13(i + vec3(1,1,1)), f.x), f.y), f.z);
  }
  float fbm4(vec3 p) {
    float a = 0.5, s = 0.0;
    for (int i = 0; i < 4; i++) { s += a * vnoise(p); p = p * 2.03 + 11.3; a *= 0.5; }
    return s;
  }
  float fbm3(vec3 p) {
    float a = 0.55, s = 0.0;
    for (int i = 0; i < 3; i++) { s += a * vnoise(p); p = p * 2.11 + 7.7; a *= 0.5; }
    return s;
  }

  // Domain-warped ridged noise: thin bright filaments over a soft
  // cloud body, with large-scale voids carving the sparse look.
  vec3 wispField(vec3 p, vec3 nc, vec3 dr1, vec3 dr2) {
    float q = fbm4(p * 1.1 + uNebOff2 + dr1);
    float n = fbm4(p * 1.9 + q * 1.7 + uNebOff3 + dr2);
    float r0 = 1.0 - abs(2.0 * n - 1.0);
    float voids = pow(q, 1.6) * 1.9;
    return (nc * (pow(n, 3.0) * 1.1 + pow(r0, 4.0) * n * 2.6)
          + mix(nc, vec3(1.0, 0.94, 0.97), 0.55) * pow(r0, 12.0) * n * 1.8) * voids;
  }

  vec3 nebula(vec3 d) {
    vec3 dr1 = uBGVel1 * uTime;
    vec3 dr2 = uBGVel2 * uTime;
    // faint ambient haze + galactic band (scaled by uAmbient)
    float h1 = fbm4(d * 1.8 + uNebOff1 + dr1);
    float bn = fbm4(d * 2.6 + uNebOff3 + dr2);
    float band = pow(max(0.0, 1.0 - abs(dot(d, uBandDir))), 3.5);
    vec3 c = (uNebA * pow(h1, 3.2) * 0.60
            + uNebC * band * (0.05 + 0.75 * pow(bn, 3.0))) * uAmbient;
    // discrete wispy nebulae: soft angular mask around each
    // seed-placed center. The loop only ranks masks; the expensive
    // domain-warped ridged noise runs for at most the two strongest
    // nebulae per pixel, added together so overlaps blend seamlessly.
    float m1 = 0.0, m2 = 0.0;
    vec3 p1v = vec3(0.0), p2v = vec3(0.0);
    vec3 c1v = vec3(0.0), c2v = vec3(0.0);
    for (int i = 0; i < 8; i++) {
      if (i >= uNebCount) break;
      float w = uNebDirs[i].w;
      float m = smoothstep(1.0 - w, 1.0 - w * 0.25, dot(d, uNebDirs[i].xyz));
      vec3 p = d * uNebCols[i].w + uNebDirs[i].xyz * 57.3;
      if (m > m1) {
        m2 = m1; p2v = p1v; c2v = c1v;
        m1 = m; p1v = p; c1v = uNebCols[i].rgb;
      } else if (m > m2) {
        m2 = m; p2v = p; c2v = uNebCols[i].rgb;
      }
    }
    if (m1 > 0.004) c += m1 * wispField(p1v, c1v, dr1, dr2) * uNebInt;
    if (m2 > 0.010) c += m2 * wispField(p2v, c2v, dr1, dr2) * uNebInt;
    return c;
  }

  void starLayer(vec3 d, float s, float den, float bmax,
                 inout vec3 col, inout float ph, inout float best) {
    vec3 p = d * s + uStarOff;
    vec3 i = floor(p);
    vec3 h = hash33(i);
    if (h.x < den) {
      vec3 sp = 0.2 + 0.6 * hash33(i + 17.17);
      float dist = length(p - i - sp);
      float br = bmax * (0.2 + 0.8 * pow(h.z, 6.0));
      float I = br * exp(-dist * dist * 250.0);
      if (I > best) { best = I; ph = h.y; }
      vec3 tint = mix(vec3(1.0, 0.72, 0.45), vec3(0.62, 0.74, 1.0), h.y);
      col += I * mix(tint, vec3(1.0), 0.4);
    }
  }
  vec4 stars(vec3 d) {
    vec3 col = vec3(0.0);
    float ph = 0.0, best = 0.0;
    starLayer(d,  9.0, 0.60 * uStarDen, 3.2 * uStarBright, col, ph, best);
    starLayer(d, 22.0, 0.50 * uStarDen, 1.8 * uStarBright, col, ph, best);
    starLayer(d, 45.0, 0.42 * uStarDen, 1.0 * uStarBright, col, ph, best);
    return vec4(col, ph);
  }

  float twinkle(float ph) {
    return 0.72 + 0.45 * sin(uTime * uTwSpd + ph * 6.28318);
  }

  vec3 glowTerm(float b) {
    float g    = exp(-abs(b - 2.6) * 2.0) * smoothstep(1.8, 2.5, b);
    float halo = exp(-max(b - 2.6, 0.0) * 0.30) * smoothstep(1.9, 2.8, b);
    return uGlowCol * (g * 0.8 + halo * 0.10) * uGlow;
  }

  // Accretion disk shading: pure function of the (static) crossing
  // point (r, phi) and time — shared by the live and cached paths.
  // Returns rgb emission plus density in .a (used to occlude the
  // background behind the disk).
  vec4 shadeDisk(float r, float phi) {
    float x = clamp((r - uDiskIn) / (uDiskOut - uDiskIn), 0.0, 1.0);
    float fade = smoothstep(0.0, 0.06, x) * pow(1.0 - x, 1.7);
    float heat = pow(uDiskIn / r, 2.0);
    float a = phi + uTime * uDiskSpeed * pow(uDiskIn / r, 1.5) * 2.0;
    vec3 np = vec3(cos(a), sin(a), 0.0) * (1.6 + r * 0.35);
    np.z = r * 2.0;
    float n = fbm3(np * 1.1 + uDiskOff);
    float rings = 0.55 + 0.45 * sin(r * 7.0 + (n - 0.5) * 5.0);
    float dens = fade * (0.35 + 1.10 * n) * (0.60 + 0.40 * rings);
    vec3 col = mix(uDiskCold, uDiskHot, heat);
    vec3 p = vec3(r * cos(phi), 0.0, r * sin(phi));
    vec3 vel = vec3(sin(phi), 0.0, -cos(phi));
    float dop = 1.0 + uDoppler * dot(vel, normalize(uCamPos - p));
    dop = dop * dop * dop;
    col *= dens * heat * uDiskBright * dop * 2.2;
    col += vec3(1.0, 0.9, 0.75) * fade * heat * heat * 0.9 * dop;
    return vec4(col, dens);
  }

  // Bent-light ray trace. Simplified photon geodesic around a hole
  // of horizon radius 1 at the origin. Records up to two disk-plane
  // crossings so the disk can be shaded (and cached) separately.
  void trace(vec3 ro, vec3 rd, out vec3 ed, out float cap, out vec4 crs, out float beff) {
    cap = 0.0; crs = vec4(0.0); ed = rd;
    float tc = dot(-ro, rd);
    vec3 hv = cross(ro, rd);
    float b = length(hv);
    beff = (tc > 0.0) ? b : length(ro);
    if (tc <= 0.0 && dot(ro, ro) > RFAR * RFAR) return;
    if (b >= RFAR) {
      // Far pass-by: single analytic deflection, no march. Decays
      // faster than the physical 1/b so the outer sky stays calm.
      vec3 dirTo = normalize(-(ro + tc * rd));
      ed = normalize(rd + dirTo * (2.0 / b) * exp(-(b - RFAR) * 0.22));
      return;
    }
    float h2 = dot(hv, hv);
    float t0 = max(tc - sqrt(RFAR * RFAR - b * b), 0.0);
    vec3 pos = ro + rd * t0;
    vec3 dir = rd;
    int nc = 0;
    for (int i = 0; i < STEPS; i++) {
      float r2 = dot(pos, pos);
      if (r2 < 1.0) { cap = 1.0; return; }
      if (r2 > RFAR * RFAR + 0.5 && dot(pos, dir) > 0.0) break;
      float r = sqrt(r2);
      float dt = clamp(r2 * 0.05, 0.045, 0.4);
      dir += -1.5 * h2 * pos / (r2 * r2 * r) * dt;
      vec3 np = pos + dir * dt;
      if (pos.y * np.y < 0.0 && nc < 2) {
        float f = pos.y / (pos.y - np.y);
        vec3 cp = mix(pos, np, f);
        float cr = length(cp);
        if (cr > uDiskIn && cr < uDiskOut) {
          if (nc == 0) crs.xy = vec2(cr, atan(cp.z, cp.x));
          else         crs.zw = vec2(cr, atan(cp.z, cp.x));
          nc++;
        }
      }
      pos = np;
    }
    if (dot(pos, pos) < 9.0) { cap = 1.0; return; }
    ed = normalize(dir);
    // feather the marched result into the analytic far-field bend so
    // the RFAR boundary leaves no visible seam in the smeared sky
    if (b > RFAR - 1.2) {
      vec3 dirTo = normalize(-(ro + tc * rd));
      vec3 ed2 = normalize(rd + dirTo * (2.0 / b));
      ed = normalize(mix(ed, ed2, smoothstep(RFAR - 1.2, RFAR, b)));
    }
  }

  vec3 post(vec3 c, vec2 uv) {
    c = 1.0 - exp(-c * uExposure);
    c = pow(c, vec3(0.85));
    c *= 1.0 - 0.30 * dot(uv, uv);
    c += (hash13(vec3(gl_FragCoord.xy, uTime)) - 0.5) / 255.0;
    return c;
  }

  vec3 pixelRay() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
    return normalize(uCamRight * uv.x + uCamUp * uv.y + uCamFwd * uFovS);
  }`;

  // Live path: full trace + shade every frame (interactive camera).
  const FS_FULL = `#version 300 es
  ${CHUNK}
  out vec4 fragColor;
  void main() {
    vec3 rd = pixelRay();
    vec3 ed; float cap; vec4 crs; float b;
    trace(uCamPos, rd, ed, cap, crs, b);
    vec3 col = vec3(0.0);
    if (cap < 0.5) {
      col = nebula(ed);
      vec4 st = stars(ed);
      col += st.rgb * twinkle(st.a);
    }
    col += glowTerm(b);
    vec4 d1 = (crs.x > 0.0) ? shadeDisk(crs.x, crs.y) : vec4(0.0);
    vec4 d2 = (crs.z > 0.0) ? shadeDisk(crs.z, crs.w) : vec4(0.0);
    col = col * exp(-(d1.a * 2.0 + d2.a * 1.2)) + d1.rgb + d2.rgb * 0.75;
    vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
    fragColor = vec4(post(col, uv), 1.0);
  }`;

  // Static-camera bake: one-time pass storing everything that never
  // changes per pixel — lensed nebula+glow, star color+phase, and
  // the disk-crossing coordinates of the bent ray.
  const FS_BAKE = `#version 300 es
  ${CHUNK}
  layout(location = 0) out vec4 oBG;
  layout(location = 1) out vec4 oStar;
  layout(location = 2) out vec4 oCross;
  layout(location = 3) out vec4 oDir;
  void main() {
    vec3 rd = pixelRay();
    vec3 ed; float cap; vec4 crs; float b;
    trace(uCamPos, rd, ed, cap, crs, b);
    vec3 bg = vec3(0.0);
    vec4 st = vec4(0.0);
    if (cap < 0.5) {
      // with a drifting background the nebula is re-evaluated per
      // frame from the cached ray direction instead of baked here
      if (uDynBG < 0.5) bg = nebula(ed);
      st = stars(ed);
    }
    bg += glowTerm(b);
    oBG = vec4(bg, 1.0);
    oStar = st;
    oCross = crs;
    oDir = vec4(ed, cap);
  }`;

  // Static-camera per-frame composite: three texture reads plus the
  // animated disk/twinkle shading. No ray marching, no noise fields.
  const FS_COMP = `#version 300 es
  ${CHUNK}
  uniform sampler2D uBG;
  uniform sampler2D uStars;
  uniform sampler2D uCross;
  uniform sampler2D uDir;
  out vec4 fragColor;
  void main() {
    vec2 tuv = gl_FragCoord.xy / uRes;
    vec3 col = texture(uBG, tuv).rgb;
    if (uDynBG > 0.5) {
      vec4 dc = texture(uDir, tuv);
      if (dc.w < 0.5) col += nebula(dc.xyz);
    }
    vec4 st = texture(uStars, tuv);
    col += st.rgb * twinkle(st.a);
    vec4 cr = texture(uCross, tuv);
    vec4 d1 = (cr.x > 0.0) ? shadeDisk(cr.x, cr.y) : vec4(0.0);
    vec4 d2 = (cr.z > 0.0) ? shadeDisk(cr.z, cr.w) : vec4(0.0);
    col = col * exp(-(d1.a * 2.0 + d2.a * 1.2)) + d1.rgb + d2.rgb * 0.75;
    vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
    fragColor = vec4(post(col, uv), 1.0);
  }`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
      throw new Error("shader compile failed");
    }
    return s;
  }
  function program(fsSrc) {
    const p = gl.createProgram();
    gl.attachShader(p, compile(gl.VERTEX_SHADER, VS));
    gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(p));
      throw new Error("program link failed");
    }
    p._loc = {};
    p.u = (name) => (name in p._loc) ? p._loc[name] : (p._loc[name] = gl.getUniformLocation(p, name));
    return p;
  }

  const progFull = program(FS_FULL);
  const progComp = floatBufOK ? program(FS_COMP) : null;
  const progBake = floatBufOK ? program(FS_BAKE) : null;

  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);

  /* ---------- seed-derived look ---------- */

  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function hsv(h, s, v) {
    h = ((h % 1) + 1) % 1;
    const i = Math.floor(h * 6), f = h * 6 - i;
    const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
    return [[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i % 6];
  }
  let seedU = null;
  function deriveSeed(seed) {
    const R = mulberry32(seed >>> 0);
    const v3 = (k) => [R() * k - k / 2, R() * k - k / 2, R() * k - k / 2];
    // bias nebula hues toward sci-fi ranges: blue, purple, magenta, teal
    const ranges = [[0.52, 0.62], [0.62, 0.75], [0.78, 0.95], [0.42, 0.52]];
    const pick = ranges[(R() * ranges.length) | 0];
    const hue = pick[0] + R() * (pick[1] - pick[0]);
    const th = R() * 6.28318, z = R() * 2 - 1, rr = Math.sqrt(1 - z * z);
    const tint = hsv(0.05 + (R() - 0.5) * 0.06, 0.25 + R() * 0.3, 1.0);
    seedU = {
      nebA: hsv(hue,                        0.60 + R() * 0.25, 0.50 + R() * 0.20),
      nebB: hsv(hue + 0.12 + R() * 0.18,    0.55 + R() * 0.30, 0.45 + R() * 0.20),
      nebC: hsv(hue - 0.12 - R() * 0.15,    0.35 + R() * 0.30, 0.50 + R() * 0.15),
      bandDir: [rr * Math.cos(th), z, rr * Math.sin(th)],
      nebOff1: v3(300), nebOff2: v3(300), nebOff3: v3(300),
      starOff: v3(300), diskOff: v3(100),
      diskTint: tint,
      tOff: R() * 1000
    };
    // discrete wispy nebulae: center direction + angular size,
    // color near the palette hue + per-nebula detail scale.
    // The first nebula is biased into the default camera's view so a
    // fresh seed always has one on screen.
    const cy = Math.cos(CONFIG.camera.yaw), sy = Math.sin(CONFIG.camera.yaw);
    const cp = Math.cos(CONFIG.camera.pitch), sp = Math.sin(CONFIG.camera.pitch);
    const fwd = [-cp * sy, -sp, -cp * cy];
    const dirs = [], cols = [];
    for (let i = 0; i < 8; i++) {
      let dx, dy, dz;
      if (i === 0) {
        let tx = R() * 2 - 1, ty = R() * 2 - 1, tz = R() * 2 - 1;
        const k = tx * fwd[0] + ty * fwd[1] + tz * fwd[2];
        tx -= k * fwd[0]; ty -= k * fwd[1]; tz -= k * fwd[2];
        const tl = Math.hypot(tx, ty, tz) || 1;
        const amt = (0.35 + R() * 0.5) / tl;
        dx = fwd[0] + tx * amt; dy = fwd[1] + ty * amt; dz = fwd[2] + tz * amt;
        const dl = Math.hypot(dx, dy, dz);
        dx /= dl; dy /= dl; dz /= dl;
      } else {
        const t2 = R() * 6.28318, z2 = R() * 2 - 1, r2 = Math.sqrt(1 - z2 * z2);
        dx = r2 * Math.cos(t2); dy = z2; dz = r2 * Math.sin(t2);
      }
      dirs.push(dx, dy, dz, 0.18 + R() * 0.26);
      const cc = hsv(hue + (R() - 0.5) * 0.28, 0.65 + R() * 0.30, 0.60 + R() * 0.30);
      cols.push(cc[0], cc[1], cc[2], 2.0 + R() * 1.6);
    }
    seedU.nebDirs = dirs;
    seedU.nebCols = cols;
    seedU.diskSeedCold = hsv(R(), 0.70 + R() * 0.25, 1.0);
    const rdir = () => {
      const t3 = R() * 6.28318, z3 = R() * 2 - 1, r3 = Math.sqrt(1 - z3 * z3);
      return [r3 * Math.cos(t3), z3, r3 * Math.sin(t3)];
    };
    seedU.bgVel1 = rdir().map((v) => v * 0.015);
    seedU.bgVel2 = rdir().map((v) => v * 0.025);
  }
  deriveSeed(CONFIG.seed);

  function diskColors() {
    const sel = CONFIG.blackHole.diskColor;
    let cold, hot;
    if (typeof sel === "string" && sel[0] === "#" && sel.length === 7) {
      const v = parseInt(sel.slice(1), 16);
      cold = [(v >> 16 & 255) / 255, (v >> 8 & 255) / 255, (v & 255) / 255];
      hot = cold.map((x) => x * 0.3 + 0.7);
    } else if (sel === "seed") {
      cold = seedU.diskSeedCold;
      hot = cold.map((x) => x * 0.3 + 0.7);
    } else {
      cold = [1.0, 0.36, 0.08].map((x, i) => x * seedU.diskTint[i]);
      hot = [1.0, 0.92, 0.78].map((x, i) => x * seedU.diskTint[i]);
    }
    const glow = hot.map((x, i) => x * 0.62 + [1.0, 0.88, 0.70][i] * 0.38);
    return { cold, hot, glow };
  }

  /* ---------- camera ---------- */

  const cam = {
    yaw: CONFIG.camera.yaw, pitch: CONFIG.camera.pitch, dist: CONFIG.camera.distance,
    tyaw: CONFIG.camera.yaw, tpitch: CONFIG.camera.pitch, tdist: CONFIG.camera.distance
  };
  function camVectors() {
    const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
    const cy = Math.cos(cam.yaw), sy = Math.sin(cam.yaw);
    const pos = [cam.dist * cp * sy, cam.dist * sp, cam.dist * cp * cy];
    const len = Math.hypot(pos[0], pos[1], pos[2]);
    const fwd = [-pos[0] / len, -pos[1] / len, -pos[2] / len];
    let rx = fwd[2], rz = -fwd[0]; // cross(fwd, up0) with up0 = (0,1,0)
    const rl = Math.hypot(rx, rz) || 1;
    rx /= rl; rz /= rl;
    const right = [rx, 0, rz];
    const up = [
      right[1] * fwd[2] - right[2] * fwd[1],
      right[2] * fwd[0] - right[0] * fwd[2],
      right[0] * fwd[1] - right[1] * fwd[0]
    ];
    return { pos, right, up, fwd };
  }

  /* ---------- uniforms ---------- */

  let W = 0, H = 0;
  function setSceneUniforms(p, cv, time) {
    gl.uniform2f(p.u("uRes"), W, H);
    gl.uniform1f(p.u("uTime"), time + seedU.tOff);
    gl.uniform3fv(p.u("uCamPos"), cv.pos);
    gl.uniform3fv(p.u("uCamRight"), cv.right);
    gl.uniform3fv(p.u("uCamUp"), cv.up);
    gl.uniform3fv(p.u("uCamFwd"), cv.fwd);
    gl.uniform1f(p.u("uFovS"), 0.5 / Math.tan(CONFIG.camera.fov * Math.PI / 360));
    const bh = CONFIG.blackHole, bg = CONFIG.background;
    gl.uniform1f(p.u("uDiskIn"), bh.diskInner);
    gl.uniform1f(p.u("uDiskOut"), bh.diskOuter);
    gl.uniform1f(p.u("uDiskSpeed"), bh.diskSpeed);
    gl.uniform1f(p.u("uDiskBright"), bh.diskBrightness);
    gl.uniform1f(p.u("uDoppler"), bh.doppler);
    gl.uniform1f(p.u("uGlow"), bh.glow);
    const dc = diskColors();
    gl.uniform3fv(p.u("uDiskCold"), dc.cold);
    gl.uniform3fv(p.u("uDiskHot"), dc.hot);
    gl.uniform3fv(p.u("uGlowCol"), dc.glow);
    gl.uniform3fv(p.u("uNebA"), seedU.nebA);
    gl.uniform3fv(p.u("uNebC"), seedU.nebC);
    gl.uniform3fv(p.u("uBandDir"), seedU.bandDir);
    gl.uniform3fv(p.u("uNebOff1"), seedU.nebOff1);
    gl.uniform3fv(p.u("uNebOff2"), seedU.nebOff2);
    gl.uniform3fv(p.u("uNebOff3"), seedU.nebOff3);
    gl.uniform3fv(p.u("uStarOff"), seedU.starOff);
    gl.uniform3fv(p.u("uDiskOff"), seedU.diskOff);
    gl.uniform1f(p.u("uNebInt"), bg.nebulaIntensity);
    gl.uniform1f(p.u("uStarDen"), bg.starDensity);
    gl.uniform1f(p.u("uStarBright"), bg.starBrightness);
    gl.uniform1f(p.u("uTwSpd"), bg.twinkleSpeed);
    gl.uniform1f(p.u("uExposure"), CONFIG.exposure);
    gl.uniform1f(p.u("uAmbient"), bg.ambient);
    gl.uniform1i(p.u("uNebCount"), Math.max(0, Math.min(8, bg.nebulaCount | 0)));
    gl.uniform4fv(p.u("uNebDirs[0]"), seedU.nebDirs);
    gl.uniform4fv(p.u("uNebCols[0]"), seedU.nebCols);
    const mv = Math.max(0, bg.motion);
    gl.uniform1f(p.u("uDynBG"), mv > 0 ? 1 : 0);
    gl.uniform3fv(p.u("uBGVel1"), seedU.bgVel1.map((v) => v * mv));
    gl.uniform3fv(p.u("uBGVel2"), seedU.bgVel2.map((v) => v * mv));
  }

  /* ---------- static-camera bake ---------- */

  let bake = null; // { fbo, texs:[bg, stars, cross], w, h }
  function makeTex(w, h) {
    const t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
    return t;
  }
  function destroyBake() {
    if (!bake) return;
    gl.deleteFramebuffer(bake.fbo);
    bake.texs.forEach((t) => gl.deleteTexture(t));
    bake = null;
  }
  function rebake() {
    if (!progBake) return;
    destroyBake();
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    const texs = [makeTex(W, H), makeTex(W, H), makeTex(W, H), makeTex(W, H)];
    texs.forEach((t, i) =>
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0 + i, gl.TEXTURE_2D, t, 0));
    gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1,
                    gl.COLOR_ATTACHMENT2, gl.COLOR_ATTACHMENT3]);
    if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE) {
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.deleteFramebuffer(fbo);
      texs.forEach((t) => gl.deleteTexture(t));
      return; // fall back to the full renderer
    }
    gl.viewport(0, 0, W, H);
    gl.useProgram(progBake);
    setSceneUniforms(progBake, camVectors(), 0);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    bake = { fbo, texs, w: W, h: H };
  }
  function staticMode() {
    return !CONFIG.cameraControl && !!progBake;
  }

  /* ---------- render loop ---------- */

  const t0 = performance.now();
  let lastFrame = -1e9;
  let rafId = 0;

  function draw() {
    const time = (performance.now() - t0) / 1000;
    gl.viewport(0, 0, W, H);
    if (staticMode() && bake) {
      gl.useProgram(progComp);
      setSceneUniforms(progComp, camVectors(), time);
      for (let i = 0; i < 4; i++) {
        gl.activeTexture(gl.TEXTURE0 + i);
        gl.bindTexture(gl.TEXTURE_2D, bake.texs[i]);
      }
      gl.uniform1i(progComp.u("uBG"), 0);
      gl.uniform1i(progComp.u("uStars"), 1);
      gl.uniform1i(progComp.u("uCross"), 2);
      gl.uniform1i(progComp.u("uDir"), 3);
    } else {
      // interactive: smooth the camera toward its target
      const k = 1 - Math.exp(-0.14);
      cam.yaw += (cam.tyaw - cam.yaw) * k;
      cam.pitch += (cam.tpitch - cam.pitch) * k;
      cam.dist += (cam.tdist - cam.dist) * k;
      gl.useProgram(progFull);
      setSceneUniforms(progFull, camVectors(), time);
    }
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }

  function frame(t) {
    rafId = requestAnimationFrame(frame);
    const fps = CONFIG.quality.maxFPS;
    if (fps > 0 && t - lastFrame < 1000 / fps - 1.5) return;
    lastFrame = t;
    draw();
  }

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      cancelAnimationFrame(rafId);
      rafId = 0;
    } else if (!rafId) {
      rafId = requestAnimationFrame(frame);
    }
  });

  /* ---------- sizing ---------- */

  function resize() {
    const scale = CONFIG.quality.renderScale * Math.min(window.devicePixelRatio || 1, 1.25);
    W = Math.max(2, Math.round(canvas.clientWidth * scale));
    H = Math.max(2, Math.round(canvas.clientHeight * scale));
    canvas.width = W;
    canvas.height = H;
    if (staticMode()) rebake();
  }
  let resizeTimer = 0;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 150);
  });

  /* ---------- camera control ---------- */

  // Active pointers tracked by id so touch can distinguish a single
  // finger (orbit) from two fingers (pinch-to-zoom). Mouse uses one
  // pointer for orbit and the wheel for zoom.
  const pointers = new Map();
  let dragging = false, lastX = 0, lastY = 0, pinchDist = 0;

  function clampDist() {
    cam.tdist = Math.max(CONFIG.camera.minDistance,
                Math.min(CONFIG.camera.maxDistance, cam.tdist));
  }
  function pinchSpan() {
    const p = pointers.values();
    const a = p.next().value, b = p.next().value;
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  const onDown = (e) => {
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    if (pointers.size === 1) {
      dragging = true; lastX = e.clientX; lastY = e.clientY;
      canvas.classList.add("grabbing");
    } else if (pointers.size === 2) {
      dragging = false;          // second finger down → pinch, not orbit
      pinchDist = pinchSpan();
    }
  };
  const onMove = (e) => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size >= 2) {
      const d = pinchSpan();
      if (pinchDist > 0 && d > 0) {
        cam.tdist *= pinchDist / d;   // fingers apart → smaller distance
        clampDist();
        window.dispatchEvent(new Event("bh-camera"));
      }
      pinchDist = d;
    } else if (dragging) {
      cam.tyaw -= (e.clientX - lastX) * 0.005;
      cam.tpitch += (e.clientY - lastY) * 0.005;
      cam.tpitch = Math.max(-1.3, Math.min(1.3, cam.tpitch));
      lastX = e.clientX; lastY = e.clientY;
    }
  };
  const onUp = (e) => {
    if (!pointers.delete(e.pointerId)) return;
    try { if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId); } catch (_) {}
    if (pointers.size === 1) {
      // pinch dropped to one finger → resume orbit from the survivor
      const p = pointers.values().next().value;
      lastX = p.x; lastY = p.y; dragging = true;
    } else if (pointers.size === 0) {
      dragging = false;
      canvas.classList.remove("grabbing");
    }
    window.dispatchEvent(new Event("bh-camera"));
  };
  const onWheel = (e) => {
    e.preventDefault();
    cam.tdist *= Math.exp(e.deltaY * 0.0012);
    clampDist();
    window.dispatchEvent(new Event("bh-camera"));
  };
  function attachControls() {
    canvas.classList.add("grabbable");
    canvas.addEventListener("pointerdown", onDown);
    canvas.addEventListener("pointermove", onMove);
    canvas.addEventListener("pointerup", onUp);
    canvas.addEventListener("pointercancel", onUp);
    canvas.addEventListener("wheel", onWheel, { passive: false });
  }
  function detachControls() {
    canvas.classList.remove("grabbable", "grabbing");
    pointers.clear(); dragging = false; pinchDist = 0;
    canvas.removeEventListener("pointerdown", onDown);
    canvas.removeEventListener("pointermove", onMove);
    canvas.removeEventListener("pointerup", onUp);
    canvas.removeEventListener("pointercancel", onUp);
    canvas.removeEventListener("wheel", onWheel);
  }

  /* ---------- public API ---------- */

  window.BlackHole = {
    config: CONFIG,
    setSeed(s) {
      if (s === undefined) s = (Math.random() * 4294967296) >>> 0;
      CONFIG.seed = s >>> 0;
      deriveSeed(CONFIG.seed);
      if (staticMode()) rebake();
      return CONFIG.seed;
    },
    setCameraControl(on) {
      CONFIG.cameraControl = !!on;
      if (on) {
        destroyBake();
        attachControls();
      } else {
        detachControls();
        // snap to target so live and cached frames agree
        cam.yaw = cam.tyaw; cam.pitch = cam.tpitch; cam.dist = cam.tdist;
        rebake();
      }
    },
    // re-derive whatever the current mode caches (no-op when live)
    refresh() {
      if (staticMode()) rebake();
    },
    resize,
    getCamera() {
      return { yaw: cam.tyaw, pitch: cam.tpitch, distance: cam.tdist };
    },
    setCamera(yaw, pitch, distance) {
      cam.tyaw = yaw;
      cam.tpitch = Math.max(-1.3, Math.min(1.3, pitch));
      cam.tdist = Math.max(CONFIG.camera.minDistance,
                  Math.min(CONFIG.camera.maxDistance, distance));
      if (!CONFIG.cameraControl) {
        cam.yaw = cam.tyaw; cam.pitch = cam.tpitch; cam.dist = cam.tdist;
        if (staticMode()) rebake();
      }
    }
  };

  /* ---------- go ---------- */

  if (CONFIG.cameraControl) attachControls();
  resize();
  rafId = requestAnimationFrame(frame);
})();

/* ============================================================
   SIDE UI — generate / settings / share / hide
   ============================================================ */
(function () {
  const BH = window.BlackHole;
  if (!BH) return; // WebGL2 unavailable
  const TAU = 6.283185307;

  const el = (tag, cls, parent) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (parent) parent.appendChild(e);
    return e;
  };

  const bar = el("div", "bh-bar", document.body);
  const mkBtn = (id, txt, title) => {
    const b = el("button", "bh-btn", bar);
    b.id = id; b.textContent = txt; b.title = title;
    return b;
  };
  const btnGen  = mkBtn("bh-gen",  "\u{1F3B2}", "Generate new (random seed)");
  const btnSet  = mkBtn("bh-set",  "⚙",    "Settings");
  const btnCopy = mkBtn("bh-copy", "\u{1F517}", "Copy shareable link");
  const btnHide = mkBtn("bh-hide", "✕",    "Hide controls (press H to bring them back)");

  const panel = el("div", "bh-panel", document.body);
  panel.id = "bh-panel";
  panel.style.display = "none";

  const syncFns = [];
  const syncPanel = () => syncFns.forEach((f) => f());
  const refreshLater = debounce(() => BH.refresh(), 250);
  const urlLater = debounce(updateURL, 300);
  const noop = () => {};

  const addHeader = (t) => { el("div", "bh-h", panel).textContent = t; };

  function addRange(label, path, min, max, step, apply) {
    const row = el("div", "bh-row", panel);
    const lab = el("label", null, row);
    lab.appendChild(document.createTextNode(label));
    const val = el("span", "bh-val", lab);
    const inp = el("input", null, row);
    inp.type = "range"; inp.min = min; inp.max = max; inp.step = step;
    const show = () => {
      inp.value = cfgGet(CONFIG, path);
      val.textContent = String(r3(cfgGet(CONFIG, path)));
    };
    show();
    inp.addEventListener("input", () => {
      cfgSet(CONFIG, path, parseFloat(inp.value));
      val.textContent = String(r3(parseFloat(inp.value)));
      (apply || refreshLater)();
      urlLater();
    });
    syncFns.push(show);
    return inp;
  }

  function addCheck(label, path, apply) {
    const row = el("label", "bh-row bh-check", panel);
    const inp = el("input", null, row);
    inp.type = "checkbox";
    el("span", null, row).textContent = label;
    const show = () => { inp.checked = !!cfgGet(CONFIG, path); };
    show();
    inp.addEventListener("change", () => {
      cfgSet(CONFIG, path, inp.checked);
      (apply || refreshLater)();
      urlLater();
    });
    syncFns.push(show);
    return inp;
  }

  // Stand-in for <select>, rendered as plain divs.
  //
  // Wallpaper Engine runs the page in an off-screen CEF (Chromium 146), and
  // there a <select> kills the renderer with STATUS_ILLEGAL_INSTRUCTION the
  // instant it generates a layout box. Verified against WE itself: options vs
  // none, `appearance:none`, `size=3` and even `visibility:hidden`/`opacity:0`
  // all still crash; only `display:none` survives. So the element must never
  // reach layout at all — styling or hiding one is not enough.
  //
  // Same look and behaviour as the native control: click or Enter/Space opens
  // the list, arrows step through values while closed, Escape/outside-click
  // dismisses. `.value` and `.onChange` mirror the bits of the DOM API used here.
  function makeSelect(parent, items) {
    const trg = el("div", "bh-sel", parent);
    trg.tabIndex = 0;
    trg.setAttribute("role", "combobox");
    trg.setAttribute("aria-haspopup", "listbox");
    trg.setAttribute("aria-expanded", "false");
    let value = items[0][0];
    let pop = null;

    const api = {
      onChange: noop,
      get value() { return value; },
      set value(v) { value = v; paint(); }
    };
    function paint() {
      const it = items.find((i) => i[0] === value);
      trg.textContent = it ? it[1] : "";
    }
    function onOutside(e) {
      if (e.target !== trg && pop && !pop.contains(e.target)) close();
    }
    function close() {
      if (!pop) return;
      pop.remove(); pop = null;
      trg.setAttribute("aria-expanded", "false");
      window.removeEventListener("mousedown", onOutside, true);
      window.removeEventListener("resize", close);
      window.removeEventListener("scroll", close, true);
    }
    // The panel scrolls and clips its content, so the list is positioned
    // against the viewport on body instead of nested inside the row.
    function open() {
      if (pop) { close(); return; }
      pop = el("div", "bh-opts", document.body);
      pop.setAttribute("role", "listbox");
      const r = trg.getBoundingClientRect();
      pop.style.minWidth = r.width + "px";
      items.forEach(([v, t]) => {
        const o = el("div", "bh-opt" + (v === value ? " sel" : ""), pop);
        o.textContent = t;
        o.setAttribute("role", "option");
        o.addEventListener("mousedown", (e) => { e.preventDefault(); pick(v); });
      });
      // measure once populated, then drop below the trigger — or flip above it
      // when the row sits too low on screen, the way a native popup does
      const ph = pop.offsetHeight, pw = pop.offsetWidth;
      let top = r.bottom + 3;
      if (top + ph > window.innerHeight - 4) {
        const above = r.top - 3 - ph;
        top = above >= 4 ? above : Math.max(4, window.innerHeight - 4 - ph);
      }
      pop.style.top = top + "px";
      pop.style.left = Math.max(4, Math.min(r.left, window.innerWidth - 4 - pw)) + "px";
      trg.setAttribute("aria-expanded", "true");
      window.addEventListener("mousedown", onOutside, true);
      window.addEventListener("resize", close);
      window.addEventListener("scroll", close, true);
    }
    function pick(v) {
      close();
      if (v === value) return;
      value = v; paint(); api.onChange();
    }
    function step(d) {
      const i = items.findIndex((it) => it[0] === value);
      const n = items[(i + d + items.length) % items.length][0];
      if (n !== value) { value = n; paint(); api.onChange(); }
    }
    trg.addEventListener("mousedown", (e) => { e.preventDefault(); trg.focus(); open(); });
    trg.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); step(1); }
      else if (e.key === "ArrowUp") { e.preventDefault(); step(-1); }
      else if (e.key === "Escape") close();
    });
    paint();
    return api;
  }

  /* --- General --- */
  addHeader("General");
  {
    const row = el("div", "bh-row", panel);
    el("label", null, row).textContent = "Seed";
    const inp = el("input", null, row);
    inp.type = "number"; inp.min = 0; inp.step = 1;
    const show = () => { inp.value = CONFIG.seed; };
    show();
    inp.addEventListener("change", () => {
      const v = parseInt(inp.value, 10);
      if (isFinite(v)) { BH.setSeed(v >>> 0); show(); updateURL(); }
    });
    syncFns.push(show);
  }
  addCheck("Camera control (drag / zoom)", ["cameraControl"],
    () => BH.setCameraControl(CONFIG.cameraControl));

  /* --- Camera --- */
  addHeader("Camera");
  const camApply = debounce(() =>
    BH.setCamera(CONFIG.camera.yaw, CONFIG.camera.pitch, CONFIG.camera.distance), 150);
  addRange("Yaw",           ["camera", "yaw"],      -3.14, 3.14, 0.01, camApply);
  addRange("Pitch",         ["camera", "pitch"],    -1.3,  1.3,  0.01, camApply);
  addRange("Distance",      ["camera", "distance"],  8.5,  44,   0.5,  camApply);
  addRange("Field of view", ["camera", "fov"],       35,   90,   1);

  /* --- Accretion disk --- */
  addHeader("Accretion disk");
  addRange("Inner radius", ["blackHole", "diskInner"],      1.5, 5,   0.1);
  addRange("Outer radius", ["blackHole", "diskOuter"],      3,   7.5, 0.1);
  addRange("Speed",        ["blackHole", "diskSpeed"],      0,   2,   0.05, noop);
  addRange("Brightness",   ["blackHole", "diskBrightness"], 0,   6,   0.1,  noop);
  addRange("Doppler",      ["blackHole", "doppler"],        0,   1,   0.05, noop);
  addRange("Glow",         ["blackHole", "glow"],           0,   3,   0.05);
  {
    const row = el("div", "bh-row", panel);
    el("label", null, row).textContent = "Disk color";
    const sel = makeSelect(row,
      [["classic", "Classic orange"], ["seed", "From seed"], ["custom", "Custom"]]);
    const col = el("input", null, row);
    col.type = "color"; col.value = "#ff7722";
    const show = () => {
      const v = CONFIG.blackHole.diskColor;
      sel.value = v == null ? "classic" : (v === "seed" ? "seed" : "custom");
      col.style.display = sel.value === "custom" ? "" : "none";
      if (typeof v === "string" && v[0] === "#") col.value = v;
    };
    show();
    sel.onChange = () => {
      CONFIG.blackHole.diskColor =
        sel.value === "classic" ? null : (sel.value === "seed" ? "seed" : col.value);
      show(); refreshLater(); urlLater();
    };
    col.addEventListener("input", () => {
      CONFIG.blackHole.diskColor = col.value;
      refreshLater(); urlLater();
    });
    syncFns.push(show);
  }

  /* --- Background --- */
  addHeader("Background");
  addRange("Nebula count",     ["background", "nebulaCount"],     0, 8,   1);
  addRange("Nebula intensity", ["background", "nebulaIntensity"], 0, 3,   0.05);
  addRange("Ambient haze",     ["background", "ambient"],         0, 1.5, 0.05);
  addRange("Star density",     ["background", "starDensity"],     0, 2,   0.05);
  addRange("Star brightness",  ["background", "starBrightness"],  0, 3,   0.05);
  addRange("Twinkle speed",    ["background", "twinkleSpeed"],    0, 4,   0.1, noop);
  addRange("Motion",           ["background", "motion"],          0, 2,   0.05);

  /* --- Rendering --- */
  addHeader("Rendering");
  addRange("Render scale", ["quality", "renderScale"], 0.25, 1, 0.05,
    debounce(() => BH.resize(), 250));
  addRange("Max FPS (0 = uncapped)", ["quality", "maxFPS"], 0, 60, 5, noop);
  const stepsInp = addRange("March steps (reloads)", ["quality", "marchSteps"], 16, 96, 4, noop);
  stepsInp.addEventListener("change", () => { updateURL(); location.reload(); });
  addRange("Exposure", ["exposure"], 0.5, 2, 0.05, noop);

  /* --- buttons --- */
  function flash(btn, txt) {
    const o = btn.textContent;
    btn.textContent = txt;
    setTimeout(() => { btn.textContent = o; }, 900);
  }
  function syncCamToConfig() {
    const c = BH.getCamera();
    let y = ((c.yaw % TAU) + TAU) % TAU;
    if (y > TAU / 2) y -= TAU;
    CONFIG.camera.yaw = r3(y);
    CONFIG.camera.pitch = r3(c.pitch);
    CONFIG.camera.distance = r3(c.distance);
  }

  btnGen.addEventListener("click", () => {
    BH.setSeed();
    syncPanel();
    updateURL();
  });
  btnSet.addEventListener("click", () => {
    panel.style.display = panel.style.display === "none" ? "" : "none";
  });
  // Clipboard fallback for when the async API is unavailable or rejects
  // (in Wallpaper Engine it rejects whenever the wallpaper isn't focused).
  // execCommand is deprecated, but a native dialog is not an option here:
  // prompt/alert/confirm all kill WE's CEF outright — see makeSelect().
  function legacyCopy(text) {
    const ta = el("textarea", null, document.body);
    ta.value = text;
    ta.style.cssText = "position:fixed;top:-9999px;opacity:0";
    ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch (_) {}
    ta.remove();
    return ok;
  }
  btnCopy.addEventListener("click", () => {
    syncCamToConfig(); syncPanel(); updateURL();
    const url = location.href;
    const fallback = () => flash(btnCopy, legacyCopy(url) ? "✓" : "✕");
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => flash(btnCopy, "✓"), fallback);
    } else {
      fallback();
    }
  });
  // Hiding persists via the URL (`ui=0`) so it survives a refresh and
  // travels with shared links. Press H (or delete the `ui` param) to
  // bring the controls back.
  function setUIVisible(v) {
    CONFIG.showUI = v;
    bar.style.display = v ? "" : "none";
    if (!v) panel.style.display = "none";
    updateURL();
  }
  btnHide.addEventListener("click", () => setUIVisible(false));
  window.addEventListener("keydown", (e) => {
    if (e.key === "h" || e.key === "H") setUIVisible(!CONFIG.showUI);
  });
  if (!CONFIG.showUI) bar.style.display = "none";

  // keep the URL in sync while the user orbits/zooms with the mouse
  const camDrift = debounce(() => { syncCamToConfig(); syncPanel(); updateURL(); }, 400);
  window.addEventListener("bh-camera", camDrift);
})();
</script>
</body>
</html>
